{c:'システム',q:'電波の性質に関する記述のうち、正しいものはどれか。',a:['周波数が高いほど直進性が強く、障害物の影響を受けやすい','周波数が高いほど障害物を回り込みやすい','電波は障害物の影響を一切受けない'],ans:0,ex:'高い周波数ほど<b>直進性が強く、遮蔽・減衰の影響が大きい</b>(伝送距離も短くなる傾向)。機体との間に障害物を挟まない運航が基本です。'},
{c:'システム',q:'磁気コンパス(方位センサ)に関する記述のうち、正しいものはどれか。',a:['鉄骨構造物や送電線の近くでは誤差が生じやすく、キャリブレーションは金属構造物から離れて行う','キャリブレーションは鉄板の上で行うのがよい','磁気コンパスは周囲の環境の影響を受けない'],ans:0,ex:'磁気コンパスは<b>周囲の磁気・金属の影響</b>を受けます。鉄骨建屋・車両・送電線付近ではコンパスエラーに注意し、校正は開けた場所で行います。'},
{c:'システム',q:'電波途絶時のフェールセーフ機能(RTH:リターントゥホーム)に関する記述のうち、最も適切なものはどれか。',a:['帰還高度は、飛行経路周辺の障害物より高い高度に設定しておく','帰還高度はできるだけ低く設定するのがよい','RTHを設定していれば、飛行前の経路確認は不要である'],ans:0,ex:'RTH経路上の建物・樹木・電線との衝突を防ぐため、<b>帰還高度は周囲の障害物より高く</b>設定します。フェールセーフがあっても飛行前の経路確認は必須です。'},
{c:'システム',q:'プロペラの点検に関する記述のうち、正しいものはどれか。',a:['傷・欠け・変形は振動や飛行中の破損の原因となるため、飛行前点検で必ず確認する','小さな傷であれば飛行に影響しない','プロペラは消耗しないため点検は不要である'],ans:0,ex:'プロペラの損傷は<b>振動→機体損傷・墜落</b>につながります。小さな傷でも高速回転で進行するため、損傷があれば交換が原則です。'},
{c:'システム',q:'機体認証に関する記述のうち、正しいものはどれか。',a:['第一種機体認証はカテゴリーIII飛行に必要で、有効期間は1年である','第一種機体認証の有効期間は5年である','第二種機体認証があればカテゴリーIII飛行ができる'],ans:0,ex:'<b>第一種=カテゴリーIII用・有効期間1年</b>、<b>第二種=カテゴリーII(の一部)用・有効期間3年</b>。一等学科では第一種の位置付けが重要です。'},
{c:'システム',q:'気圧センサによる高度維持に関する記述のうち、正しいものはどれか。',a:['天候による気圧変化や風の影響で高度に誤差が生じることがある','気圧センサによる高度は常に正確である','気圧センサはGNSSが使えない場所では機能しない'],ans:0,ex:'気圧高度は<b>気圧の変化・機体周囲の気流</b>の影響を受けます。センサの特性と限界を理解し、目視やその他の情報と併せて高度を管理します。'},
{c:'運航体制',q:'CRM(クルー・リソース・マネジメント)の説明として、最も適切なものはどれか。',a:['利用可能な人的資源・情報・機材などすべてのリソースを有効活用し、安全な運航を実現する考え方','機長がすべてを一人で判断することを推奨する考え方','機体の整備記録を管理する手法'],ans:0,ex:'CRMは<b>全リソースの有効活用</b>による安全確保の考え方。操縦者が1人の運航でも、補助者・関係者・情報を活用する発想は同様に適用されます。'},
{c:'運航体制',q:'ハインリッヒの法則に関する記述として、正しいものはどれか。',a:['1件の重大事故の背後には29件の軽微な事故と300件のヒヤリハットがあるとされる','重大事故とヒヤリハットの間に関係はない','ヒヤリハットは報告しない方がよい'],ans:0,ex:'<b>1:29:300</b>の法則。ヒヤリハットの収集・分析・共有が重大事故の防止につながる、という安全管理の基本的な考え方です。'},
{c:'運航体制',q:'スイスチーズモデルの説明として、最も適切なものはどれか。',a:['複数の防護層の穴が一直線に貫通したときに事故が起こるという考え方で、多層的な安全対策の重要性を示す','チーズの品質管理に関するモデルである','単一の完璧な対策があれば事故は防げるという考え方'],ans:0,ex:'どの防護層にも穴(弱点)はあるため、<b>複数の独立した対策を重ねる</b>ことで事故への到達を防ぐ、という考え方です。'},
{c:'運航体制',q:'「ハザード」と「リスク」に関する記述のうち、最も適切なものはどれか。',a:['ハザードは危険の潜在的な要因であり、リスクはそれが顕在化する可能性(確率)と被害の重大性の組合せで評価される','ハザードとリスクは全く同じ意味である','リスクは被害の大きさのみで評価する'],ans:0,ex:'リスク評価は<b>発生確率×被害の重大性</b>。ハザード(潜在要因)を特定し、リスクを許容可能なレベルまで低減するのがリスクマネジメントです。'},
{c:'運航体制',q:'操縦者の体調管理に関する記述のうち、最も適切なものはどれか。',a:['疲労・ストレス・体調不良・服薬の影響などを自己確認し、正常な操縦ができないおそれがあるときは飛行を中止する','多少の体調不良は飛行に影響しない','体調確認は年1回行えば十分である'],ans:0,ex:'飛行のたびに体調を自己チェックします(病気・服薬・ストレス・飲酒・疲労・感情=<b>IMSAFE</b>の考え方)。無理な飛行の中止も操縦者の重要な判断です。'},
{c:'運航体制',q:'補助者を配置して飛行する場合の記述のうち、最も適切なものはどれか。',a:['補助者の役割分担と操縦者との連絡手段を、飛行前に明確に定めておく','補助者は配置すれば役割を決めなくてもよい','補助者との連絡は飛行中に決めればよい'],ans:0,ex:'補助者は周囲の監視・第三者の立入管理などを担います。<b>役割・監視範囲・連絡手段を事前に取り決める</b>ことが運航体制の基本です。'},
{c:'運航体制',q:'技能証明取得後の訓練に関する記述のうち、最も適切なものはどれか。',a:['技能の維持・向上のため、取得後も継続的に訓練を行う','技能証明を取得すれば以後の訓練は不要である','訓練は機体を買い替えたときだけ行えばよい'],ans:0,ex:'操縦技能は使わなければ低下します。<b>継続的な訓練と知識の更新</b>(教則・制度改正の確認を含む)が操縦者の責務とされています。'},
{c:'運航体制',q:'特定飛行を行う場合の飛行計画に関する記述のうち、正しいものはどれか。',a:['原則として、あらかじめ飛行計画を国土交通大臣に通報しなければならない','飛行計画の通報は飛行後でよい','飛行計画は頭の中で考えておけば足りる'],ans:0,ex:'特定飛行では<b>事前の飛行計画の通報</b>(DIPSによるオンライン通報)が義務です。他の無人航空機との経路重複の確認にも使われます。'},
{c:'リスク・気象',q:'海陸風に関する記述のうち、正しいものはどれか。',a:['晴れた日の日中は、海から陸に向かう海風が吹く','晴れた日の日中は、陸から海に向かう風が吹く','海陸風は夜間のみ発生する'],ans:0,ex:'日中は陸の方が暖まりやすく上昇気流が生じ、<b>海→陸(海風)</b>が吹きます。夜間は逆に<b>陸→海(陸風)</b>。海岸付近の運航で重要な知識です。'},
{c:'リスク・気象',q:'積乱雲が接近してきた場合の対応として、最も適切なものはどれか。',a:['雷・突風・急変のおそれがあるため、直ちに飛行を中止する','雨が降り出すまでは飛行を継続してよい','高度を上げて雲を回避しながら飛行を続ける'],ans:0,ex:'積乱雲は<b>雷・ダウンバースト・激しい気流の乱れ</b>を伴います。接近の兆候(急な冷たい風・雷鳴など)があれば直ちに着陸・中止が原則です。'},
{c:'リスク・気象',q:'ダウンバーストの説明として、正しいものはどれか。',a:['積乱雲などから吹き降ろす強い下降気流が地面に衝突し、四方に広がる突風','地表から上空へ吹き上がる旋風','一日中同じ方向に吹く恒常風'],ans:0,ex:'ダウンバーストは<b>強い下降気流が地面で水平に広がる</b>現象で、先端はガストフロント(突風前線)として急激な風の変化をもたらします。'},
{c:'リスク・気象',q:'放射霧が発生しやすい条件として、正しいものはどれか。',a:['よく晴れて風の弱い夜間から早朝にかけて、放射冷却により発生しやすい','風の強い日中に発生しやすい','気温が上がる真昼に最も発生しやすい'],ans:0,ex:'放射霧は<b>晴天・弱風の夜間〜早朝</b>、放射冷却で地表付近の空気が露点まで冷えて発生。日が昇り気温が上がると消散します。'},
{c:'リスク・気象',q:'地上付近と上空の風に関する記述のうち、正しいものはどれか。',a:['一般に上空ほど地表の摩擦の影響が小さく、風速は大きくなる','上空の風は地上より必ず弱い','地上で無風なら上空も必ず無風である'],ans:0,ex:'地表摩擦の影響が減る<b>上空ほど風は強い</b>のが一般的。地上の体感だけで判断せず、上空の風を考慮した飛行判断が必要です。'},
{c:'リスク・気象',q:'天気図の等圧線に関する記述のうち、正しいものはどれか。',a:['等圧線の間隔が狭いほど気圧傾度力が大きく、風が強い','等圧線の間隔が狭いほど風は弱い','等圧線の間隔と風の強さに関係はない'],ans:0,ex:'等圧線が密=気圧の差が急=<b>気圧傾度力が大きく強風</b>。天気図から風の強さの傾向を読み取る基本です。'},
{c:'リスク・気象',q:'低温環境でのバッテリー運用に関する記述のうち、最も適切なものはどれか。',a:['低温では電圧降下が起きやすく飛行時間も短くなるため、保温・予熱や余裕を持った運用計画が必要である','低温の方がバッテリー性能は向上する','気温はバッテリー性能に影響しない'],ans:0,ex:'リポバッテリーは<b>低温で内部抵抗が増加</b>し、電圧降下・容量低下が起こります。冬期は保温、飛行時間の短縮を見込んだ計画が必要です。'},
{c:'リスク・気象',q:'フライアウェイ(機体が制御不能のまま飛び去る事象)への備えとして、最も適切なものはどれか。',a:['ジオフェンス設定・フェールセーフ確認など事前対策を行い、発生時は機体の追跡と周囲・関係機関への注意喚起により被害の最小化を図る','発生してから対応を考えればよい','フライアウェイは最新の機体では発生しないため対策不要である'],ans:0,ex:'<b>事前対策(設定・点検)と発生時の手順</b>の両方を準備します。発生時は目視追跡・記録、周囲への注意喚起、必要に応じ警察等への連絡を行います。'},
{c:'リスク・気象',q:'飛行中に機体に異常が発生した場合の対応として、最も適切なものはどれか。',a:['あらかじめ定めた手順に従い、人のいない安全な場所へ直ちに着陸させる','異常があっても計画どおり飛行を完了させる','機体を目で追わずに電源を切る'],ans:0,ex:'異常時は<b>第三者に危害を及ぼさない場所への速やかな着陸</b>が原則。緊急時の手順・代替着陸地点は飛行前に定めておきます。'},
{c:'リスク・気象',q:'建物や山の周囲の気流に関する記述のうち、正しいものはどれか。',a:['建物や山の風下側では乱気流が発生しやすく、機体の挙動が乱れることがある','風下側の気流は常に安定している','障害物は気流に影響を与えない'],ans:0,ex:'障害物の<b>風下側には渦(乱流)</b>が発生します。建物・樹木・尾根付近では急な機体の傾き・高度変動に備え、距離と高度の余裕を取ります。'},
{c:'規則',q:'次のうち、航空法上の「無人航空機」に該当しないものはどれか。',a:['重量99gのトイドローン','重量150gのマルチコプター','重量5kgの農薬散布用ヘリコプター'],ans:0,ex:'無人航空機は<b>重量(機体+バッテリー)100g以上</b>が対象。100g未満は「模型航空機」として扱われます(小型無人機等飛行禁止法では対象になる点に注意)。'},
{c:'規則',q:'機体への登録記号の表示に関する記述のうち、正しいものはどれか。',a:['登録記号は、機体の外部から容易に確認できる箇所に鮮明に表示しなければならない','登録記号は書類として携行すれば機体への表示は不要である','登録記号の表示は任意である'],ans:0,ex:'登録を受けた無人航空機は、<b>登録記号を機体に鮮明に表示</b>する義務があります。あわせてリモートIDの搭載も原則必要です。'},
{c:'規則',q:'リモートID機能の搭載が免除される場合として、正しいものはどれか。',a:['十分な強度を有する長さ30m以下の紐などで係留して飛行させる場合','夜間に飛行させる場合','目視外で飛行させる場合'],ans:0,ex:'免除は<b>①30m以下の紐等による係留飛行、②あらかじめ届け出た特定区域内での飛行(要件あり)、③警察等の秘匿が必要な飛行</b>など限定的です。'},
{c:'規則',q:'特定飛行の許可・承認申請の時期として、適切なものはどれか。',a:['飛行開始予定日の10開庁日前までに申請する','飛行当日に申請すればよい','飛行後に事後報告すればよい'],ans:0,ex:'許可・承認はDIPS(ドローン情報基盤システム)で<b>原則10開庁日前まで</b>に申請します。審査に時間がかかるため余裕を持った申請が推奨されます。'},
{c:'規則',q:'人口集中地区(DID)に関する記述のうち、正しいものはどれか。',a:['国勢調査の結果に基づいて設定された地区である','操縦者が人が多いと感じた地区のことである','市町村が毎月見直す地区である'],ans:0,ex:'DIDは<b>国勢調査の結果</b>に基づき設定されます(5年ごとに更新)。飛行前に地理院地図やDIPSで最新の範囲を確認します。'},
{c:'規則',q:'空港等の周辺における飛行に関する記述のうち、正しいものはどれか。',a:['空港等の周辺の上空(制限表面の上空など)の飛行は特定飛行に該当し、許可が必要である','空港から10km離れていればいかなる高度でも自由に飛行できる','空港周辺でも100m以下なら手続は一切不要である'],ans:0,ex:'空港等周辺には進入表面などの<b>制限表面</b>が設定されており、その上空の飛行は許可が必要。空港管理者等との調整も求められます。'},
{c:'規則',q:'「地表又は水面から150m以上の高さ」の飛行に関する記述のうち、正しいものはどれか。',a:['150mは海抜高度ではなく、地表又は水面からの高さで判断する','150mは海抜高度で判断する','離陸地点からの高さで判断する'],ans:0,ex:'基準は<b>機体直下の地表・水面からの高さ</b>。山の斜面上を飛ぶ場合、離陸点基準の高度計表示と実際の地表からの高さが異なる点に注意が必要です。'},
{c:'規則',q:'緊急用務空域に関する記述のうち、正しいものはどれか。',a:['災害等の際に指定される空域で、原則として無人航空機の飛行が禁止され、飛行前に指定の有無を確認する義務がある','緊急用務空域でも許可・承認があれば必ず飛行できる','緊急用務空域は事前に確認する必要はない'],ans:0,ex:'消防・救助等の有人機が活動する<b>緊急用務空域では原則飛行禁止</b>(許可・承認があっても不可)。飛行前の確認が義務付けられています。'},
{c:'規則',q:'飛行中に有人航空機が接近してきた場合の対応として、正しいものはどれか。',a:['有人航空機を優先し、無人航空機側が地上に降下させるなどして飛行経路を譲る','無人航空機が優先されるため、そのまま飛行を続ける','互いに右に回避すればよい'],ans:0,ex:'<b>有人航空機が常に優先</b>です。接近を認めたら無人航空機を降下・退避させ、衝突のおそれをなくします。'},
{c:'規則',q:'多数の者の集合する催し場所の上空における飛行の承認基準に関する記述のうち、正しいものはどれか。',a:['風速5m/s以上の場合は飛行を中止する','風速10m/sまでは飛行できる','風速に関する基準はない'],ans:0,ex:'催し場所上空の飛行では<b>風速5m/s以上で中止</b>、高度に応じた立入禁止範囲の設定、プロペラガード装着などの基準が課されます。'},
{c:'規則',q:'農薬の空中散布を行う場合に必要な手続として、正しいものはどれか。',a:['「危険物の輸送」と「物件の投下」の両方の承認が必要である','物件の投下の承認のみでよい','農薬散布は特定飛行に該当しない'],ans:0,ex:'農薬などの薬剤は危険物に該当し、散布は投下に該当するため、<b>危険物輸送+物件投下の両方の承認</b>が必要です。液体の散布も「投下」に含まれます。'},
{c:'規則',q:'国土交通大臣への報告が義務付けられている「事故」に該当しないものはどれか。',a:['人・物件に被害のない、機体表面の軽微な擦り傷','無人航空機による人の死傷(重傷以上)','第三者の所有する物件の損壊'],ans:0,ex:'報告義務のある事故は<b>①人の死傷(重傷以上)、②第三者の物件の損壊、③航空機との衝突・接触</b>。被害のない軽微な機体損傷は事故報告の対象外です(点検・整備は必要)。'},
{c:'規則',q:'事故には至らなかったものの、事故が発生するおそれがあった事態(重大インシデント)への対応として、正しいものはどれか。',a:['国土交通大臣への報告が義務付けられている','報告の必要はない','SNSで公表すれば足りる'],ans:0,ex:'<b>重大インシデント</b>(人の負傷〈軽傷〉、有人機とのニアミス、制御不能など)も国土交通大臣への報告義務があります。'},
{c:'規則',q:'カテゴリーII飛行に関する記述のうち、正しいものはどれか。',a:['二等以上の技能証明と第二種以上の機体認証があれば、DID・夜間・目視外など一部の特定飛行は個別の許可・承認が不要となる','カテゴリーII飛行にはいかなる場合も許可・承認が必要である','カテゴリーII飛行に技能証明が役立つことはない'],ans:0,ex:'立入管理措置を講じた特定飛行(カテゴリーII)のうち一部は、<b>技能証明+機体認証</b>があれば許可・承認が不要になります(25kg以上や催し上空などは引き続き必要)。'},
{c:'規則',q:'「立入管理措置」の説明として、正しいものはどれか。',a:['飛行経路下に第三者が立ち入らないよう、看板・標識・補助者の配置などで管理する措置','機体にプロペラガードを付けること','保険に加入すること'],ans:0,ex:'立入管理措置は<b>第三者の上空を飛行しないようにする措置</b>(関係者以外の立入制限)。この措置の有無がカテゴリーIIとIIIの分かれ目です。'},
{c:'規則',q:'技能証明の「限定」に関する記述のうち、正しいものはどれか。',a:['機体の種類(回転翼・飛行機など)や飛行の方法(昼間・目視内・最大離陸重量25kg未満)による限定が付され、解除には限定変更の手続が必要である','技能証明を取得すればどの機体でも無条件に飛行できる','限定は自己申告で自由に変更できる'],ans:0,ex:'技能証明には<b>機体種類・昼間・目視内・25kg未満などの限定</b>が付されます。夜間や目視外を行うには限定変更(実地試験等)が必要です。'},
{c:'規則',q:'登録講習機関の講習を修了した場合の効果として、正しいものはどれか。',a:['指定試験機関での実地試験が免除される(学科試験は免除されない)','学科試験と実地試験の両方が免除される','何も免除されない'],ans:0,ex:'登録講習機関(いわゆるドローンスクール)修了で<b>実地試験が免除</b>。学科試験と身体検査は全員が受ける必要があります。'},
{c:'規則',q:'無人航空機による撮影とプライバシーへの配慮に関する記述のうち、最も適切なものはどれか。',a:['住宅や人物が特定できる映像をインターネットで公開する場合は、ぼかし処理を行うなどプライバシーに配慮する','空から撮影した映像はプライバシーの問題を生じない','許可・承認を得た飛行であれば映像は自由に公開できる'],ans:0,ex:'航空法の手続と<b>プライバシー・個人情報への配慮は別問題</b>。総務省のガイドラインでは住宅・人物・車のナンバー等への配慮(ぼかし等)が求められています。'},
{c:'システム',q:'VTOL(パワードリフト機)の説明として、正しいものはどれか。',a:['回転翼による垂直離着陸と、固定翼による水平飛行の両方の特性を持つ機体である','垂直離着陸ができない固定翼機である','水中で使用する機体である'],ans:0,ex:'VTOLは<b>垂直離着陸+固定翼巡航</b>のハイブリッド。滑走路が不要で、長距離・長時間飛行に適します。'},
{c:'システム',q:'マルチコプターが前進する仕組みとして、正しいものはどれか。',a:['機体を前方に傾け、ロータ推力の水平方向成分によって前進する','前進専用のプロペラを回転させる','機体後部から圧縮空気を噴射する'],ans:0,ex:'後方ロータの回転数を上げて<b>機体を前傾</b>させると、推力の水平成分が推進力になります。傾けるほど水平速度は増しますが揚力とのバランスに注意。'},
{c:'システム',q:'ホバリング中のマルチコプターに関する記述のうち、正しいものはどれか。',a:['ロータの発生する推力(揚力)と機体の重力が釣り合っている','推力は重力より常に大きい','風があっても機体は傾かずに位置を維持できる'],ans:0,ex:'ホバリングは<b>推力=重力</b>の釣合い状態。風がある場合は風上側に機体を傾けて釣り合わせるため、消費電力も増加します。'},
{c:'システム',q:'地面効果に関する記述のうち、正しいものはどれか。',a:['地面付近では吹き下ろしの気流が地面に妨げられ、揚力が増加する現象が生じる','地面付近では揚力が必ず減少する','地面効果は上空150m以上で発生する'],ans:0,ex:'<b>地面効果</b>により接地直前は機体が浮きやすく(ふわつき)、着陸操作が乱れやすくなります。特性を理解して丁寧に降ろします。'},
{c:'システム',q:'リチウムポリマーバッテリー1セルあたりの公称電圧として、正しいものはどれか。',a:['約3.7V','約1.5V','約12V'],ans:0,ex:'リポは<b>1セル公称3.7V(満充電約4.2V)</b>。3セル(3S)なら公称11.1V。過放電(3.0V以下)は劣化・発火リスクにつながります。'},
{c:'システム',q:'リチウムポリマーバッテリーの充電に関する記述のうち、正しいものはどれか。',a:['専用の充電器を用い、可燃物のない場所で状態を確認しながら充電する','どの充電器でも代用できる','充電したまま外出してもよい'],ans:0,ex:'リポの充電は<b>専用充電器+監視下</b>が原則。過充電は発熱・発火の危険があり、外出中・就寝中の充電は避けます。'},
{c:'システム',q:'ESC(エレクトロニックスピードコントローラ)の役割として、正しいものはどれか。',a:['フライトコントローラの指令に基づき、モーターの回転数を制御する','機体の位置を測位する','映像を地上に伝送する'],ans:0,ex:'ESCは<b>モーター回転数の制御装置</b>。フライトコントローラ(FC)からの指令を受けて各モーターへの電力を調整します。'},
{c:'システム',q:'プロペラのピッチに関する記述のうち、正しいものはどれか。',a:['ピッチが大きいほど、プロペラ1回転あたりに進む距離が大きい','ピッチとはプロペラの枚数のことである','ピッチは飛行性能に影響しない'],ans:0,ex:'ピッチは<b>1回転で理論上進む距離</b>。大ピッチは高速向き・低ピッチは安定/上昇向きなど、特性に直結します。'},
{c:'システム',q:'送信機(プロポ)の操作モードに関する記述のうち、正しいものはどれか。',a:['モード1とモード2では、スロットルなどのスティック操作の割当てが異なる','モード1とモード2に違いはない','操作モードは飛行中に自動で切り替わる'],ans:0,ex:'<b>モード1は右スティックがスロットル、モード2は左スティックがスロットル</b>など割当てが異なります。自分の機体の設定を必ず確認します。'},
{c:'システム',q:'電波の伝搬に関する記述のうち、正しいものはどれか。',a:['送受信間に障害物がなくても、地面や水面の反射波の影響で電波が弱まることがある','見通しがあれば電波は絶対に途切れない','電波は距離によって減衰しない'],ans:0,ex:'直接波と反射波が干渉して弱め合う現象や<b>フレネルゾーン</b>への障害物のかかりで、見通しがあっても通信品質は低下し得ます。'},
{c:'システム',q:'2.4GHz帯を使用する無人航空機の運用に関する記述のうち、正しいものはどれか。',a:['Wi-FiやBluetoothなど多くの機器と周波数帯を共用しているため、都市部では混信・干渉に注意する','2.4GHz帯は無人航空機専用の周波数帯である','混信は法律で禁止されているので発生しない'],ans:0,ex:'2.4GHz帯は<b>多くの機器と共用</b>。イベント会場や住宅密集地では干渉による制御不安定が起こり得るため、電波環境の事前確認が重要です。'},
{c:'システム',q:'日本の準天頂衛星システム「みちびき」に関する記述のうち、正しいものはどれか。',a:['日本の上空に長くとどまる軌道の衛星で、GPSを補完・補強する','ロシアの衛星測位システムである','気象観測専用の衛星である'],ans:0,ex:'<b>QZSS(みちびき)は日本のGNSS</b>で、ビル街や山間部でも測位しやすくなる補完機能を持ちます。GPS(米)・GLONASS(露)・Galileo(欧)も併用されます。'},
{c:'システム',q:'RTK(リアルタイムキネマティック)に関する記述のうち、正しいものはどれか。',a:['基準局からの補正情報を利用して、数cm級の高精度な測位を行う技術である','衛星を使わずに測位する技術である','精度は通常のGNSSと変わらない'],ans:0,ex:'RTKは<b>基準局の補正情報</b>で誤差を補正し数cm級の測位を実現。測量・農業・インフラ点検などの精密飛行に用いられます。'},
{c:'システム',q:'IMU(慣性計測装置)に関する記述のうち、正しいものはどれか。',a:['加速度センサとジャイロセンサなどで構成され、機体の姿勢の推定に用いられる','気圧を測定する装置である','映像を記録する装置である'],ans:0,ex:'IMUは<b>加速度計+角速度計(ジャイロ)</b>で姿勢・動きを検出。温度変化などでドリフトするため、キャリブレーションが必要です。'},
{c:'システム',q:'下方ビジョンセンサによる位置維持に関する記述のうち、正しいものはどれか。',a:['水面や模様のない床面の上では、正しく機能せず位置維持が不安定になることがある','どのような場所でも常に正確に機能する','夜間の暗闇でも影響を受けない'],ans:0,ex:'ビジョンセンサは<b>地表の模様(特徴点)を追跡</b>して位置を推定するため、水面・単色の床・暗所では誤作動しやすくなります。'},
{c:'システム',q:'GNSSが利用できなくなった場合の機体の挙動に関する記述のうち、正しいものはどれか。',a:['位置維持ができなくなり姿勢制御のみのモード(ATTIモード等)になるため、操縦者は手動操縦に習熟しておく必要がある','GNSSがなくても位置維持機能は変わらず働く','機体は自動的に安全に着陸するので操縦は不要である'],ans:0,ex:'GNSS喪失時は<b>機体が風に流される</b>ため、ATTIモードでの手動操縦技能が重要。橋の下・屋内・ビル街では特に備えが必要です。'},
{c:'運航体制',q:'飛行の実施・中止の最終判断に関する記述のうち、最も適切なものはどれか。',a:['操縦者(機長)が安全を最優先に責任を持って判断する','依頼主の意向が常に優先される','天気予報アプリの表示だけで機械的に決める'],ans:0,ex:'発注者の都合や周囲の期待があっても、<b>安全に関する最終判断の責任は操縦者</b>にあります。中止する勇気も重要な技能です。'},
{c:'運航体制',q:'ヒューマンエラーへの対策として、最も適切なものはどれか。',a:['エラーは誰にでも起こる前提に立ち、チェックリストやダブルチェックなど仕組みで防止する','十分に訓練すればエラーは完全になくせる','エラーを起こした者を罰すれば再発しない'],ans:0,ex:'ヒューマンエラーは<b>訓練だけではゼロにできない</b>前提で、手順化・チェックリスト・指差呼称などの仕組みで補います。'},
{c:'運航体制',q:'飛行前点検の実施方法として、最も適切なものはどれか。',a:['チェックリストを用いて、項目の抜け漏れなく実施する','慣れてきたら記憶を頼りに省略してよい','点検は月に1回行えば十分である'],ans:0,ex:'飛行前点検は<b>毎回・チェックリストで</b>。記憶頼みは「いつもやっているから」という思い込みによる見落としを生みます。'},
{c:'運航体制',q:'状況認識(シチュエーショナル・アウェアネス)の説明として、最も適切なものはどれか。',a:['周囲の状況を正しく認識し、この先何が起こるかを予測する能力のことで、その喪失は事故につながる','機体のスペックを暗記していることをいう','操縦の速さのことをいう'],ans:0,ex:'状況認識は<b>知覚→理解→予測</b>のプロセス。操作への集中しすぎ・疲労・思い込みで失われやすく、喪失は事故の主要因になります。'},
{c:'運航体制',q:'飛行中に想定外の事態が発生した場合の対処として、最も適切なものはどれか。',a:['状況を検知・判断し、あらかじめ定めた手順に基づいて速やかに行動する','まず関係者全員に電話で相談する','何もせず様子を見る'],ans:0,ex:'緊急時は<b>検知→判断→行動</b>を迅速に回します。そのために緊急時手順・代替着陸地点を飛行前に定めておくことが前提です。'},
{c:'運航体制',q:'疲労と操縦に関する記述のうち、最も適切なものはどれか。',a:['睡眠不足による疲労は判断力・注意力を低下させ、飲酒に類似した影響を及ぼすことがある','疲労は気合で完全に克服できる','疲労は操縦技能に影響しない'],ans:0,ex:'徹夜明けの作業能力は<b>酒気帯びと同程度まで低下</b>するとされます。疲労時は飛行しない・交代する判断が必要です。'},
{c:'運航体制',q:'許可・承認を受けて特定飛行を行う場合の飛行マニュアルに関する記述のうち、正しいものはどれか。',a:['申請時に提出した飛行マニュアル(航空局標準マニュアル等)を遵守して飛行しなければならない','マニュアルは提出すれば守らなくてもよい','マニュアルは存在しない'],ans:0,ex:'許可・承認は<b>飛行マニュアルの遵守が前提</b>。風速制限・点検・訓練などマニュアルの条件に反した飛行は許可の範囲外になります。'},
{c:'運航体制',q:'機体の点検・整備に関する記述のうち、最も適切なものはどれか。',a:['メーカーの指定する期間・方法に従って点検整備を行い、点検整備記録を作成する','故障するまで整備は不要である','点検整備の記録は残さなくてよい'],ans:0,ex:'日常点検に加え、一定期間・飛行時間ごとの<b>定期的な点検整備と記録</b>が求められます。特定飛行では点検整備記録は飛行日誌の一部です。'},
{c:'運航体制',q:'非常時操作の訓練に関する記述のうち、最も適切なものはどれか。',a:['RTHの中断・緊急着陸などの非常時操作は、平時から反復訓練して身につけておく','非常時操作は実際に非常事態が起きてから覚えればよい','自動化が進んでいるため非常時操作の訓練は不要である'],ans:0,ex:'緊急時は考える余裕がないため、<b>非常時操作は体で覚えておく</b>必要があります。定期訓練は技能証明更新とは別に自主的に行います。'},
{c:'運航体制',q:'飛行区域周辺の第三者への配慮として、最も適切なものはどれか。',a:['必要に応じて事前の周知や現地での声かけを行い、苦情や問い合わせに対応できるようにしておく','第三者への説明は一切不要である','苦情があっても無視してよい'],ans:0,ex:'法的手続に加えて<b>地域・関係者への周知</b>はトラブル防止に有効。騒音・プライバシーへの懸念に誠実に対応することも運航者の責務です。'},
{c:'リスク・気象',q:'リスク低減の考え方として、最も適切なものはどれか。',a:['まず飛行しない・経路や時間帯を変えるなどの回避を検討し、次に影響を軽減する対策を講じる','対策はすべて事後に考える','リスクがあっても対策せずに飛行してよい'],ans:0,ex:'リスク対応の優先順位は<b>回避>低減(軽減)>保有</b>。第三者上空を避ける経路設定・人の少ない時間帯の選択が代表的な回避策です。'},
{c:'リスク・気象',q:'リスクアセスメントの一般的な手順として、正しいものはどれか。',a:['ハザードの特定 → リスクの分析 → リスクの評価 → 低減策の実施','低減策の実施 → ハザードの特定 → リスクの評価','リスクの評価のみ行えばよい'],ans:0,ex:'<b>特定→分析→評価→低減</b>の順で行い、残留リスクが許容できるレベルになるまで対策を追加します。'},
{c:'リスク・気象',q:'飛行前の気象確認として、最も適切なものはどれか。',a:['天気予報に加えて、風速・降水・雷の可能性を確認し、現地でも実際の気象を確認する','出発前にテレビの天気予報を見れば現地確認は不要である','気象確認は雨の日だけ行えばよい'],ans:0,ex:'予報と現地の実況は異なることがあります。<b>予報+現地観測(風・雲・視程)</b>の両方で飛行可否を判断します。'},
{c:'リスク・気象',q:'航空局標準飛行マニュアルにおける風速の基準として、正しいものはどれか。',a:['風速5m/s以上の場合は飛行させない','風速15m/sまで飛行できる','風速の基準は定められていない'],ans:0,ex:'標準マニュアルでは<b>風速5m/s以上で飛行中止</b>が基本(機体性能の範囲内でも)。突風はこの1.5〜2倍になり得ることも考慮します。'},
{c:'リスク・気象',q:'突風(ガスト)に関する記述のうち、正しいものはどれか。',a:['瞬間風速は平均風速の1.5〜2倍程度に達することがある','瞬間風速は平均風速と常に同じである','突風は山間部でしか発生しない'],ans:0,ex:'平均3m/sでも瞬間<b>6m/s前後の突風</b>があり得ます。機体の耐風性能は瞬間風速に対して余裕を持たせて判断します。'},
{c:'リスク・気象',q:'雷に関する記述のうち、最も適切なものはどれか。',a:['雷注意報の発表中や雷鳴が聞こえるときは、飛行を中止する','雨が降っていなければ雷の心配はない','雷は機体には影響しない'],ans:0,ex:'雷鳴が聞こえる距離は落雷の危険圏内。<b>機体・送信機・操縦者自身への落雷リスク</b>があり、直ちに着陸・退避します。'},
{c:'リスク・気象',q:'降雨時の飛行に関する記述のうち、最も適切なものはどれか。',a:['防水性能のない機体は、モーターや電子基板の故障のおそれがあるため飛行させない','小雨であればどの機体でも問題なく飛行できる','雨はバッテリーを冷却するので好ましい'],ans:0,ex:'多くの機体は<b>防水仕様ではありません</b>。浸水による故障・墜落のほか、視程悪化・レンズの水滴による視認性低下も生じます。'},
{c:'リスク・気象',q:'気温と飛行性能に関する記述のうち、正しいものはどれか。',a:['気温が高いと空気密度が低下し、揚力やモーターの効率が低下する','気温が高いほど揚力は増加する','気温は飛行性能に影響しない'],ans:0,ex:'高温では<b>空気密度が低下して推力が減り</b>、モーター・バッテリーの過熱リスクも高まります。真夏は搭載重量・飛行時間に余裕を持たせます。'},
{c:'リスク・気象',q:'標高の高い場所での飛行に関する記述のうち、正しいものはどれか。',a:['空気密度が低いため揚力が減少し、ホバリングに必要な出力が増えて飛行時間が短くなる','標高が高いほど揚力は増加する','標高は飛行性能に関係しない'],ans:0,ex:'高標高地では<b>空気が薄く推力の余裕が減少</b>。最大離陸重量・上昇性能・飛行時間が低下する前提で計画します。'},
{c:'リスク・気象',q:'晴れた日中の山の斜面付近で生じやすい風として、正しいものはどれか。',a:['谷から山頂に向かって吹き上げる谷風(斜面上昇風)','山頂から谷へ吹き降りる風のみ','斜面付近では風は発生しない'],ans:0,ex:'日中は斜面が暖められ<b>谷風(上昇風)</b>、夜間は放射冷却で<b>山風(下降風)</b>。山岳部では時間帯で風向が変わることを想定します。'},
{c:'リスク・気象',q:'高層ビル周辺の風(ビル風)に関する記述のうち、正しいものはどれか。',a:['建物の間や角の周辺では、局所的に風が強まったり乱流が生じたりする','ビルの周辺の風は常に一様で穏やかである','ビル風は夜間しか発生しない'],ans:0,ex:'ビルの谷間・角では<b>風の収束・剥離による強風と乱流</b>が発生します。市街地では上空・ビル陰の風の急変に注意します。'},
{c:'リスク・気象',q:'接地逆転層に関する記述のうち、正しいものはどれか。',a:['晴れた夜間の放射冷却により地表付近の気温が上空より低くなる層で、霧や煙が滞留しやすい','地表付近の気温が上空より高くなる現象である','逆転層の中では常に強風が吹く'],ans:0,ex:'逆転層内は大気が安定して<b>霧・煙・汚染物質が滞留</b>しやすく、視程悪化の原因になります。早朝の飛行では特に注意します。'},
{c:'リスク・気象',q:'送電線・鉄塔付近の飛行に関する記述のうち、最も適切なものはどれか。',a:['送電線は目視で確認しにくいため、経路設定時に地図と現地調査で位置を確認し、十分な距離をとる','送電線は太いので必ず目視できる','送電線に接触しても機体に影響はない'],ans:0,ex:'細い電線・支線は<b>上空からも地上からも視認困難</b>。接触・墜落事故の典型要因であり、事前調査と余裕のある経路設定が必須です。'},
{c:'リスク・気象',q:'夜間飛行のリスクとして、最も適切なものはどれか。',a:['距離感や障害物の把握が難しく、機体の向きも見失いやすいため、灯火・照明・補助者などの対策が必要である','夜間は人が少ないためリスクは日中より常に低い','夜間でも視認性は日中と変わらない'],ans:0,ex:'夜間は<b>奥行き感覚の喪失・障害物の見落とし・機体姿勢の誤認</b>が起こりやすくなります。夜間の限定変更には専用の訓練が必要です。'},
{c:'リスク・気象',q:'目視外飛行のリスク管理として、最も適切なものはどれか。',a:['カメラ映像やテレメトリー(機体情報)の監視、電波リンク喪失時の対策、飛行経路下の立入管理をあらかじめ講じる','目視外飛行は目視内飛行と同じ管理でよい','機体が見えなくても特別な対策は不要である'],ans:0,ex:'目視外では<b>機上カメラ・機体情報での監視体制</b>と、リンク喪失時のフェールセーフ設定、経路下の安全確保が要件になります。'},
{c:'リスク・気象',q:'飛行後の活動として、最も適切なものはどれか。',a:['飛行記録を付け、ヒヤリハットがあれば記録・分析して次の運航の改善につなげる','無事に終われば振り返りは不要である','記録は事故が起きたときだけ付ければよい'],ans:0,ex:'<b>記録→振り返り→改善</b>のサイクルが安全文化の基本。ヒヤリハットの蓄積は重大事故の予防につながります(ハインリッヒの法則)。'},
{c:'計算問題',q:'時速36kmで飛行する無人航空機が500m移動するのに要する時間はおよそ何秒か。',a:['約50秒','約36秒','約14秒'],ans:0,ex:'36km/h=36000m÷3600s=<b>10m/s</b>。500m÷10m/s=<b>50秒</b>。km/h→m/sの換算は<b>「÷3.6」</b>と覚えます。'},
{c:'計算問題',q:'容量5000mAhのバッテリーを平均電流20Aで使用し、容量の80%まで使えるとした場合の飛行可能時間はおよそ何分か。',a:['約12分','約20分','約15分'],ans:0,ex:'5000mAh=5Ah。使用可能容量=5×0.8=4Ah。4Ah÷20A=0.2h=<b>12分</b>。実運用ではさらに帰還・予備分の余裕を確保します。'},
{c:'計算問題',q:'最大離陸重量5kgの機体で、バッテリーを含む機体重量が4kgのとき、搭載できるペイロードの最大重量はいくらか。',a:['1kg','5kg','4kg'],ans:0,ex:'搭載可能重量=最大離陸重量-機体重量(バッテリー込み)=5-4=<b>1kg</b>。カメラ・ジンバルなどの装備品もすべて含めて計算します。'},
{c:'計算問題',q:'対気速度10m/sで飛行中、正面から4m/sの向かい風を受けている場合の対地速度はいくらか。',a:['6m/s','14m/s','10m/s'],ans:0,ex:'対地速度=対気速度-向かい風=10-4=<b>6m/s</b>(追い風なら加算)。往路と復路で所要時間・電力消費が変わることを飛行計画に反映します。'},
{c:'計算問題',q:'対地速度12m/sで3分間飛行したときの移動距離はいくらか。',a:['2160m','360m','1200m'],ans:0,ex:'距離=速度×時間=12m/s×180s=<b>2160m</b>。「分」を必ず「秒」に換算してから計算するのがポイントです。'},
{c:'計算問題',q:'電圧22.2Vのバッテリーで平均電流30Aが流れているときの消費電力はおよそいくらか。',a:['約666W','約52W','約1332W'],ans:0,ex:'電力P=電圧V×電流I=22.2×30=<b>666W</b>。P=VIは電気計算の基本式です。'},
{c:'計算問題',q:'総重量2kgの機体がホバリングするために必要な推力はおよそ何Nか(重力加速度9.8m/s²)。',a:['約19.6N','約2N','約9.8N'],ans:0,ex:'必要推力=質量×重力加速度=2×9.8=<b>19.6N</b>。ホバリングは推力と重力が釣り合った状態です。'},
{c:'計算問題',q:'総重量4kgのクアッドコプター(ロータ4基)がホバリングしているとき、1基のロータが分担する推力はおよそ何kgf相当か。',a:['約1kgf','約4kgf','約2kgf'],ans:0,ex:'4kg÷4基=<b>1kgf/基</b>。安定した操縦のためには最大推力に総重量の2倍程度の余裕(推力重量比2:1)が目安とされます。'},
{c:'計算問題',q:'風速18km/hをm/sに換算するといくらか。',a:['5m/s','18m/s','1.8m/s'],ans:0,ex:'18÷3.6=<b>5m/s</b>。天気予報などのkm/h表示と、飛行判断基準のm/sを即座に換算できるようにしておきましょう。'},
{c:'計算問題',q:'公称電圧3.7Vのリチウムポリマーバッテリーセルを4本直列(4S)にした場合の公称電圧はいくらか。',a:['14.8V','3.7V','22.2V'],ans:0,ex:'直列接続では電圧が加算:3.7×4=<b>14.8V</b>(6Sなら22.2V)。直列では容量(mAh)は増えません。'},
{c:'計算問題',q:'5000mAhのバッテリー2本を並列に接続した場合の合成容量はいくらか。',a:['10000mAh','5000mAh','2500mAh'],ans:0,ex:'並列接続では<b>容量が加算</b>されて10000mAh(電圧は変わらない)。直列=電圧加算・容量そのまま、並列=容量加算・電圧そのまま、と対で覚えます。'},
{c:'計算問題',q:'バッテリー残容量が1500mAhのとき、平均電流15Aで飛行を続けられる時間はおよそ何分か。',a:['約6分','約10分','約15分'],ans:0,ex:'1.5Ah÷15A=0.1h=<b>6分</b>。残量から飛行可能時間を暗算できると、帰還(RTH)開始の判断に役立ちます。'},
{c:'計算問題',q:'上昇速度3m/sで高度150mまで上昇するのに要する時間はいくらか。',a:['50秒','30秒','45秒'],ans:0,ex:'150m÷3m/s=<b>50秒</b>。時間=距離÷速度の基本形です。'},
{c:'計算問題',q:'質量2kgの機体が速度10m/sで飛行しているときの運動エネルギーはいくらか。',a:['100J','20J','200J'],ans:0,ex:'運動エネルギーE=1/2×m×v²=0.5×2×10²=<b>100J</b>。速度が2倍になるとエネルギーは4倍。衝突時の危害の大きさに直結する計算です。'},
{c:'計算問題',q:'対気速度10m/sの機体が5m/sの追い風を受けて1.5km移動する場合の所要時間はいくらか。',a:['100秒','150秒','300秒'],ans:0,ex:'対地速度=10+5=<b>15m/s</b>。1500m÷15m/s=<b>100秒</b>。帰路は向かい風(対地5m/s)となり所要時間が3倍になる点まで考えるのが実戦的です。'},
{c:'規則',q:'飛行前に確認すべき事項として、最も適切なものはどれか。',a:['機体の状況・気象・バッテリー残量・リモートID機能の作動状況などを確認する','バッテリー残量だけ確認すればよい','飛行前確認は特定飛行のときだけ行えばよい'],ans:0,ex:'飛行前確認は<b>すべての飛行で義務</b>。外部点検・作動点検、気象、飛行空域(緊急用務空域の指定含む)、リモートIDの作動などを確認します。'},
{c:'規則',q:'飛行日誌(飛行記録)の記載時期として、正しいものはどれか。',a:['飛行のつど、飛行後に遅滞なく記載する','月末にまとめて記載すればよい','記載時期に決まりはない'],ans:0,ex:'飛行記録は<b>飛行のつど遅滞なく</b>記載します。虚偽記載や不記載は罰則の対象です。'},
{c:'規則',q:'無人航空機操縦者技能証明を取得できる年齢として、正しいものはどれか。',a:['16歳以上','18歳以上','20歳以上'],ans:0,ex:'技能証明の取得は<b>16歳以上</b>。ただし航空法違反等があると拒否・取消しの対象になります。'},
{c:'規則',q:'技能証明の取消し等に関する記述のうち、正しいものはどれか。',a:['アルコールの影響下で飛行させるなどの違反行為は、技能証明の取消し等の処分の対象となる','技能証明は一度取得すればいかなる違反でも取り消されない','取消しは機体登録に対してのみ行われる'],ans:0,ex:'重大な違反(飲酒飛行・危険飛行など)は<b>技能証明の取消し・効力停止</b>の対象。取消し後は一定期間再取得できません。'},
{c:'規則',q:'一等無人航空機操縦士の身体検査に関する記述のうち、正しいものはどれか。',a:['視力・色覚・聴力などについて身体検査基準への適合が必要である','身体検査は一切ない','身体検査は二等のみに課される'],ans:0,ex:'技能証明には<b>身体検査基準への適合</b>が必要(自動車免許等の提出または医療機関の診断書等で証明)。一等の25kg以上の限定などではより厳格な証明が求められます。'},
{c:'規則',q:'十分な強度の紐(30m以下)で係留し、立入管理措置を講じて飛行させる場合でも、許可・承認が必要となる飛行はどれか。',a:['地表から150m以上の高さの飛行','人口集中地区上空の飛行','夜間飛行'],ans:0,ex:'係留+立入管理でDID・夜間・目視外・30m未満などは許可不要になりますが、<b>空港周辺・150m以上・催し上空・危険物・物件投下は対象外</b>(引き続き手続が必要)です。'},
{c:'規則',q:'型式認証と機体認証の関係に関する記述のうち、正しいものはどれか。',a:['型式認証を受けた型式の量産機は、機体認証の検査の全部又は一部が省略される','型式認証があれば機体認証は自動的に付与される','型式認証は個々の機体ごとに行う認証である'],ans:0,ex:'<b>型式認証=設計・製造過程(型式)への認証、機体認証=個々の機体への認証</b>。型式認証機は機体認証時の検査が簡略化されます。'},
{c:'規則',q:'機体認証の「使用の条件」に関する記述のうち、正しいものはどれか。',a:['最大風速や雨天の可否などの使用条件が指定され、その範囲内で飛行させなければならない','使用条件はあくまで参考であり守る義務はない','使用条件は操縦者が自由に変更できる'],ans:0,ex:'機体認証では<b>使用の条件(風速・降水・高度など)</b>が指定されます。条件を逸脱した飛行は認証の前提を失い、安全性も担保されません。'},
{c:'規則',q:'飛行計画の通報内容に含まれるものとして、正しいものはどれか。',a:['飛行の経路・日時・高度、機体・操縦者の情報、連絡先など','操縦者の趣味・特技','機体の購入価格'],ans:0,ex:'飛行計画には<b>経路・日時・高度、機体登録記号、技能証明番号、緊急連絡先</b>などを含めてDIPSで通報します。'},
{c:'規則',q:'他の無人航空機の飛行計画と経路・時間帯が重複していた場合の対応として、最も適切なものはどれか。',a:['飛行計画を確認し、経路や時間帯の調整・関係者との連絡により衝突を回避する','先に飛んだ方が優先なのでそのまま飛行する','重複は気にせず飛行してよい'],ans:0,ex:'飛行計画の通報制度は<b>無人航空機同士の衝突防止</b>も目的。重複時は計画の変更・調整を行います。'},
{c:'規則',q:'FPV(機体カメラ映像)伝送に5.8GHz帯を使用する場合に関する記述のうち、正しいものはどれか。',a:['アマチュア無線技士の資格とアマチュア局の開局が必要で、業務目的では使用できない','5.8GHz帯は資格なしで誰でも使用できる','アマチュア局は営利業務にも使用できる'],ans:0,ex:'5.8GHz帯FPVは<b>アマチュア無線(4級以上+開局)</b>が必要で、<b>営利・業務利用は不可</b>。業務なら5.7GHz帯(三陸特以上)を使います。'},
{c:'規則',q:'道路の上空での飛行や道路からの離着陸に関する記述のうち、最も適切なものはどれか。',a:['交通に影響を及ぼすおそれがある場合は、所轄警察署長の道路使用許可が必要になることがある','道路上空は航空法の許可があれば道路交通法の手続は一切不要である','道路は公共物なので自由に離着陸できる'],ans:0,ex:'道路上での離着陸・低空飛行は<b>道路交通法の道路使用許可</b>の対象となる場合があります。航空法の手続とは別に確認が必要です。'},
{c:'規則',q:'小型無人機等飛行禁止法の対象施設に該当しないものはどれか。',a:['一般の商業ビル','国会議事堂','原子力事業所'],ans:0,ex:'対象は<b>国の重要施設(国会・官邸等)、皇居、外国公館、防衛関係施設、空港(指定)、原子力事業所</b>など。一般の商業ビルは対象外です(周囲おおむね300mが規制範囲)。'},
{c:'規則',q:'災害時の捜索・救助のための飛行に関する記述のうち、正しいものはどれか。',a:['国や地方公共団体(依頼を受けた者を含む)が行う捜索・救助等の飛行には、特定飛行の許可・承認規定の適用除外の特例がある','捜索・救助でも通常どおりすべての手続が必要である','誰が行う場合でも無条件に適用除外となる'],ans:0,ex:'<b>国・自治体等による捜索救助等</b>は、緊急性から許可・承認等の規定が適用除外となる特例があります(安全確保措置は必要)。'},
{c:'規則',q:'カテゴリーI飛行に関する記述のうち、正しいものはどれか。',a:['特定飛行に該当しない飛行で、航空法上の飛行許可・承認手続は不要である(基本的な遵守事項は適用される)','カテゴリーI飛行にも許可・承認が必要である','カテゴリーI飛行では飛行前確認も不要である'],ans:0,ex:'カテゴリーIは<b>特定飛行に該当しない飛行</b>で手続不要。ただし飛行前確認・衝突予防・アルコール禁止などの<b>基本ルールは全飛行に適用</b>されます。'},
{c:'規則',q:'最大離陸重量25kg以上の機体を飛行させる場合に関する記述のうち、正しいものはどれか。',a:['技能証明の「25kg未満」の限定を変更する必要がある','25kg以上でも限定の変更は不要である','25kg以上の機体は飛行させることができない'],ans:0,ex:'技能証明には最大離陸重量25kg未満の限定が付されるのが基本で、25kg以上の機体には<b>限定変更</b>が必要。機体側の審査も厳格になります。'},
{c:'規則',q:'無人航空機の損害賠償責任保険に関する記述のうち、最も適切なものはどれか。',a:['加入は法律上の義務ではないが、事故時の賠償資力確保のため加入が強く推奨される','法律で加入が義務付けられている','保険は機体の修理費用のみを補償するものしかない'],ans:0,ex:'賠償責任保険は<b>義務ではないが実質必須</b>。対人・対物の賠償責任保険と、機体自体の損害を補償する機体保険は別物です。'},
{c:'規則',q:'「無人航空機の飛行の安全に関する教則」に関する記述のうち、正しいものはどれか。',a:['学科試験の出題範囲の基準となる文書で、定期的に改訂されるため最新版で学習する','一度発行されたら改訂されることはない','教則は義務教育の教科書である'],ans:0,ex:'教則は<b>学科試験のシラバス</b>に相当し、制度改正等に応じて改訂されます。受験時は最新版に対応した学習が必須です。'},
{c:'システム',q:'ボルテックスリングステート(セットリングウィズパワー)に関する記述のうち、正しいものはどれか。',a:['垂直に急降下すると自らの吹き下ろしの渦の中に入り、出力を上げても揚力を回復できず急激に沈下する現象である','上昇中にのみ発生する現象である','固定翼機特有の現象である'],ans:0,ex:'<b>一等最頻出</b>。回転翼機が自分のダウンウォッシュに入り込む現象で、スロットルを上げても悪化します。予防は<b>降下速度を抑える・水平移動を伴いながら降下する</b>こと。'},
{c:'システム',q:'ボルテックスリングステートに陥った場合の回復操作として、最も適切なものはどれか。',a:['水平方向に移動して渦から離脱する','その場でスロットルを最大にして上昇を試みる','何もせず自然回復を待つ'],ans:0,ex:'渦の中でスロットルを上げても<b>沈下が悪化</b>します。<b>前進などの水平移動で渦流から抜ける</b>のが正しい回復操作です。'},
{c:'システム',q:'翼に揚力が発生する主な仕組みとして、正しいものはどれか。',a:['翼上面の流速が速くなり圧力が低下することで、上向きの力が生じる','翼の下面の空気が加熱されるため','翼の重量が軽いため'],ans:0,ex:'翼周りの流れによって<b>上面の圧力が下面より低く</b>なり揚力が発生します(ベルヌーイの定理)。迎え角によっても揚力は変化します。'},
{c:'システム',q:'翼端渦と誘導抗力に関する記述のうち、正しいものはどれか。',a:['翼端では下面から上面へ空気が回り込んで渦が生じ、これが誘導抗力の原因となる','翼端渦は揚力を増加させる','誘導抗力は速度に関係なく一定である'],ans:0,ex:'揚力の発生に伴い<b>翼端渦→誘導抗力</b>が生じます。誘導抗力は低速時ほど大きくなる特性があります。'},
{c:'システム',q:'ヘリコプター(回転翼機)のオートローテーションに関する記述のうち、正しいものはどれか。',a:['エンジン停止時に、降下による空気の流れでロータを回転させ、揚力を保ちながら降下・着陸する操作である','エンジン出力を最大にして上昇する操作である','ロータを完全に停止させて滑空する操作である'],ans:0,ex:'オートローテーションは<b>動力喪失時の緊急降下技術</b>。下からの空気流でロータの回転を維持し、接地直前に揚力を使って衝撃を和らげます。'},
{c:'システム',q:'機体の重心位置に関する記述のうち、正しいものはどれか。',a:['重心位置が設計範囲から外れると飛行の安定性・操縦性が損なわれるため、ペイロード搭載時は重心位置を確認する','重心位置は飛行特性に影響しない','ペイロードはどこに取り付けても同じである'],ans:0,ex:'カメラ・積載物の取付けで<b>重心が偏ると姿勢制御が乱れ</b>、モーターへの負荷も不均等になります。搭載位置・バランスの確認が必要です。'},
{c:'システム',q:'バッテリーのCレートに関する記述のうち、正しいものはどれか。',a:['放電能力を表す指標で、5000mAh・10Cのバッテリーなら最大50Aの放電が可能である','バッテリーの重さを表す指標である','Cレートが大きいほど放電能力は低い'],ans:0,ex:'最大放電電流=容量×Cレート。5Ah×10C=<b>50A</b>。機体の要求電流に対して余裕のあるCレートのバッテリーを使います。'},
{c:'システム',q:'バッテリーのメモリー効果に関する記述のうち、正しいものはどれか。',a:['ニッケル系電池で見られる現象で、リチウムポリマー電池ではほとんど生じない','リチウムポリマー電池特有の現象である','すべての電池で必ず生じる'],ans:0,ex:'メモリー効果(浅い充放電の繰返しで容量が減ったように見える現象)は<b>ニカド・ニッケル水素系</b>のもの。リポでは実質問題になりません。'},
{c:'システム',q:'バッテリーの保管環境として、最も適切なものはどれか。',a:['直射日光や高温を避け、涼しく乾燥した場所で保管する','真夏の車内に置いてよい','ストーブの近くで保温する'],ans:0,ex:'高温は劣化・膨張・発火の原因。<b>涼しい場所で残量50〜60%程度</b>での保管が基本。金属と接触しない絶縁保管も重要です。'},
{c:'システム',q:'磁北と真北に関する記述のうち、正しいものはどれか。',a:['地磁気の偏角により磁北と真北はずれており、日本では磁北が真北より西に偏っている','磁北と真北は世界中どこでも一致する','偏角は日本国内で0度である'],ans:0,ex:'日本では<b>西偏約5〜10度</b>(地域差あり)。コンパス方位と地図の方位のずれとして現れます。'},
{c:'システム',q:'GNSSのDOP(精度低下率)に関する記述のうち、正しいものはどれか。',a:['衛星の配置の良し悪しを示す指標で、値が小さいほど測位精度が良い','値が大きいほど測位精度が良い','DOPは電波の強さを表す'],ans:0,ex:'DOPは<b>衛星配置による精度への影響</b>を示し、<b>小さいほど良好</b>。上空視界が開け、多方向の衛星を捕捉できると小さくなります。'},
{c:'システム',q:'アンテナの指向性に関する記述のうち、正しいものはどれか。',a:['指向性アンテナは特定の方向への感度・利得が高く、向きによって通信品質が変わる','アンテナの向きは通信品質に影響しない','無指向性アンテナは特定方向にしか電波を出さない'],ans:0,ex:'送信機のアンテナの<b>向きで受信強度は大きく変わります</b>。アンテナの真延長方向は感度が落ちるため、機体に側面を向けるのが基本です。'},
{c:'システム',q:'ダイバーシティ受信に関する記述のうち、正しいものはどれか。',a:['複数のアンテナで受信し、良好な信号を選択・合成することで通信を安定させる技術である','1本のアンテナだけで受信する技術である','送信出力を上げる技術である'],ans:0,ex:'<b>複数アンテナの併用</b>でフェージングや遮蔽の影響を軽減します。映像伝送・操縦系の受信安定化に使われます。'},
{c:'システム',q:'携帯電話網(LTE等)を上空で利用する場合に関する記述のうち、正しいものはどれか。',a:['地上向けのサービスであるため、上空利用には実用化試験局の手続など所定の手続が必要である','通常のスマートフォン契約のまま無条件で上空利用できる','携帯電話網は上空では一切使えない'],ans:0,ex:'携帯電話網は地上向け設計のため、ドローンでの上空利用には<b>キャリアとの手続(実用化試験局等)</b>が必要です。長距離目視外飛行の通信手段として重要です。'},
{c:'システム',q:'障害物検知センサに関する記述のうち、正しいものはどれか。',a:['ガラスなどの透明な面や細い電線は、センサで検知できないことがある','センサがあればあらゆる障害物を確実に検知できる','障害物検知センサは夜間のみ機能する'],ans:0,ex:'ビジョン・超音波・赤外線・LiDARいずれも<b>透明面・細線・逆光などの苦手条件</b>があります。センサ任せにせず目視・経路設計で回避します。'},
{c:'システム',q:'パラシュートシステムに関する記述のうち、最も適切なものはどれか。',a:['制御不能時に落下の衝撃を緩和する装置で、第三者上空リスクの軽減策の一つとされる','パラシュートがあればいかなる場所でも自由に飛行できる','パラシュートは飛行時間を延ばす装置である'],ans:0,ex:'パラシュートは<b>墜落時の運動エネルギーを低減</b>する被害軽減策。カテゴリーIII飛行のリスク評価でも考慮される装備です。'},
{c:'システム',q:'農薬散布用無人航空機の運用に関する記述のうち、最も適切なものはどれか。',a:['散布装置の点検を行い、飛行高度・速度を一定に保つことが散布の均一性につながる','高度・速度は散布品質に影響しない','散布装置は点検しなくてよい'],ans:0,ex:'散布均一性は<b>高度・速度・散布幅の管理</b>で決まります。薬剤の飛散(ドリフト)防止のため風速条件の管理も重要です。'},
{c:'システム',q:'機体の防塵・防水性能を示す規格として、正しいものはどれか。',a:['IPコード(IP○○などの等級表示)','PSEマーク','JASマーク'],ans:0,ex:'<b>IPコード</b>は防塵(第1数字)・防水(第2数字)の保護等級。例:IP45。機体の使用条件(降雨可否)の判断材料になります。'},
{c:'運航体制',q:'ハザーダスアティチュード(危険な態度)のうち、「規則はくだらない、自分には不要だ」と考える態度はどれか。',a:['反権威(反抗)','無敵感(不死身)','諦め(無力感)'],ans:0,ex:'危険な態度は<b>①反権威②衝動性③無敵感④マッチョ(自己顕示)⑤諦め</b>の5類型。「規則不要」は<b>反権威</b>で、対抗策は「規則はたいてい正しい」と唱えることです。'},
{c:'運航体制',q:'ハザーダスアティチュードへの対処法(アンチドート)として、最も適切なものはどれか。',a:['自分の危険な態度に気づき、それを打ち消す正しい考え方を意識的に唱える','危険な態度は性格なので対処できない','態度は事故と無関係なので放置してよい'],ans:0,ex:'例:「早くやらなければ」(衝動性)→<b>「急がば回れ、まず考える」</b>。5つの態度それぞれに対応するアンチドートを覚えておきます。'},
{c:'運航体制',q:'飲酒後の操縦に関する記述のうち、最も適切なものはどれか。',a:['アルコールの分解時間には個人差があり、一晩寝ても体内に残っていることがある','ビール1杯なら直後でも操縦してよい','酔いが覚めたと感じれば必ず操縦できる'],ans:0,ex:'アルコールの分解速度は<b>体質・体調・量で大きく異なり</b>、自覚がなくても残存します。「影響がある間は飛行禁止」が航空法の要求です。'},
{c:'運航体制',q:'夜間の視覚特性に関する記述のうち、正しいものはどれか。',a:['暗さに目が慣れる暗順応には30分程度かかるため、夜間飛行前は強い光を見ることを避ける','暗順応は数秒で完了する','夜間でも昼間と同じように色や距離を認識できる'],ans:0,ex:'<b>暗順応には約30分</b>かかり、強い光で一瞬でリセットされます。夜間は色の識別・距離感も低下するため、灯火や照明の計画が重要です。'},
{c:'運航体制',q:'ワークロード(作業負荷)管理に関する記述のうち、最も適切なものはどれか。',a:['負荷が過大にならないよう、自動化機能の活用や補助者への役割分担で作業を配分する','操縦者がすべての作業を一人で抱えるのがよい','作業負荷は安全性と無関係である'],ans:0,ex:'過大なワークロードは<b>状況認識の喪失・操作ミス</b>を招きます。優先順位付け、自動化(高度維持・RTH)の活用、役割分担で管理します。'},
{c:'運航体制',q:'補助者との通信における復唱(リードバック)の目的として、最も適切なものはどれか。',a:['指示内容の聞き間違い・誤解を防ぎ、相互に確認する','通信時間を長くする','命令の上下関係を明確にする'],ans:0,ex:'「離陸します」「離陸了解」のような<b>復唱で誤解を排除</b>します。簡潔で明確な用語をチームで統一しておくことも重要です。'},
{c:'運航体制',q:'シミュレータや訓練用機体を用いた訓練に関する記述のうち、最も適切なものはどれか。',a:['実機のリスクを伴わずに緊急時操作や悪条件下の操縦を反復練習できる','シミュレータ訓練には意味がない','訓練は実機の本番飛行だけで行うべきである'],ans:0,ex:'ATTIモード操縦・機器故障対応などの<b>リスクの高い訓練はシミュレータや小型訓練機</b>で安全に反復するのが効果的です。'},
{c:'運航体制',q:'許可・承認が必要な飛行方法(夜間・目視外など)の訓練に関する記述のうち、正しいものはどれか。',a:['所定の手続をとった上で、十分な経験を有する監督者の下、安全を確保して行う','訓練であれば手続なしで夜間飛行してよい','訓練に監督者は不要である'],ans:0,ex:'夜間・目視外等の<b>訓練自体にも許可・承認等の手続が必要</b>です。訓練空域の安全確保と経験者の監督の下で実施します。'},
{c:'運航体制',q:'一人で運航する場合のリスクへの対処として、最も適切なものはどれか。',a:['操縦に集中すると周囲監視が疎かになりやすいため、補助者の配置や自動化機能の活用を検討する','一人運航にリスクはない','周囲の監視は不要である'],ans:0,ex:'単独運航は<b>監視・判断・操作が一人に集中</b>します。补助者の確保が難しい場合も、飛行の単純化・自動化機能・区域の限定でリスクを下げます。'},
{c:'運航体制',q:'複数の操縦者が交代して飛行させる場合の引継ぎとして、最も適切なものはどれか。',a:['機体の状態・バッテリー残量・周囲の状況・飛行計画の進捗を確実に引き継ぐ','特に引継ぎは不要である','機体の色だけ伝えればよい'],ans:0,ex:'交代時の<b>情報の欠落は事故要因</b>になります。決められた項目(機体状態・残量・気象・特記事項)をチェックリストで引き継ぎます。'},
{c:'リスク・気象',q:'大気の安定・不安定に関する記述のうち、正しいものはどれか。',a:['大気が不安定なときは対流が発達しやすく、突風や積乱雲が発生しやすい','大気が安定なときほど積乱雲が発達する','大気の安定度は気象に影響しない'],ans:0,ex:'<b>不安定=上昇気流・対流雲・突風</b>、安定=層状の雲・霧・視程悪化。それぞれ異なるリスクがあることを理解しておきます。'},
{c:'リスク・気象',q:'フェーン現象に関する記述のうち、正しいものはどれか。',a:['湿った空気が山を越えて吹き降りるとき、高温で乾燥した風となる現象である','山を越えた風は必ず低温多湿になる','フェーン現象は海上でのみ発生する'],ans:0,ex:'フェーンでは風下側で<b>気温上昇・乾燥・強風</b>となり、火災リスクや乱流に注意が必要です。'},
{c:'リスク・気象',q:'雷の発生に関する記述のうち、正しいものはどれか。',a:['夏の強い日射による上昇気流で発生する熱雷や、前線に伴う界雷などがある','雷は冬には一切発生しない','雷は平地では発生しない'],ans:0,ex:'雷には<b>熱雷・界雷・渦雷</b>などがあり、日本海側では冬季雷もあります。雷注意報・雷レーダーの確認を習慣化しましょう。'},
{c:'リスク・気象',q:'台風が接近している場合の運航判断として、最も適切なものはどれか。',a:['接近前から風が強まり天候が急変するため、早めに飛行中止を判断する','台風の中心が来るまでは通常どおり飛行できる','台風情報は確認しなくてよい'],ans:0,ex:'台風は<b>中心から離れた場所でも強風域・外側降雨帯</b>の影響があります。予報円・強風域を確認し、余裕を持った中止判断をします。'},
{c:'リスク・気象',q:'日本付近の冬の季節風に関する記述のうち、正しいものはどれか。',a:['シベリア高気圧からの北西の季節風が強く、日本海側では雪となることが多い','冬は南東の季節風が卓越する','冬の季節風は弱く飛行に影響しない'],ans:0,ex:'冬型(西高東低)の気圧配置では<b>北西季節風が強く</b>、等圧線が縦じまに密になります。日本海側は雪・視程不良、太平洋側は乾燥・強風です。'},
{c:'リスク・気象',q:'視程に関する記述のうち、正しいものはどれか。',a:['霧・もや・降水などにより視程が低下すると、目視内飛行の成立自体が困難になる','視程は飛行の安全に関係しない','視程が悪いほど目視外飛行の許可が不要になる'],ans:0,ex:'目視内飛行は<b>機体の位置・姿勢・周囲を肉眼で確認できること</b>が前提。視程低下時は飛行中止や延期を判断します。'},
{c:'リスク・気象',q:'雲に関する記述のうち、正しいものはどれか。',a:['乱層雲は持続的な雨をもたらし、積乱雲は雷や突風を伴う','積乱雲は穏やかな晴天をもたらす','雲の種類と天気に関係はない'],ans:0,ex:'<b>乱層雲=しとしと続く雨、積乱雲=激しい雨・雷・突風</b>。雲の観察は現地での天気急変の予測に役立ちます。'},
{c:'リスク・気象',q:'ウィンドシアに関する記述のうち、正しいものはどれか。',a:['風向・風速が空間的に急変する現象で、低高度では機体の姿勢・高度が急に乱れる危険がある','風が完全に止まる現象である','ウィンドシアは高高度でのみ発生する'],ans:0,ex:'ウィンドシアは<b>前線通過時・ガストフロント・地形の影響</b>などで発生。低高度では回復の余裕がなく特に危険です。'},
{c:'リスク・気象',q:'機体への着氷に関する記述のうち、正しいものはどれか。',a:['0℃以下で過冷却水滴がプロペラなどに付着すると、揚力低下・重量増加・振動の原因となる','着氷は機体性能を向上させる','着氷は真夏にのみ発生する'],ans:0,ex:'着氷は<b>プロペラの形状を変えて効率を低下</b>させ、バランスも崩します。冬季・高高度・雲中では着氷条件に注意します。'},
{c:'リスク・気象',q:'鳥類との接近(バードストライク)への対応として、最も適切なものはどれか。',a:['鳥が接近してきた場合は高度・経路を変えて回避し、営巣期の縄張りには近づかない','鳥は機体を避けるので対策不要である','鳥に向かって機体を接近させて追い払う'],ans:0,ex:'猛禽類などは<b>縄張りに入った機体を攻撃</b>することがあります。接近されたら速やかに離脱し、営巣地周辺の飛行は避けます。'},
{c:'リスク・気象',q:'サーマル(熱上昇流)に関する記述のうち、正しいものはどれか。',a:['日射で暖められた地表から発生する上昇気流で、機体の高度が意図せず変動する原因となる','夜間に最も強く発生する','サーマルは水面上で最も強い'],ans:0,ex:'晴れた日中の<b>アスファルト・砂地など暖まりやすい地表</b>で発生。高度維持の乱れ・姿勢変動の原因になります。'},
{c:'リスク・気象',q:'リチウムポリマーバッテリーの火災への対応として、最も適切なものはどれか。',a:['大量の水で冷却するか、延焼を防いだ上で燃え尽きるまで監視する(再燃に注意する)','燃えているバッテリーを素手で持ち出す','消火後はすぐに可燃物の近くに置いてよい'],ans:0,ex:'リポ火災は<b>熱暴走により再燃しやすい</b>のが特徴。大量の水での冷却が有効で、消えた後も監視を続けます。'},
{c:'リスク・気象',q:'機体が墜落した場合の現場対応として、最も適切なものはどれか。',a:['第三者を近づけず、高温の機体・バッテリーに素手で触れず、火災の発生に警戒する','すぐに素手で機体を回収する','墜落現場は放置して立ち去る'],ans:0,ex:'墜落直後は<b>バッテリー損傷による発火リスク</b>があります。周囲の安全確保→負傷者の有無確認→状況記録→必要な報告、の順で対応します。'},
{c:'リスク・気象',q:'気象庁の注意報・警報と運航判断に関する記述のうち、最も適切なものはどれか。',a:['強風注意報や雷注意報が発表されているときは、飛行の中止・延期を検討する','注意報は無視してよい','警報発表中でも通常どおり飛行できる'],ans:0,ex:'注意報・警報は<b>客観的な中止判断の基準</b>として飛行マニュアルに組み込むのが実務的。発表状況は飛行前確認の必須項目です。'},
{c:'規則',q:'登録記号の表示サイズに関する記述のうち、正しいものはどれか。',a:['最大離陸重量25kg以上の機体は文字の高さ25mm以上、25kg未満は3mm以上で表示する','すべての機体で1mm以上あればよい','表示サイズに決まりはない'],ans:0,ex:'登録記号は<b>25kg以上:高さ25mm以上、25kg未満:3mm以上</b>の耐久性のある方法で見やすく表示します。'},
{c:'規則',q:'飛行させる際の基本的な遵守事項として、正しいものはどれか。',a:['急降下など他人に迷惑を及ぼすおそれのある粗暴な飛行は禁止されている','機体性能の範囲内であればどんな飛行方法でもよい','アクロバット飛行はどこでも自由に行える'],ans:0,ex:'航空法は<b>危険を生じさせるおそれのある飛行(迷惑飛行)を禁止</b>しています。許可・承認の有無にかかわらず全飛行に適用されます。'},
{c:'規則',q:'飛行の許可・承認の申請に関する記述のうち、正しいものはどれか。',a:['一定の条件を満たせば、期間(1年以内)や飛行経路を包括した申請が可能である','許可・承認は必ず飛行1回ごとに申請しなければならない','包括申請をすればいかなる飛行も自由になる'],ans:0,ex:'業務などで反復・継続して飛行する場合は<b>包括申請(期間1年以内)</b>が可能。ただし催し上空など個別申請が必要な飛行もあります。'},
{c:'規則',q:'DIPS(ドローン情報基盤システム)に関する記述のうち、正しいものはどれか。',a:['機体登録・飛行許可承認申請・飛行計画の通報・事故報告などの手続をオンラインで行うシステムである','機体を自動操縦するアプリである','気象情報の専用サイトである'],ans:0,ex:'DIPS2.0では<b>登録・申請・通報・報告が一元化</b>されています。飛行計画の通報や緊急用務空域の確認もここで行えます。'},
{c:'規則',q:'学科試験合格の有効期間として、正しいものはどれか。',a:['2年間(その間に実地試験・身体検査を経て技能証明の交付を受ける)','6か月間','無期限'],ans:0,ex:'学科試験合格の有効期間は<b>2年</b>。この間に実地試験(または講習修了)と身体検査を済ませ、技能証明の交付申請を行います。'},
{c:'規則',q:'登録済みの無人航空機を他人に譲渡した場合の手続として、正しいものはどれか。',a:['所有者の変更に係る変更登録の手続が必要である','手続は一切不要である','機体を廃棄したときのみ手続が必要である'],ans:0,ex:'所有者・使用者の変更は<b>変更登録</b>、廃棄・解体時は<b>抹消登録</b>が必要です。登録情報は常に最新に保ちます。'},
{c:'規則',q:'機体認証を受けた機体を改造した場合に関する記述のうち、正しいものはどれか。',a:['安全性に影響する改造を行うと機体認証の効力に影響するため、必要な手続・検査を確認する','どのような改造をしても機体認証はそのまま有効である','改造は法的に一切禁止されている'],ans:0,ex:'認証は<b>認証時の状態が前提</b>。重要な改造(モーター換装・フレーム変更等)は認証の効力に関わるため、事前に手続を確認します。'},
{c:'規則',q:'「目視内飛行」の目視に該当するものとして、正しいものはどれか。',a:['操縦者自身が肉眼(眼鏡・コンタクト可)で機体を直接見ること','カメラのモニター映像で機体周囲を見ること','補助者が機体を見ていること'],ans:0,ex:'目視=<b>操縦者本人の肉眼による直接監視</b>。双眼鏡・モニター越し・補助者による監視は目視外飛行の扱いになります。'},
{c:'規則',q:'航空法における「第三者」に該当する者として、正しいものはどれか。',a:['無人航空機の飛行に直接・間接に関与していない者','操縦者','立入管理の補助者'],ans:0,ex:'第三者=<b>運航に関与しない者</b>。関係者(操縦者・補助者・運航の管理下にある者)以外の上空を飛ぶかどうかがカテゴリー判定の核心です。'},
{c:'規則',q:'地表から150m以上の高さの飛行規制に関する記述のうち、正しいものはどれか。',a:['煙突や鉄塔などの高層構造物の周囲30m以内の空域は、150m以上の飛行禁止空域から除外されている','構造物の点検でも150m以上は例外なく許可が必要である','150m規制に例外は一切ない'],ans:0,ex:'高構造物の<b>周囲30m以内</b>は150m規制の適用除外(点検などが想定)。ただし物件から30m未満の特定飛行には該当するため、その手続・資格は必要です。'},
{c:'規則',q:'「多数の者の集合する催し」に該当するものとして、最も適切なものはどれか。',a:['特定の日時・場所に開催される祭りや縁日、展示会など','信号待ちで自然発生的に生じた人混み','スーパーの通常の買い物客'],ans:0,ex:'催し=<b>特定の日時・場所に多数が集合するもの</b>(祭り・スポーツ大会等)。自然発生的な人混みは該当しませんが、30m未満規制などには注意が必要です。'},
{c:'規則',q:'技適マークのない海外製送信機(プロポ)の使用に関する記述のうち、正しいものはどれか。',a:['日本国内での使用は電波法違反となるおそれがある','海外製であれば自由に使用できる','出力が大きいほど合法である'],ans:0,ex:'国内で無線設備を使うには<b>技術基準適合証明(技適)等</b>が必要。技適のない機器の使用は電波法違反(罰則あり)になり得ます。'},
{c:'規則',q:'夜間飛行を行う場合の機体の灯火に関する記述のうち、正しいものはどれか。',a:['機体の位置と向きが正確に認識できる灯火が必要である','スマートフォンのライトで機体を照らせばよい','灯火は不要である'],ans:0,ex:'夜間飛行では<b>機体の位置・向きを把握できる灯火</b>の装備が要件。地上からの視認性を確保し、姿勢の誤認を防ぎます。'},
{c:'規則',q:'無人航空機の飛行に関する権利・法令の関係について、正しいものはどれか。',a:['航空法の許可・承認を得ても、土地所有権・プライバシー・条例など他の法令等への対応は別途必要である','航空法の許可があればすべての法律に優先する','条例は無人航空機に適用されない'],ans:0,ex:'航空法は<b>数ある規制の一つ</b>。公園条例・重要文化財周辺の規制・土地管理者のルールなど、飛行場所ごとの確認が必要です。'},
{c:'システム',q:'フライトコントローラ(FC)の役割として、正しいものはどれか。',a:['IMU・GNSS・気圧センサなどの情報を統合し、機体の姿勢・位置を制御する','映像を録画する装置である','バッテリーを充電する装置である'],ans:0,ex:'FCは機体の<b>頭脳</b>。各センサ情報を統合処理し、ESCへの指令でモーター回転数を調整して姿勢・位置を保ちます。'},
{c:'システム',q:'ジンバルの役割として、正しいものはどれか。',a:['機体の傾きや振動を打ち消してカメラを安定させ、滑らかな映像を得る','機体の揚力を増加させる','バッテリーの消費を抑える'],ans:0,ex:'ジンバルは<b>2軸・3軸でカメラの姿勢を保持</b>する装置。輸送時のロック解除忘れやキャリブレーション不良は故障・映像不良の原因になります。'},
{c:'システム',q:'映像伝送の遅延に関する記述のうち、正しいものはどれか。',a:['伝送方式や電波状況により映像には遅延があり、モニターだけに頼った操縦では判断が遅れる危険がある','映像の遅延はゼロである','遅延が大きいほど操縦しやすい'],ans:0,ex:'デジタル伝送では<b>数十ms〜数百msの遅延</b>が生じます。目視外飛行では遅延を前提とした余裕のある操縦・経路設計が必要です。'},
{c:'システム',q:'モーターのKV値に関する記述のうち、正しいものはどれか。',a:['1Vあたりの回転数を表し、KV値が低いモーターは大きなプロペラを回すトルク重視の特性を持つ','KV値はモーターの重量を表す','KV値が高いほど大きなプロペラに適する'],ans:0,ex:'KV値=<b>回転数/V</b>。低KV=低回転・高トルク(大径プロペラ向き)、高KV=高回転(小径プロペラ向き)です。'},
{c:'システム',q:'プロペラの取付けに関する記述のうち、正しいものはどれか。',a:['CW(時計回り)用とCCW(反時計回り)用を、指定されたモーターに正しく取り付ける','どのモーターにどちらのプロペラを付けてもよい','プロペラの回転方向はすべて同じである'],ans:0,ex:'マルチコプターは<b>CW/CCW専用プロペラの組合せ</b>で反トルクを打ち消しています。逆装着は離陸不能・墜落の典型的な整備ミスです。'},
{c:'システム',q:'CFRP(炭素繊維強化プラスチック)製フレームに関する記述のうち、正しいものはどれか。',a:['軽量で剛性が高い一方、導電性があり電波を遮蔽・反射することがある','電波を一切妨げない素材である','金属より重い素材である'],ans:0,ex:'CFRPは<b>軽量・高剛性</b>で機体構造に多用されますが、<b>導電性があるためアンテナ配置に注意</b>が必要です。'},
{c:'システム',q:'コンパスキャリブレーションを実施すべきタイミングとして、最も適切なものはどれか。',a:['飛行場所を大きく移動したときや、機体がコンパス異常を警告したとき','毎回、鉄骨の建物内で実施する','一度実施すれば二度と不要である'],ans:0,ex:'地磁気環境は場所により異なるため、<b>長距離移動後・警告時に開けた場所で</b>キャリブレーションします。磁気を帯びた場所での実施は逆効果です。'},
{c:'システム',q:'バッテリーコネクタ・端子の管理に関する記述のうち、正しいものはどれか。',a:['コネクタの焦げ・変色・緩みは接触不良や発熱の原因となるため、点検して異常があれば使用しない','焦げていても通電すれば問題ない','端子のショート(短絡)対策は不要である'],ans:0,ex:'大電流が流れるコネクタは<b>接触不良→発熱→溶損・電源喪失</b>につながります。端子の絶縁キャップなどショート対策も必須です。'},
{c:'システム',q:'RTH(リターントゥホーム)のホームポイントに関する記述のうち、最も適切なものはどれか。',a:['離陸位置などで記録されるため、記録された位置と現在の帰還させたい位置が一致しているか飛行前に確認する','ホームポイントは自動的に常に操縦者の位置になる','ホームポイントは確認しなくてよい'],ans:0,ex:'ホームポイントの<b>記録位置の誤認</b>は、意図しない場所への自動帰還につながります。移動しながらの運航では特に注意します。'},
{c:'システム',q:'機体の振動に関する記述のうち、正しいものはどれか。',a:['過大な振動はセンサの誤作動・部品の緩み・映像のブレの原因となるため、プロペラバランス等を点検する','振動は機体性能に影響しない','振動が大きいほど安定して飛行する'],ans:0,ex:'振動源の多くは<b>プロペラ・モーターの損傷やバランス不良</b>。IMUへの振動伝達は姿勢推定の誤差要因になります。'},
{c:'システム',q:'寒い屋外から暖かい室内へ機体を移動した場合の注意点として、正しいものはどれか。',a:['温度差により機体内部に結露が生じ、電子部品の故障の原因となることがある','温度差は機体に全く影響しない','結露はバッテリーを冷却するので好ましい'],ans:0,ex:'急激な温度差は<b>内部結露→基板の腐食・ショート</b>の原因。温度に慣らしてから通電する、乾燥剤入りケースで保管するなどの対策をとります。'},
{c:'システム',q:'ファームウェア(機体ソフトウェア)の更新に関する記述のうち、最も適切なものはどれか。',a:['飛行直前ではなく事前に更新を済ませ、更新後は動作確認を行ってから運航する','飛行現場で飛行直前に更新するのがよい','ファームウェアは更新しないほうが安全である'],ans:0,ex:'更新には<b>設定初期化や不具合のリスク</b>が伴います。事前更新+テスト飛行で確認してから実運航に投入します。'},
{c:'システム',q:'物件投下装置(ウインチ・散布装置等)を使用する場合の注意点として、正しいものはどれか。',a:['投下・切離しの瞬間に機体の重量と重心が変化し、挙動が乱れることに備える','投下しても機体の挙動は変わらない','投下装置の作動確認は不要である'],ans:0,ex:'ペイロードの切離しでは<b>急激な軽量化により機体が浮き上がる</b>など挙動が変化します。事前の作動確認と操作手順の習熟が必要です。'},
{c:'システム',q:'無人航空機の騒音に関する記述のうち、最も適切なものはどれか。',a:['大型機や高回転のプロペラほど騒音が大きくなる傾向があり、住宅地周辺では騒音への配慮が必要である','無人航空機は無音である','騒音は苦情の原因にはならない'],ans:0,ex:'騒音はプロペラの回転数・枚数・機体規模に依存します。<b>騒音・プライバシーへの配慮</b>は地域トラブル防止の基本です。'},
{c:'運航体制',q:'運航体制の構築に関する記述のうち、最も適切なものはどれか。',a:['操縦者・補助者・安全管理者などの役割と責任をあらかじめ明確に定めておく','役割分担は飛行中に自然に決まるものである','全員が同じ作業を重複して行うのがよい'],ans:0,ex:'<b>誰が何に責任を持つか</b>を文書化・共有しておくことで、緊急時の混乱や「誰かがやると思った」を防ぎます。'},
{c:'運航体制',q:'ヒヤリハット報告を促進する組織文化として、最も適切なものはどれか。',a:['報告者を非難せず、正直な報告が組織の学習につながる「公正な文化(Just Culture)」を築く','報告した者を処罰して再発を防ぐ','ヒヤリハットは恥なので隠すよう指導する'],ans:0,ex:'非難文化では報告が上がらず<b>同じ事故が繰り返されます</b>。公正な文化は航空安全の基本概念として教則にも通じる考え方です。'},
{c:'運航体制',q:'指差呼称に関する記述のうち、最も適切なものはどれか。',a:['対象を指差し声に出して確認することで、確認の意識レベルを上げ、エラーを減らす効果がある','見た目が悪いので行うべきでない','指差呼称に効果はない'],ans:0,ex:'指差呼称は<b>誤り率を大幅に減らす</b>ことが実証されている確認手法。「プロペラよし」「周囲よし」など点検・離陸前確認に取り入れます。'},
{c:'運航体制',q:'長時間の運航における疲労管理として、最も適切なものはどれか。',a:['連続作業時間に上限を設け、計画的に休憩・交代を入れる','疲れても最後まで一人で操縦し続ける','疲労は根性で克服できる'],ans:0,ex:'集中力は連続作業で確実に低下します。<b>作業時間の上限・休憩・交代要員</b>を運航計画に組み込みます。'},
{c:'運航体制',q:'夏期の屋外運航における操縦者自身の健康管理として、最も適切なものはどれか。',a:['直射日光を避ける工夫と水分・塩分補給を行い、熱中症の兆候があれば運航を中止する','操縦者は暑さを我慢すべきである','熱中症は操縦に影響しない'],ans:0,ex:'操縦者の熱中症は<b>判断力低下→運航事故</b>に直結します。日陰の確保・帽子・水分塩分・体調観察が基本です。'},
{c:'運航体制',q:'飛行前ブリーフィングで共有すべき内容として、最も適切なものはどれか。',a:['飛行計画・各自の役割・気象・緊急時の対応手順を関係者全員で共有する','雑談だけで十分である','操縦者だけが計画を知っていればよい'],ans:0,ex:'ブリーフィングは<b>チームの状況認識を揃える場</b>。緊急着陸地点・中止基準・連絡方法まで共有しておくと緊急時に迷いません。'},
{c:'運航体制',q:'運航時の服装・装備に関する記述のうち、最も適切なものはどれか。',a:['ヘルメットや反射ベストなどで安全を確保し、関係者であることが周囲から識別できるようにする','服装は運航の安全と無関係である','目立たない服装で身分を隠すのがよい'],ans:0,ex:'工事現場・道路近傍では<b>保護具</b>が必要な場面があり、ベスト・腕章は<b>第三者からの視認・信頼</b>にもつながります。'},
{c:'運航体制',q:'飛行中に通行人から話しかけられた場合の対応として、最も適切なものはどれか。',a:['操縦者は操縦に専念し、補助者などが対応する','操縦者が機体から目を離して丁寧に対応する','無視して立ち去る'],ans:0,ex:'操縦者の注意が逸れることは<b>事故の典型要因</b>。対応役をあらかじめ決めておき、単独時は安全な場所に着陸させてから対応します。'},
{c:'リスク・気象',q:'朝凪・夕凪に関する記述のうち、正しいものはどれか。',a:['海風と陸風が入れ替わる朝夕の時間帯に、一時的に風が弱まる現象である','一日中風が強い現象である','冬にだけ起こる現象である'],ans:0,ex:'海陸風の切替り時に無風状態となるのが<b>凪(なぎ)</b>。海岸付近では飛行に適した時間帯となることがあります。'},
{c:'リスク・気象',q:'移流霧に関する記述のうち、正しいものはどれか。',a:['暖かく湿った空気が冷たい海面や地面の上に移動して冷やされ発生する霧である','放射冷却のみで発生する霧である','移流霧は山頂でしか発生しない'],ans:0,ex:'移流霧は<b>海霧の代表</b>で、日中でも持続しやすいのが特徴。沿岸部の運航では発生条件(暖湿気流+冷たい海面)に注意します。'},
{c:'リスク・気象',q:'高度と気温の関係に関する記述のうち、正しいものはどれか。',a:['対流圏では、高度が100m増すごとに気温はおよそ0.6℃下がる','高度が上がるほど気温は上がる','高度と気温に関係はない'],ans:0,ex:'標準的な気温減率は<b>約0.6℃/100m</b>。上空の気温低下はバッテリー性能や着氷リスクに関わります。'},
{c:'リスク・気象',q:'北半球における高気圧・低気圧の風に関する記述のうち、正しいものはどれか。',a:['高気圧からは時計回りに風が吹き出し、低気圧へは反時計回りに風が吹き込む','高気圧へ反時計回りに風が吹き込む','低気圧から時計回りに風が吹き出す'],ans:0,ex:'北半球では<b>高気圧=時計回り・吹き出し、低気圧=反時計回り・吹き込み</b>。天気図から現地の風向を推定する基本です。'},
{c:'リスク・気象',q:'寒冷前線の通過時の天気の特徴として、正しいものはどれか。',a:['積乱雲による短時間の強い雨・突風・風向の急変・気温低下が起こりやすい','長時間の穏やかな霧雨が続く','天気は全く変化しない'],ans:0,ex:'寒冷前線は<b>激しい対流性の悪天</b>を伴い、通過後は北寄りの風と気温低下。前線接近時は運航を控えます。'},
{c:'リスク・気象',q:'降雪・積雪環境での運用に関する記述のうち、最も適切なものはどれか。',a:['機体への着雪やバッテリー性能低下、操縦者の指先の操作性低下などに注意する','雪はプロペラで飛ばせるので問題ない','積雪時こそ性能が向上する'],ans:0,ex:'雪はセンサ・モーターへの浸入や着雪による重量増をもたらします。<b>低温対策(バッテリー保温・手袋)</b>と離着陸地点の確保が必要です。'},
{c:'リスク・気象',q:'晴れた日中に発生する「つむじ風(塵旋風)」に関する記述のうち、正しいものはどれか。',a:['強い日射で地表が熱せられたときに突然発生する渦で、グラウンドなどで機体を巻き込むことがある','雨の日にだけ発生する','天気予報で正確に予測できる'],ans:0,ex:'塵旋風は<b>予測困難な局地的な渦</b>。晴天でも突然発生し、低高度の機体を転覆させることがあります。砂ぼこりの動きに注意。'},
{c:'リスク・気象',q:'谷筋や河川敷など地形と風の関係について、正しいものはどれか。',a:['谷筋では風が収束して局所的に風速が強まることがある','地形は風に影響を与えない','谷の中は常に無風である'],ans:0,ex:'風は地形に沿って流れ、<b>狭窄部で加速(収束)</b>します。山間部・ビル間・河川敷では周囲より強い風を想定します。'},
{c:'リスク・気象',q:'リスク低減における「ALARP」の考え方として、正しいものはどれか。',a:['リスクを合理的に実行可能な限り低く抑えるという考え方である','リスクは完全にゼロにできるという考え方である','コストをかけずにリスクを放置する考え方である'],ans:0,ex:'ALARP(As Low As Reasonably Practicable)は<b>リスクゼロは不可能</b>という前提で、実行可能な対策を尽くして許容レベルまで下げる考え方です。'},

const EXAMS = {
  kan:  { label:'管工事施工管理技士 2級', short:'管工事2級', sub:'第一次検定(学科)・四肢択一', guide:KAN_GUIDE, q:KAN_Q, passRate:.60, passLabel:'合格基準の目安 60%' },
  drone:{ label:'無人航空機操縦士 一等', short:'ドローン一等', sub:'学科試験・三肢択一', guide:DRONE_GUIDE, q:DRONE_Q, passRate:.90, passLabel:'合格基準の目安 90%' },
};
const TABS = [ ['guide','傾向と対策'], ['practice','分野別練習'], ['mock','模擬試験'], ['weak','弱点復習'], ['stats','成績'] ];
const KEYS = ['ア','イ','ウ','エ'];

/* 頻出度ランク: 過去の出題で繰り返し問われている定番論点=★★★、よく出る=★★、標準=★ */
const RANK = {
  kan: {
    r3: [/湿り空気/,/機械換気方式/,/冷凍サイクル/,/変風量単一ダクト/,/クロスコネクション/,/吐水口空間|逆流防止/,/排水トラップ/,/通気管の設置目的/,/給水方式/,/レジオネラ/,/最小勾配/,/キャビテーション|ポンプに関する記述/,/アスペクト比/,/クリティカルパス|ネットワーク工程表/,/バーチャート/,/品質管理に用いる図表|デミング/,/酸素欠乏/,/墜落/,/玉掛け/,/満水試験/,/温度ヒューズ/,/主任技術者/,/軽微な建設工事|許可の有効期間/,/特定建設作業|騒音の規制基準/,/休憩時間/,/換気のための開口部|天井の高さ/,/残留塩素/,/特定建設資材/,/マンホール/,/受水槽の有効容量/,/排水口空間/,/フラッシュバルブ/,/設計給水量/,/回転数を2倍/,/換気回数/,/二重トラップ/],
    r1: [/デシカント|ナイトパージ|置換換気|ダブルダクト|コージェネ|氷蓄熱|顕熱比|放射冷房|クリーンルーム|密閉式冷却塔|炉筒煙管|銅管の肉厚|特殊継手排水|熱放射|絶縁抵抗|音に関する/],
    def: {'二次検定対策':2}
  },
  drone: {
    r3: [/特定飛行/,/カテゴリー/,/「無人航空機」/,/機体登録|登録記号/,/リモートID/,/技能証明/,/飛行日誌/,/事故/,/アルコール|飲酒/,/飛行禁止法/,/2\.4GHz/,/夜間/,/目視/,/立入管理/,/第三者/,/150m/,/催し/,/農薬/,/有人航空機/,/緊急用務空域/,/ボルテックスリング/,/リチウムポリマーバッテリーの取扱|膨らみ|Cレート/,/GNSS|マルチパス/,/ハインリッヒ|スイスチーズ|CRM|ハザーダスアティチュード/,/海陸風|積乱雲|ダウンバースト|風速の基準|放射霧/,/機体認証/,/飛行計画/,/教則/],
    r1: [/IPコード|KV値|CFRP|ダイバーシティ|携帯電話網|アマチュア無線|塵旋風|凪|移流霧|ALARP|パラシュート|農薬散布用|騒音|服装|指差呼称|ファームウェア|結露|ジンバル/],
    def: {'計算問題':3}
  }
};
function rankOf(exam,q){
  const R = RANK[exam];
  if(q.ex && (q.ex.indexOf('【R8前期の出題論点】')===0 || q.ex.indexOf('【過去10年頻出】')===0)) return 3; // 実試験で確認済みの論点
  if(R.r3.some(re=>re.test(q.q))) return 3;
  if(R.r1.some(re=>re.test(q.q))) return 1;
  if(R.def && R.def[q.c]) return R.def[q.c];
  return 2;
}
function rankBadge(rk){
  const t = rk===3?'★★★ 必修':rk===2?'★★ 頻出':'★ 標準';
  return `<span class="rank r${rk}">${t}</span>`;
}

/* ---------------- 状態・保存 ---------------- */
const LS_KEY = 'shikaku-study-v1';
let store;
try{ store = JSON.parse(localStorage.getItem(LS_KEY)) || {}; }catch(e){ store = {}; }
for(const ex of Object.keys(EXAMS)){
  store[ex] = store[ex] || {};
  store[ex].qstats = store[ex].qstats || {};   // idx -> {c,w}
  store[ex].wrong  = store[ex].wrong  || [];   // [idx]
  store[ex].hist   = store[ex].hist   || [];   // {d,score,total,mode}
}
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(store)); }catch(e){} }

let state = { exam:'kan', tab:'guide', cat:'all', rankF:'all', session:null };
let timerId = null;

function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function cats(exam){ return [...new Set(EXAMS[exam].q.map(q=>q.c))]; }
function recordAnswer(exam, qi, correct){
  const st = store[exam];
  const s = st.qstats[qi] || (st.qstats[qi] = {c:0,w:0});
  if(correct){ s.c++; const k = st.wrong.indexOf(qi); if(k>=0) st.wrong.splice(k,1); }
  else{ s.w++; if(!st.wrong.includes(qi)) st.wrong.push(qi); }
  save();
}

/* ---------------- 描画 ---------------- */
const $view = () => document.getElementById('view');

function renderChrome(){
  document.body.dataset.exam = state.exam;
  const sw = document.getElementById('examSwitch');
  sw.innerHTML = Object.entries(EXAMS).map(([k,e]) =>
    `<button class="exam-btn ${state.exam===k?'active':''}" data-exam="${k}">${e.label}<small>${e.sub}</small></button>`).join('');
  sw.querySelectorAll('button').forEach(b => b.onclick = () => { stopTimer(); state.exam=b.dataset.exam; state.session=null; state.cat='all'; renderChrome(); render(); });
  const tb = document.getElementById('tabs');
  tb.innerHTML = TABS.map(([k,l]) => `<button class="${state.tab===k?'active':''}" data-tab="${k}">${l}</button>`).join('');
  tb.querySelectorAll('button').forEach(b => b.onclick = () => { stopTimer(); state.tab=b.dataset.tab; state.session=null; render(); });
}

function render(){
  const v = $view();
  if(state.session){ renderQuestion(); return; }
  if(state.tab==='guide') v.innerHTML = EXAMS[state.exam].guide;
  else if(state.tab==='practice') renderPractice();
  else if(state.tab==='mock') renderMockSetup();
  else if(state.tab==='weak') renderWeakSetup();
  else if(state.tab==='stats') renderStats();
  window.scrollTo(0,0);
}

function renderPractice(){
  const exam = EXAMS[state.exam];
  const list = ['all',...cats(state.exam)];
  const rankOK = i => state.rankF==='all' || rankOf(state.exam, exam.q[i]) >= +state.rankF;
  const pool = exam.q.map((q,i)=>i).filter(rankOK);
  const cnt = c => c==='all' ? pool.length : pool.filter(i=>exam.q[i].c===c).length;
  const RF = [['all','すべて'],['3','★★★のみ'],['2','★★以上']];
  $view().innerHTML = `<div class="card">
    <h2>分野別練習</h2>
    <p style="color:var(--muted);font-size:13.5px;">分野と重要度を選んで演習します。1問ごとに正誤と解説が表示されます。</p>
    <div class="chips">${list.map(c=>`<button class="chip ${state.cat===c?'active':''}" data-cat="${c}">${c==='all'?'全分野':c} <span class="cnt">${cnt(c)}問</span></button>`).join('')}</div>
    <div class="chips">${RF.map(([v,l])=>`<button class="chip ${state.rankF===v?'active':''}" data-rank="${v}">${l}</button>`).join('')}</div>
    <div class="legend">${rankBadge(3)} 過去の試験で繰り返し出ている定番論点。最優先で完璧に　${rankBadge(2)} よく出るテーマ　${rankBadge(1)} 出題頻度低め・差がつく発展問題</div>
    <div class="btn-row"><button class="btn" id="startPractice">練習を始める</button></div>
  </div>`;
  $view().querySelectorAll('.chip[data-cat]').forEach(b=> b.onclick=()=>{ state.cat=b.dataset.cat; renderPractice(); });
  $view().querySelectorAll('.chip[data-rank]').forEach(b=> b.onclick=()=>{ state.rankF=b.dataset.rank; renderPractice(); });
  document.getElementById('startPractice').onclick = () => {
    const idxs = pool.filter(i => state.cat==='all' || exam.q[i].c===state.cat);
    startSession(shuffle(idxs), 'practice');
  };
}

function renderMockSetup(){
  const total = EXAMS[state.exam].q.length;
  $view().innerHTML = `<div class="card">
    <h2>模擬試験</h2>
    <p style="color:var(--muted);font-size:13.5px;">全分野からランダム出題。解答中は正誤が表示されず、最後にまとめて採点・解説されます。${EXAMS[state.exam].passLabel}。</p>
    <div class="btn-row">
      <button class="btn" data-n="10">10問(小テスト)</button>
      <button class="btn" data-n="20">20問(ハーフ模試)</button>
      <button class="btn ghost" data-n="${total}">全${total}問(フル演習)</button>
    </div>
  </div>`;
  $view().querySelectorAll('[data-n]').forEach(b => b.onclick = () => {
    const n = +b.dataset.n;
    startSession(shuffle(EXAMS[state.exam].q.map((q,i)=>i)).slice(0,n), 'mock');
  });
}

function renderWeakSetup(){
  const wrong = store[state.exam].wrong;
  if(!wrong.length){
    $view().innerHTML = `<div class="card"><h2>弱点復習</h2><div class="empty">間違えた問題はまだありません。<br>練習や模試で間違えた問題が自動的にここに溜まり、正解すると消えていきます。</div></div>`;
    return;
  }
  $view().innerHTML = `<div class="card">
    <h2>弱点復習</h2>
    <p style="color:var(--muted);font-size:13.5px;">これまでに間違えた <b style="color:var(--accent)">${wrong.length}問</b> を復習します。正解するとリストから外れます。</p>
    <div class="btn-row"><button class="btn" id="startWeak">復習を始める</button></div>
  </div>`;
  document.getElementById('startWeak').onclick = () => startSession(shuffle(wrong.slice()), 'weak');
}

/* ---------------- 出題セッション ---------------- */
function startSession(qids, mode){
  if(!qids.length) return;
  const perms = qids.map(qi => shuffle(EXAMS[state.exam].q[qi].a.map((_,i)=>i)));
  state.session = { qids, perms, mode, idx:0, answers:new Array(qids.length).fill(null), correct:0, answered:false, start:Date.now() };
  if(mode==='mock') startTimer();
  renderQuestion();
  window.scrollTo(0,0);
}
function startTimer(){
  stopTimer();
  timerId = setInterval(()=>{
    const el = document.getElementById('timer');
    if(el && state.session) el.textContent = fmtTime(Date.now()-state.session.start);
  },1000);
}
function stopTimer(){ if(timerId){ clearInterval(timerId); timerId=null; } }
function fmtTime(ms){ const s=Math.floor(ms/1000); return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }

function renderQuestion(){
  const ss = state.session;
  if(ss.idx >= ss.qids.length){ renderResult(); return; }
  const qi = ss.qids[ss.idx];
  const q = EXAMS[state.exam].q[qi];
  const pct = Math.round(ss.idx/ss.qids.length*100);
  const modeName = ss.mode==='mock'?'模擬試験':ss.mode==='weak'?'弱点復習':'練習';
  $view().innerHTML = `<div class="card">
    <div class="qmeta">
      <span style="display:flex;gap:6px;align-items:center"><span class="cat">${q.c}</span>${rankBadge(rankOf(state.exam,q))}</span>
      <span>${modeName}　問 ${ss.idx+1} / ${ss.qids.length}${ss.mode==='mock'?'　<span class="timer" id="timer">'+fmtTime(Date.now()-ss.start)+'</span>':''}</span>
    </div>
    <div class="progressbar"><i style="width:${pct}%"></i></div>
    <div class="qtext">${esc(q.q)}</div>
    <div class="choices">${ss.perms[ss.idx].map((oi,p)=>`<button class="choice" data-i="${p}"><span class="key">${KEYS[p]}</span><span>${esc(q.a[oi])}</span></button>`).join('')}</div>
    <div id="feedback"></div>
    <div class="btn-row" id="qActions"><button class="btn ghost" id="quitBtn">中断する</button></div>
  </div>`;
  $view().querySelectorAll('.choice').forEach(b => b.onclick = () => answer(+b.dataset.i));
  document.getElementById('quitBtn').onclick = () => { stopTimer(); state.session=null; render(); };
}

function answer(sel){
  const ss = state.session;
  if(ss.answered) return;
  ss.answered = true;
  const qi = ss.qids[ss.idx];
  const q = EXAMS[state.exam].q[qi];
  const perm = ss.perms[ss.idx];
  const orig = perm[sel];                 // 表示位置 → 元の選択肢番号
  const ok = orig === q.ans;
  ss.answers[ss.idx] = orig;
  if(ok) ss.correct++;
  recordAnswer(state.exam, qi, ok);

  if(ss.mode==='mock'){ next(); return; } // 模試は即時フィードバックなし

  const btns = $view().querySelectorAll('.choice');
  btns.forEach((b,p)=>{
    b.disabled = true;
    if(p===sel) b.classList.add(ok?'sel-ok':'sel-ng');
    if(perm[p]===q.ans) b.classList.add('reveal-ok');
  });
  document.getElementById('feedback').innerHTML =
    `<div class="verdict ${ok?'ok':'ng'}">${ok?'○ 正解':'× 不正解'}　<span style="font-weight:400;font-size:13px;color:var(--muted)">正答:${KEYS[perm.indexOf(q.ans)]}</span></div>
     <div class="explain">${q.ex}</div>`;
  const act = document.getElementById('qActions');
  const nb = document.createElement('button');
  nb.className='btn'; nb.textContent = ss.idx+1 >= ss.qids.length ? '結果を見る' : '次の問題へ';
  nb.onclick = next;
  act.prepend(nb);
  nb.focus();
}

function next(){
  const ss = state.session;
  ss.idx++; ss.answered=false;
  renderQuestion();
  window.scrollTo(0,0);
}

function renderResult(){
  stopTimer();
  const ss = state.session;
  const exam = EXAMS[state.exam];
  const total = ss.qids.length, score = ss.correct;
  const rate = score/total;
  const passed = rate >= exam.passRate;
  const elapsed = fmtTime(Date.now()-ss.start);
  const modeName = ss.mode==='mock'?'模擬試験':ss.mode==='weak'?'弱点復習':'練習';
  store[state.exam].hist.push({ d:new Date().toLocaleDateString('ja-JP'), score, total, mode:modeName });
  if(store[state.exam].hist.length>30) store[state.exam].hist = store[state.exam].hist.slice(-30);
  save();

  const review = ss.qids.map((qi,i)=>{
    const q = exam.q[qi]; const sel = ss.answers[i]; const ok = sel===q.ans;
    const perm = ss.perms[i];
    return `<div class="result-q">
      <div class="rq-head"><span class="mark ${ok?'ok':'ng'}">${ok?'○':'×'}</span><span style="color:var(--muted)">問${i+1}・${q.c}</span>${rankBadge(rankOf(state.exam,q))}</div>
      <div class="rq-text">${esc(q.q)}</div>
      <div class="rq-detail">あなたの解答:${sel==null?'—':KEYS[perm.indexOf(sel)]+'. '+esc(q.a[sel])}<br>正答:<b style="color:var(--ok)">${KEYS[perm.indexOf(q.ans)]}. ${esc(q.a[q.ans])}</b></div>
      ${ok?'':`<div class="explain" style="margin-top:6px">${q.ex}</div>`}
    </div>`;
  }).join('');

  state.session = null;
  $view().innerHTML = `<div class="card">
    <div class="score-hero">
      <div style="font-size:13px;color:var(--muted)">${exam.short}・${modeName}の結果</div>
      <div class="big">${score} / ${total}</div>
      <div>正答率 ${(rate*100).toFixed(0)}%　所要 ${elapsed}</div>
      <div class="pass ${passed?'ok':'ng'}">${passed?'合格ライン到達!':'合格ラインまであと'+Math.max(0,Math.ceil(total*exam.passRate)-score)+'問'}(${exam.passLabel})</div>
    </div>
    <div class="btn-row" style="justify-content:center">
      <button class="btn" id="againBtn">もう一度</button>
      <button class="btn ghost" id="homeBtn">メニューへ戻る</button>
    </div>
  </div>
  <div class="card"><h2>解答の見直し</h2>${review}</div>`;
  document.getElementById('homeBtn').onclick = () => render();
  document.getElementById('againBtn').onclick = () => {
    if(ss.mode==='mock'){
      startSession(shuffle(exam.q.map((q,i)=>i)).slice(0,total),'mock');
    }else if(ss.mode==='weak'){
      const w = store[state.exam].wrong;
      w.length ? startSession(shuffle(w.slice()),'weak') : render();
    }else{
      const idxs = exam.q.map((q,i)=>i).filter(i => state.cat==='all' || exam.q[i].c===state.cat);
      startSession(shuffle(idxs),'practice');
    }
  };
  window.scrollTo(0,0);
}

/* ---------------- 成績 ---------------- */
function renderStats(){
  const exam = EXAMS[state.exam];
  const st = store[state.exam];
  const byCat = {};
  cats(state.exam).forEach(c=> byCat[c]={c:0,w:0});
  let tc=0, tw=0;
  exam.q.forEach((q,i)=>{
    const s = st.qstats[i]; if(!s) return;
    byCat[q.c].c += s.c; byCat[q.c].w += s.w; tc+=s.c; tw+=s.w;
  });
  const rows = Object.entries(byCat).map(([c,s])=>{
    const n = s.c+s.w; const r = n? s.c/n : 0;
    return `<div class="statrow"><span class="label">${c}</span><span class="bar"><i style="width:${(r*100).toFixed(0)}%"></i></span><span class="val">${n? (r*100).toFixed(0)+'%('+n+'回)':'未演習'}</span></div>`;
  }).join('');
  const hist = st.hist.slice().reverse().slice(0,15).map(h=>
    `<tr><td>${h.d}</td><td>${h.mode}</td><td>${h.score}/${h.total}</td><td>${(h.score/h.total*100).toFixed(0)}%</td></tr>`).join('');
  const totalN = tc+tw;
  $view().innerHTML = `<div class="card">
    <h2>成績(${exam.short})</h2>
    <div class="score-hero"><div class="big">${totalN? (tc/totalN*100).toFixed(0)+'%' : '—'}</div>
    <div style="color:var(--muted);font-size:13px">累計正答率(のべ${totalN}問解答・弱点${st.wrong.length}問)</div></div>
    <h3>分野別の正答率</h3>${rows}
  </div>
  <div class="card"><h2>受験履歴</h2>
    ${hist? `<table class="hist"><tr><th>日付</th><th>モード</th><th>得点</th><th>正答率</th></tr>${hist}</table>` : '<div class="empty">まだ履歴がありません。</div>'}
    <div class="btn-row"><button class="btn ghost" id="resetBtn">この試験の学習データをリセット</button></div>
  </div>`;
  document.getElementById('resetBtn').onclick = () => {
    if(confirm(exam.short+' の成績・弱点データをすべて削除します。よろしいですか?')){
      store[state.exam] = { qstats:{}, wrong:[], hist:[] }; save(); renderStats();
    }
  };
}

/* キーボード: 1〜4で解答 */
document.addEventListener('keydown', e=>{
  if(!state.session || state.session.answered) return;
  const n = parseInt(e.key,10);
  if(n>=1 && n<=4){
    const q = EXAMS[state.exam].q[state.session.qids[state.session.idx]];
    if(n<=q.a.length) answer(n-1);
  }
});

renderChrome();
render();
</script>

</body>
</html>
