body{

.wrap{max-width:760px; margin:0 auto; padding:16px 16px 64px;}

.exam-btn.active small{color:var(--accent-ink); opacity:.85;}
nav.tabs{display:flex; gap:4px; overflow-x:auto; padding:4px 0; border-bottom:1px solid var(--line); margin-bottom:16px;}
nav.tabs button{

nav.tabs button.active{color:var(--accent); border-bottom-color:var(--accent);}
.card{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:18px 18px; margin-bottom:14px; box-shadow:var(--shadow);}

.card p{margin:6px 0;}
.card ul{margin:6px 0; padding-left:20px;}
.card li{margin:3px 0;}
table.spec{width:100%; border-collapse:collapse; font-size:13.5px; margin:8px 0;}
table.spec th,table.spec td{border:1px solid var(--line); padding:6px 9px; text-align:left; vertical-align:top;}
table.spec th{background:var(--surface2); white-space:nowrap; font-weight:600; width:9em;}
.note{font-size:12px; color:var(--muted); background:var(--surface2); border-radius:8px; padding:10px 12px; margin-top:14px;}

}
.btn.ghost{background:var(--surface); color:var(--ink); border:1px solid var(--line);}
.btn:disabled{opacity:.45; cursor:default;}
.btn-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:12px;}
.qmeta{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:10px; font-size:12.5px; color:var(--muted);}

.rank.r3{background:var(--ng-bg); color:var(--ng);}
.rank.r2{background:var(--accent-soft); color:var(--accent);}

.qtext{font-size:15.5px; font-weight:600; margin:4px 0 14px; text-wrap:balance;}
.choices{display:flex; flex-direction:column; gap:8px;}
.choice{
  display:flex; gap:10px; align-items:flex-start; text-align:left; width:100%;
  border:1.5px solid var(--line); background:var(--surface); color:var(--ink);
  border-radius:10px; padding:10px 12px; font-size:14.5px; cursor:pointer; line-height:1.55;
}
.choice .key{
  flex:none; width:24px; height:24px; border-radius:6px; background:var(--surface2);
  display:flex; align-items:center; justify-content:center; font-size:12.5px; font-weight:700; margin-top:1px;
}
.choice:not(:disabled):hover{border-color:var(--accent);}
.choice.sel-ok{border-color:var(--ok); background:var(--ok-bg);}
.choice.sel-ng{border-color:var(--ng); background:var(--ng-bg);}
.choice.reveal-ok{border-color:var(--ok);}
.choice:disabled{cursor:default;}
.verdict{font-weight:800; font-size:15px; margin:14px 0 6px;}
.verdict.ok{color:var(--ok);} .verdict.ng{color:var(--ng);}
.explain{background:var(--surface2); border-radius:10px; padding:12px 14px; font-size:13.5px;}
.explain b{color:var(--accent);}
.progressbar{height:5px; background:var(--surface2); border-radius:99px; overflow:hidden; margin-bottom:14px;}
.progressbar i{display:block; height:100%; background:var(--accent); border-radius:99px; transition:width .25s;}
.timer{font-variant-numeric:tabular-nums; font-weight:700; color:var(--accent);}
.score-hero{text-align:center; padding:10px 0 4px;}

.score-hero .pass{font-size:14px; font-weight:700; margin-top:4px;}
.score-hero .pass.ok{color:var(--ok);} .score-hero .pass.ng{color:var(--ng);}
.result-q{border-top:1px solid var(--line); padding:12px 0;}

.result-q .mark.ok{color:var(--ok);} .result-q .mark.ng{color:var(--ng);}

.result-q .rq-detail{font-size:13px; color:var(--muted); margin-top:4px;}
.statrow{display:flex; align-items:center; gap:10px; margin:8px 0; font-size:13.5px;}
.statrow .label{width:9em; flex:none;}
.statrow .bar{flex:1; height:10px; background:var(--surface2); border-radius:99px; overflow:hidden;}
.statrow .bar i{display:block; height:100%; background:var(--accent); border-radius:99px;}
.statrow .val{width:6.5em; text-align:right; font-variant-numeric:tabular-nums; color:var(--muted); flex:none;}
.empty{color:var(--muted); text-align:center; padding:24px 0; font-size:14px;}
table.hist{width:100%; border-collapse:collapse; font-size:13px;}
table.hist th,table.hist td{border-bottom:1px solid var(--line); padding:6px 8px; text-align:left; font-variant-numeric:tabular-nums;}
table.hist th{color:var(--muted); font-weight:600;}
@media (max-width:480px){ .exam-switch{grid-template-columns:1fr;} .statrow .label{width:7.5em; font-size:12.5px;} }
@media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>

{c:'機器・材料',q:'保温・保冷材に関する記述のうち、適当なものはどれか。',a:['ポリスチレンフォーム保温材は耐熱温度が低く、高温配管には適さない','ポリスチレンフォーム保温材は、蒸気管の保温に最も適する','グラスウール保温材は、保冷時に防湿処理が不要である','保温材は熱伝導率が大きいものほど性能がよい'],ans:0,ex:'ポリスチレンフォームは耐熱温度が約70〜80℃と低く<b>保冷用途向き</b>。保冷では結露防止のため防湿処理が必要。保温材は熱伝導率が小さいほど高性能です。'},
{c:'施工管理',q:'ネットワーク工程表に関する記述のうち、適当なものはどれか。',a:['クリティカルパスとは、作業開始から終了までの最も日数の長い経路をいう','クリティカルパスとは、最も日数の短い経路をいう','クリティカルパス上の作業は、多少遅れても工期に影響しない','ネットワーク工程表では、作業相互の関係は表せない'],ans:0,ex:'クリティカルパスは<b>最長経路</b>で、この経路上の作業の遅れはそのまま工期の遅れになります(トータルフロート=0)。'},
{c:'施工管理',q:'バーチャート工程表に関する記述のうち、適当でないものはどれか。',a:['作成が容易である','各作業の開始時期・終了時期が分かりやすい','おおよその進捗状況が把握しやすい','作業相互の関連や、工期に影響する作業が明確である'],ans:3,ex:'バーチャートの弱点は<b>作業間の関連・重点管理すべき作業が不明確</b>なこと。それを補うのがネットワーク工程表です。'},
{c:'施工管理',q:'品質管理に用いる図表に関する記述のうち、適当でないものはどれか。',a:['ヒストグラムは、データの分布状態を表す柱状図である','特性要因図は、結果(特性)とその原因(要因)の関係を魚の骨状に整理した図である','パレート図は、不良項目などを件数の多い順に並べ、累積曲線を書き加えた図である','散布図は、管理限界線を用いて工程の異常を検出する図である'],ans:3,ex:'管理限界線で異常を検出するのは<b>管理図</b>。散布図は2つのデータの相関関係を見る図です。QC7つ道具の役割は確実に区別を。'},
{c:'施工管理',q:'酸素欠乏症等防止規則における「酸素欠乏」の定義として、適当なものはどれか。',a:['空気中の酸素濃度が18%未満である状態','空気中の酸素濃度が20%未満である状態','空気中の酸素濃度が16%未満である状態','空気中の二酸化炭素濃度が1%を超える状態'],ans:0,ex:'酸素欠乏=<b>酸素濃度18%未満</b>。酸欠危険作業では作業主任者の選任、酸素濃度等の測定、換気などが義務付けられています。'},
{c:'施工管理',q:'墜落等による危険の防止に関する記述のうち、適当なものはどれか。',a:['高さ2m以上の箇所で墜落のおそれがある作業には、作業床を設けなければならない','高さ5m以上の箇所に限り、作業床の設置が必要である','作業床の設置が困難な場合でも、墜落制止用器具は不要である','高さ1m未満でも作業床の設置が法令で義務付けられている'],ans:0,ex:'<b>高さ2m以上</b>が墜落防止措置の基準。作業床が困難な場合は防網を張り、墜落制止用器具(フルハーネス型)を使用させます。'},
{c:'施工管理',q:'玉掛け業務に関する記述のうち、適当なものはどれか。',a:['つり上げ荷重1t以上のクレーンの玉掛け業務には、玉掛け技能講習の修了者等が必要である','玉掛け業務は、資格がなくても経験があれば従事できる','つり上げ荷重0.5t以上で技能講習が必要である','玉掛け技能講習は、事業者が任意に実施すればよい'],ans:0,ex:'<b>つり上げ荷重1t以上</b>のクレーン等の玉掛けは技能講習修了者等の有資格者に限られます。1t未満は特別教育で可です。'},
{c:'施工管理',q:'排水・通気配管の満水試験に関する記述のうち、適当なものはどれか。',a:['最小保持時間は30分とする','最小保持時間は5分とする','満水試験は配管の隠ぺい後に行うのがよい','満水試験の代わりに目視確認のみでよい'],ans:0,ex:'満水試験の保持時間は<b>最小30分</b>。試験は配管の隠ぺい・埋戻しの<b>前</b>に行い、漏れを確認します。'},
{c:'施工管理',q:'機器の据付けに関する記述のうち、適当でないものはどれか。',a:['吸収冷温水機は、基礎上に水平に据え付ける','飲料用受水槽は、周囲・下部に60cm以上、上部に100cm以上の保守点検スペースを確保する','送風機は、レベルを調整して水平に据え付ける','冷却塔は、建物の外気取入口のできるだけ近くに設置するのがよい'],ans:3,ex:'冷却塔の飛散水・排気には細菌(レジオネラ等)を含むおそれがあるため、<b>外気取入口からは離して</b>設置します。'},
{c:'法規',q:'建設業法上の技術者制度に関する記述のうち、適当なものはどれか。',a:['2級管工事施工管理技士は、管工事業の主任技術者になることができる','2級管工事施工管理技士は、いかなる工事現場でも監理技術者になれる','主任技術者は、資格や実務経験がなくても選任できる','建設工事の現場には、技術者を置く必要はない'],ans:0,ex:'2級管工事施工管理技士は管工事の<b>主任技術者</b>になれます(営業所の専任技術者にも)。監理技術者には原則1級資格等が必要です。'},
{c:'法規',q:'建設業の許可に関する記述のうち、適当なものはどれか。',a:['軽微な建設工事のみを請け負う場合を除き、建設業の許可を受けなければならない','請負金額にかかわらず、許可は一切不要である','管工事では、請負代金1億円未満なら無許可で請け負える','許可は一度受ければ生涯有効である'],ans:0,ex:'建設業を営むには許可が必要。例外は<b>軽微な工事(建築一式以外は請負代金500万円未満)</b>のみ。許可の有効期間は5年で更新制です。'},
{c:'法規',q:'労働基準法上、満18歳に満たない者を就かせてはならない業務として、定められているものはどれか。',a:['クレーンの運転の業務','資材の整理整頓の業務','図面の整理の業務','工具の手入れの業務'],ans:0,ex:'年少者(満18歳未満)は<b>クレーン運転、玉掛け、高さ5m以上の墜落危険業務</b>などの危険有害業務に就かせてはなりません。'},
{c:'法規',q:'建築基準法上、住宅の居室に必要な換気のための開口部の面積として、適当なものはどれか。',a:['床面積の1/20以上','床面積の1/7以上','床面積の1/50以上','床面積の1/100以上'],ans:0,ex:'換気に有効な開口部は<b>床面積の1/20以上</b>(採光は住宅で1/7以上)。満たせない場合は換気設備を設けます。'},
{c:'法規',q:'水道法に基づき、給水栓における水に保持しなければならない遊離残留塩素の濃度として、適当なものはどれか。',a:['0.1mg/L以上','1.0mg/L以上','0.01mg/L以上','5.0mg/L以上'],ans:0,ex:'給水栓の水は<b>遊離残留塩素0.1mg/L以上</b>(結合残留塩素なら0.4mg/L以上)を保持する必要があります。'},
{c:'法規',q:'騒音規制法上の特定建設作業に関する記述のうち、適当なものはどれか。',a:['指定地域内で特定建設作業を伴う工事を施工する者は、作業開始日の7日前までに市町村長に届け出なければならない','届出は作業開始後に行えばよい','届出先は都道府県労働局長である','くい打機を使用する作業は特定建設作業に該当しない'],ans:0,ex:'特定建設作業(くい打機・びょう打機・削岩機等)は<b>開始7日前までに市町村長へ届出</b>。届出先と期限がよく問われます。'},
{c:'法規',q:'建設リサイクル法に定める特定建設資材に該当しないものはどれか。',a:['コンクリート','木材','アスファルト・コンクリート','硬質ポリ塩化ビニル管'],ans:3,ex:'特定建設資材は<b>①コンクリート、②コンクリート及び鉄から成る建設資材、③木材、④アスファルト・コンクリート</b>の4品目です。'},
{c:'原論・基礎',q:'熱の移動に関する記述のうち、適当なものはどれか。',a:['放射による熱の移動は、真空中でも行われる','対流による熱の移動は、真空中でも行われる','熱伝導は、物体内に温度差がなくても生じる','潜熱の出入りには、必ず温度変化を伴う'],ans:0,ex:'放射は電磁波による熱移動なので<b>真空中でも伝わります</b>(太陽の熱が代表例)。対流は流体が必要、伝導には温度差が必要、潜熱は温度変化を伴わない状態変化の熱です。'},
{c:'原論・基礎',q:'ウォーターハンマー(水撃作用)に関する記述のうち、適当でないものはどれか。',a:['弁を急閉止すると発生しやすい','管内の流速が大きいほど発生しやすい','エアチャンバーの設置は防止に有効である','管内の流速を大きくすることは防止に有効である'],ans:3,ex:'防止策は<b>流速を小さくする</b>・弁の急閉止を避ける・エアチャンバー等の緩衝装置を設ける、です。流速を大きくするのは逆効果。'},
{c:'原論・基礎',q:'室内の空気環境に関する記述のうち、適当なものはどれか。',a:['建築物衛生法における二酸化炭素の含有率の管理基準は、1000ppm(0.1%)以下である','一酸化炭素は、刺激臭のある気体である','二酸化炭素は毒性が極めて強く、微量でも人体に致命的である','空気中の酸素濃度は10%程度あれば人体に影響はない'],ans:0,ex:'CO2の管理基準は<b>1000ppm以下</b>。一酸化炭素は<b>無色・無臭</b>で毒性が強く、酸素は18%未満で酸素欠乏となり危険です。'},
{c:'原論・基礎',q:'受変電設備において、力率の改善に用いられる機器として、適当なものはどれか。',a:['進相コンデンサ','変流器','避雷器','断路器'],ans:0,ex:'誘導電動機などの遅れ力率を改善するのは<b>進相コンデンサ</b>。力率改善により電力損失の低減・電圧降下の改善が図れます。'},
{c:'空調',q:'定風量単一ダクト方式(CAV方式)に関する記述のうち、適当でないものはどれか。',a:['送風量を一定とし、送風温度を変化させて室温を制御する','必要換気量を常時確保しやすい','各室ごとの温度制御が容易である','中央機械室で集中的に管理できる'],ans:2,ex:'CAV方式は系統全体で送風温度を変えるため、<b>負荷傾向の異なる各室の個別制御は困難</b>です。個別制御はVAV方式やファンコイル方式の特長。'},
{c:'空調',q:'ダクト併用ファンコイルユニット方式に関する記述のうち、適当でないものはどれか。',a:['ペリメータゾーンの負荷をファンコイルユニットで処理できる','水と空気を熱媒として併用する方式である','ユニットごとの個別制御が容易である','全空気方式に比べて、ダクトスペースが大きくなる'],ans:3,ex:'負荷の大部分を水(配管)で搬送するため、全空気方式より<b>ダクトスペースは小さく</b>なります。'},
{c:'空調',q:'熱負荷計算に関する記述のうち、適当でないものはどれか。',a:['冷房負荷計算では、ガラス面からの日射負荷を考慮する','人体からは顕熱と潜熱の両方が発生する','照明器具からの発熱負荷は顕熱のみである','外気負荷は顕熱のみで、潜熱は考慮しない'],ans:3,ex:'外気負荷には温度差による顕熱と<b>湿度差による潜熱</b>の両方があります。人体も顕熱+潜熱、照明は顕熱のみです。'},
{c:'空調',q:'温水暖房と蒸気暖房の比較に関する記述のうち、適当でないものはどれか。',a:['温水暖房は、蒸気暖房に比べて温度制御が容易である','温水暖房は、蒸気暖房に比べて予熱時間が長い','蒸気暖房は、温水暖房に比べて配管径を小さくできる','蒸気暖房は、温水暖房に比べてきめ細かな温度調節が容易である'],ans:3,ex:'蒸気は温度が高く搬送能力が大きい反面、<b>温度調節が難しい</b>のが弱点。きめ細かな制御は温水暖房の特長です。'},
{c:'空調',q:'放射(ふく射)暖房に関する記述のうち、適当なものはどれか。',a:['室内の上下温度差が小さく、快適性が高い','天井の高い空間には適さない','室内空気温度を高くしないと快適にならない','結露の心配が全くない'],ans:0,ex:'放射暖房は<b>上下温度差が小さく</b>、天井の高い工場・アトリウムにも有効。空気温度が低めでも快適に感じられます。'},
{c:'空調',q:'空気熱源ヒートポンプに関する記述のうち、適当なものはどれか。',a:['外気温度が低くなると、暖房能力が低下する','外気温度が低いほど、暖房能力は増加する','除霜(デフロスト)運転中も暖房能力は変わらない','外気温度の影響は受けない'],ans:0,ex:'低外気温では蒸発器で採熱しにくくなり<b>暖房能力・COPとも低下</b>。着霜時はデフロスト運転で一時的に暖房が止まります。'},
{c:'空調',q:'加湿方式に関する記述のうち、適当なものはどれか。',a:['気化式・水噴霧式の加湿では、加湿に伴い空気の温度が低下する','蒸気加湿では、空気の温度が大きく低下する','気化式加湿は、水の蒸発潜熱を必要としない','加湿方式によって空気の状態変化に違いはない'],ans:0,ex:'水による加湿は<b>蒸発潜熱を空気から奪う</b>ため温度が下がります。蒸気加湿はほぼ等温で加湿でき衛生的です。'},
{c:'空調',q:'開放式冷却塔に関する記述のうち、適当なものはどれか。',a:['冷却水の一部を蒸発させ、その蒸発潜熱により冷却水の温度を下げる','冷却水を加熱するための装置である','密閉式冷却塔より必ず大型になる','補給水は不要である'],ans:0,ex:'冷却塔は<b>蒸発潜熱</b>を利用して冷却水温を下げる装置。蒸発・飛散するため補給水が必要です。'},
{c:'空調',q:'全熱交換器に関する記述のうち、適当なものはどれか。',a:['排気の顕熱と潜熱を回収して、外気負荷を軽減する装置である','排気の顕熱のみを回収する装置である','外気導入量を減らすための装置である','冷媒を圧縮するための装置である'],ans:0,ex:'全熱交換器は排気と外気の間で<b>顕熱+潜熱(全熱)</b>を交換し、換気による空調負荷を軽減します。省エネの定番設備です。'},
{c:'空調',q:'エアフィルタに関する記述のうち、適当なものはどれか。',a:['HEPAフィルタは、クリーンルームなどに用いられる高性能フィルタである','HEPAフィルタは、外気用の粗じん除去フィルタである','活性炭フィルタは、粉じんの除去を主目的とする','自動巻取形フィルタは、超高性能フィルタに分類される'],ans:0,ex:'HEPAフィルタは0.3μm粒子を99.97%以上捕集する<b>超高性能フィルタ</b>。活性炭フィルタは臭気・ガス除去用です。'},
{c:'空調',q:'排煙設備に関する記述のうち、適当なものはどれか。',a:['排煙口は、天井又は壁の上部(天井から80cm以内)に設ける','排煙口は、床面近くに設ける','排煙口の手動開放装置は、天井付近に設ける','自然排煙の排煙口は、外気に面していなくてもよい'],ans:0,ex:'煙は天井付近に溜まるため排煙口は<b>天井から80cm以内</b>。壁付の手動開放装置は床面から0.8〜1.5mに設けます。'},
{c:'空調',q:'真空式温水発生機に関する記述のうち、適当なものはどれか。',a:['缶内が大気圧より低い圧力のため労働安全衛生法上のボイラーに該当せず、取扱いに免許が不要である','高圧蒸気を発生させる装置である','取扱いにはボイラー技士免許が必要である','缶内は常に大気圧より高く保たれる'],ans:0,ex:'真空式温水発生機・無圧式温水発生機は<b>ボイラーに該当せず</b>、取扱資格が不要。ビルの給湯・暖房熱源に広く使われます。'},
{c:'給排水衛生',q:'事務所ビルにおける在勤者1人1日あたりの設計給水量として、適当なものはどれか。',a:['60〜100L','5〜10L','200〜350L','500〜600L'],ans:0,ex:'事務所は<b>60〜100L/人・日</b>。住宅・共同住宅は200〜350L/人・日程度。建物用途ごとの数値は頻出です。'},
{c:'給排水衛生',q:'大便器洗浄弁(フラッシュバルブ)の最低必要圧力として、適当なものはどれか。',a:['70kPa','30kPa','10kPa','300kPa'],ans:0,ex:'洗浄弁・シャワーの最低必要圧力は<b>70kPa</b>、一般水栓は30kPaです。'},
{c:'給排水衛生',q:'飲料用受水槽の有効容量として、適当なものはどれか。',a:['1日予想給水量の1/2程度とする','1日予想給水量の2倍程度とする','1日予想給水量の1/10程度とする','大きければ大きいほど衛生的である'],ans:0,ex:'受水槽は1日使用水量の<b>40〜60%(約1/2)</b>、高置水槽は約1/10。大きすぎると水が滞留し残留塩素が減って水質が悪化します。'},
{c:'給排水衛生',q:'大便器の洗浄方式に関する記述のうち、適当なものはどれか。',a:['洗浄弁式は連続使用が可能で、事務所ビルなど使用頻度の高い建物に適する','洗浄タンク式は、連続使用に最も適する','洗浄弁式は、給水管の口径を洗浄タンク式より小さくできる','洗浄弁式には、バキュームブレーカーは不要である'],ans:0,ex:'洗浄弁式は<b>連続使用可</b>ですが給水管は25mm以上必要で、逆流防止のため<b>バキュームブレーカーが必須</b>です。'},
{c:'給排水衛生',q:'飲料用受水槽の間接排水における排水口空間の最小寸法として、適当なものはどれか。',a:['150mm','50mm','25mm','300mm'],ans:0,ex:'飲料用水槽類の排水口空間は<b>最小150mm</b>。一般の間接排水の排水口空間は管径により25〜150mmです。'},
{c:'給排水衛生',q:'通気方式に関する記述のうち、適当なものはどれか。',a:['ループ通気管は、最上流の器具排水管が排水横枝管に接続する点のすぐ下流から立ち上げる','ループ通気管は、排水横枝管の最下流から立ち上げる','各個通気方式は最も簡易な方式で、封水保護の効果は低い','伸頂通気方式は、最も封水保護能力が高い'],ans:0,ex:'ループ通気は<b>最上流の器具接続点の直下流</b>から立上げ。封水保護能力は 各個通気>ループ通気>伸頂通気 の順です。'},
{c:'給排水衛生',q:'通気管の末端の開口位置に関する記述のうち、適当なものはどれか。',a:['窓などの開口部付近に設ける場合は、開口部の上端から600mm以上立ち上げるか、水平に3m以上離す','開口部から100mm離せばよい','室内に開口してよい','必ず地中に埋設して開口する'],ans:0,ex:'臭気の流入を防ぐため、開口部上端から<b>600mm以上</b>立ち上げるか<b>水平3m以上</b>離します。数値問題の定番です。'},
{c:'給排水衛生',q:'排水ますに関する記述のうち、適当なものはどれか。',a:['汚水ますには、底部にインバートを設ける','汚水ますには、深さ150mm以上の泥だめを設ける','雨水ますには、インバートを設ける','排水管の方向が変化する箇所には排水ますを設けない'],ans:0,ex:'<b>汚水ます=インバート、雨水ます=泥だめ(150mm以上)</b>。逆に入れ替えた誤り選択肢が定番。方向変化点・合流点にはますを設けます。'},
{c:'給排水衛生',q:'間接排水としなくてよい器具・機器はどれか。',a:['大便器','冷蔵ショーケース','給茶機','水飲み器'],ans:0,ex:'飲食物や飲料水を扱う機器は汚染防止のため<b>間接排水</b>とします。大便器などの衛生器具はトラップを介して排水管に直接接続します。'},
{c:'給排水衛生',q:'ガス設備に関する記述のうち、適当なものはどれか。',a:['液化石油ガス(LPガス)は空気より重いため、ガス漏れ警報器は床面近くに設置する','LPガスは空気より軽い','都市ガス(13A)は空気より重い','ガス漏れ警報器の設置位置は、ガスの種類によらず天井付近とする'],ans:0,ex:'<b>LPガスは空気より重い→警報器は床面上30cm以内</b>、都市ガス13Aは空気より軽い→天井下30cm以内。対で覚えましょう。'},
{c:'給排水衛生',q:'BOD(生物化学的酸素要求量)の説明として、適当なものはどれか。',a:['水中の有機物が微生物により分解される際に消費される酸素量で、水質汚濁の指標である','水中の浮遊物質の量を表す指標である','値が大きいほど水質が良好であることを示す','水の硬度を表す指標である'],ans:0,ex:'BODは<b>有機汚濁の指標</b>で、値が大きいほど汚れています。浄化槽の処理性能もBOD除去率などで表されます。'},
{c:'給排水衛生',q:'屋内消火栓設備に関する記述のうち、適当なものはどれか。',a:['1号消火栓は、階ごとに、その階の各部分からホース接続口までの水平距離が25m以下となるように設置する','1号消火栓の水平距離は50m以下でよい','2号消火栓の水平距離は25m以下である','屋内消火栓は建物全体で1か所あればよい'],ans:0,ex:'<b>1号消火栓=25m以下、2号消火栓=15m以下</b>(広範囲型2号は25m)。階ごとに包含するよう配置します。'},
{c:'機器・材料',q:'渦巻ポンプの特性に関する記述のうち、適当なものはどれか。',a:['吐出量が増加すると、全揚程は低下する','吐出量が増加すると、全揚程も増加する','吐出量と軸動力は無関係である','締切運転のとき軸動力は最大となる'],ans:0,ex:'渦巻ポンプは<b>右下がりの揚程曲線</b>を持ち、吐出量増→揚程低下・軸動力増加。締切時は軸動力が最小です。'},
{c:'機器・材料',q:'ポンプの直列・並列運転に関する記述のうち、適当なものはどれか。',a:['同一性能のポンプを直列運転すると揚程が、並列運転すると吐出量が増加する','直列運転すると吐出量が2倍になる','並列運転すると揚程が2倍になる','直列・並列とも単独運転と特性は変わらない'],ans:0,ex:'<b>直列=揚程アップ、並列=水量アップ</b>。ただし管路抵抗があるため、いずれも単純に2倍にはなりません。'},
{c:'機器・材料',q:'送風機の回転数を2倍にした場合の軸動力の変化として、適当なものはどれか。',a:['約8倍になる','約2倍になる','約4倍になる','変わらない'],ans:0,ex:'送風機の相似則:<b>風量∝回転数、静圧∝回転数の2乗、軸動力∝回転数の3乗</b>。2の3乗=8倍です。'},
{c:'機器・材料',q:'弁類に関する記述のうち、適当でないものはどれか。',a:['仕切弁(ゲート弁)は、流量調整用として最も適している','玉形弁(グローブ弁)は、流量調整に適している','逆止弁(チャッキ弁)は、流体の逆流を防止する','バタフライ弁は、設置スペースが小さい'],ans:0,ex:'仕切弁は<b>全開・全閉用</b>で、半開で使うと弁体の振動・摩耗を招きます。流量調整には玉形弁を使います。'},
{c:'機器・材料',q:'銅管に関する記述のうち、適当なものはどれか。',a:['耐食性が良く、給湯配管にも用いられる','流速を大きくするほど、かい食(潰食)は生じにくい','鋼管より重量が大きい','酸性の温泉水の配管に最も適している'],ans:0,ex:'銅管は耐食性・加工性が良く給湯に多用されますが、流速が大きいと<b>かい食</b>が生じるため1.5m/s以下が目安です。'},
{c:'機器・材料',q:'一般配管用ステンレス鋼鋼管に関する記述のうち、適当なものはどれか。',a:['肉厚が薄く、プレス式継手などで接合される','ねじ接合が標準である','耐食性が低い','給水・給湯配管には使用できない'],ans:0,ex:'一般配管用ステンレス鋼鋼管は<b>薄肉のためねじ加工不可</b>。プレス式・拡管式などのメカニカル接合が標準です。'},
{c:'機器・材料',q:'架橋ポリエチレン管に関する記述のうち、適当なものはどれか。',a:['さや管ヘッダー工法による給水・給湯配管に用いられる','蒸気配管に適している','可とう性がなく、曲げ配管はできない','紫外線に強く、屋外露出配管に最も適している'],ans:0,ex:'架橋ポリエチレン管は可とう性・耐熱性(90℃程度)があり<b>さや管ヘッダー工法</b>の定番。紫外線に弱く屋外露出は不向きです。'},
{c:'機器・材料',q:'一般換気ダクト系統に設ける防火ダンパー(FD)の温度ヒューズの溶解温度として、適当なものはどれか。',a:['72℃','120℃','280℃','500℃'],ans:0,ex:'<b>一般系統=72℃、厨房排気=120℃、排煙系統=280℃</b>。3つセットで確実に暗記しましょう。'},
{c:'施工管理',q:'施工計画に関する記述のうち、適当でないものはどれか。',a:['総合工程表は、着工前に作成する','施工計画書は、工事の施工方法・段取りなどを定めたものである','仮設計画は、安全確保の基本となる計画である','施工図は、工事完成後に作成する'],ans:3,ex:'施工図は<b>施工に先立って</b>作成し、納まり・取り合いを検討するもの。完成後に作るのは完成図(竣工図)です。'},
{c:'施工管理',q:'工程・原価・品質の関係に関する記述のうち、適当なものはどれか。',a:['施工速度を極端に速めると、一般に原価は高くなる','品質を高めると、一般に原価は安くなる','工程・原価・品質は、互いに無関係である','原価が最小となる施工速度(経済速度)は存在しない'],ans:0,ex:'突貫工事は残業・手戻りで原価増。品質向上も一般に原価増。<b>原価最小となる経済速度</b>が存在します。'},
{c:'施工管理',q:'ネットワーク工程表のダミーに関する記述のうち、適当なものはどれか。',a:['所要時間ゼロで、作業の相互関係のみを示す点線の矢印である','最も重要な実作業を示す','所要日数を持つ実線の矢印である','工期を短縮するための手法である'],ans:0,ex:'ダミーは<b>架空の作業(所要時間0)</b>で、作業間の先行・後続関係だけを表す点線矢印です。'},
{c:'施工管理',q:'山積み・山崩しに関する記述のうち、適当なものはどれか。',a:['山崩しは、労務者数や機械台数などの平準化を図るために行う','山崩しは、クリティカルパス上の作業から優先的に移動させる','山崩しは、工期を延長するための手法である','山崩しは、品質検査の手法である'],ans:0,ex:'フロート(余裕日数)のある作業をずらして資源を平準化するのが山崩し。<b>余裕のないクリティカルパス上の作業は動かせません</b>。'},
{c:'施工管理',q:'検査に関する記述のうち、適当でないものはどれか。',a:['防火ダンパーの作動確認は、抜取検査でよい','ボイラーの安全弁の作動確認は、全数検査とする','埋設配管の勾配確認は、埋戻しの前に行う','配管の水圧試験は、保温などの被覆施工前に行う'],ans:0,ex:'防火ダンパー・安全弁など<b>人命・防災に関わるものは全数検査</b>が原則です。抜取検査は不適当。'},
{c:'施工管理',q:'品質管理におけるデミングサークル(PDCA)の順序として、適当なものはどれか。',a:['計画 → 実施 → 検討 → 処置','計画 → 検討 → 実施 → 処置','実施 → 計画 → 処置 → 検討','検討 → 処置 → 計画 → 実施'],ans:0,ex:'<b>Plan(計画)→Do(実施)→Check(検討)→Act(処置)</b>のサイクルを回して品質を継続的に改善します。'},
{c:'施工管理',q:'脚立・移動はしごに関する記述のうち、適当でないものはどれか。',a:['脚立の脚と水平面との角度は85度とし、開き止め金具は省略してよい','移動はしごの幅は30cm以上とする','移動はしごには、すべり止め装置を設ける','脚立は、著しい損傷・腐食のない材料のものを使用する'],ans:0,ex:'脚立は脚と水平面の角度<b>75度以下</b>とし、<b>開き止め金具は必須</b>です。移動はしごは幅30cm以上+すべり止め。'},
{c:'施工管理',q:'感電災害の防止に関する記述のうち、適当なものはどれか。',a:['移動式・可搬式の電動機械器具には、感電防止用漏電しゃ断装置を接続する','漏電しゃ断装置は、雨天時のみ接続すればよい','感電災害は、低圧の電気では発生しない','接地(アース)は感電防止に効果がない'],ans:0,ex:'湿潤な場所などで使う移動式電動機械器具には<b>漏電しゃ断装置</b>が義務。100Vの低圧でも感電死亡災害は発生します。'},
{c:'施工管理',q:'安全活動に関する記述のうち、適当なものはどれか。',a:['危険予知(KY)活動は、作業開始前に作業に潜む危険を話し合い、対策と行動目標を定める活動である','KY活動は、事故が発生した後に行う活動である','ツールボックスミーティングは、月に1回行えばよい','安全施工サイクルに朝礼は含まれない'],ans:0,ex:'KY活動・TBM(ツールボックスミーティング)は<b>毎日の作業開始前</b>に行い、安全朝礼→KY→点検→片付けの安全施工サイクルを回します。'},
{c:'施工管理',q:'機器の耐震施工に関する記述のうち、適当なものはどれか。',a:['防振基礎には、地震時の過大な変位を防ぐ耐震ストッパーを設ける','防振装置があれば、耐震ストッパーは不要である','アンカーボルトは機器の固定には関係しない','背の高い機器でも、頂部の支持は不要である'],ans:0,ex:'防振ゴム等で浮いている機器は地震で大きく揺れるため<b>耐震ストッパーが必須</b>。背の高い機器は頂部支持も行います。'},
{c:'施工管理',q:'給水管と排水管を平行して地中に埋設する場合の記述として、適当なものはどれか。',a:['両配管の水平間隔は500mm以上とし、給水管を排水管の上方に埋設する','給水管は排水管の下方に埋設する','両配管の間隔は100mm程度でよい','交差する場合は排水管を上方とする'],ans:0,ex:'汚染防止のため<b>間隔500mm以上・給水管が上</b>。交差部も給水管を上にします。数値と上下関係の両方が問われます。'},
{c:'施工管理',q:'保温施工に関する記述のうち、適当なものはどれか。',a:['保温筒の継目(合わせ目)は、同一線上にならないようずらして施工する','保温筒の継目は、一直線にそろえて施工する','冷水管の保温では、防湿処理は不要である','屋外配管の保温外装では、防水性を考慮する必要はない'],ans:0,ex:'継目をずらす(千鳥)ことで熱橋・隙間を防ぎます。冷水管は結露防止のため<b>防湿処理が必須</b>、屋外は防水性のある外装とします。'},
{c:'施工管理',q:'渦巻ポンプの試運転に関する記述のうち、適当なものはどれか。',a:['吐出弁を全閉にして起動し、徐々に弁を開いて水量を調整する','吐出弁を全開にして起動する','吸込弁を閉じたまま運転する','グランドパッキン部から少量の水滴が落ちるのは直ちに故障である'],ans:0,ex:'遠心ポンプは<b>締切起動(吐出弁全閉→徐々に開)</b>が基本。グランドパッキンは冷却・潤滑のため<b>少量の漏水が正常</b>です。'},
{c:'施工管理',q:'ダクトの施工に関する記述のうち、適当なものはどれか。',a:['アングルフランジ工法ダクトのフランジ接合部には、ガスケットを用いる','ダクトの吊り間隔は10m程度でよい','はぜは、ダクトの強度には関係しない','ダクトの拡大・縮小は、できるだけ急激に行うのがよい'],ans:0,ex:'フランジ部は<b>ガスケットで気密</b>を確保。吊り間隔は3.64m以下(アングル工法)、断面変化は拡大15度以内・縮小30度以内が目安です。'},
{c:'法規',q:'建設業法上の請負契約に関する記述のうち、適当なものはどれか。',a:['契約の当事者は、契約内容を記載した書面を相互に交付しなければならない','請負契約は口頭で締結すれば書面は不要である','書面は注文者のみが保管すればよい','工期は書面に記載しなくてよい'],ans:0,ex:'請負契約では工事内容・請負代金・工期などを記載した<b>書面を相互に交付</b>する義務があります(電子契約も可)。'},
{c:'法規',q:'建設業法上の一括下請負に関する記述のうち、適当なものはどれか。',a:['公共工事では、一括下請負はいかなる場合も禁止されている','民間工事の一括下請負は、常に自由である','いかなる工事でも、発注者の承諾なしに一括下請負ができる','共同住宅の新築工事では、発注者の承諾があれば一括下請負ができる'],ans:0,ex:'<b>公共工事と共同住宅の新築工事は全面禁止</b>。その他の民間工事は発注者の書面による承諾があれば可能です。'},
{c:'法規',q:'労働安全衛生法上の統括安全衛生責任者に関する記述のうち、適当なものはどれか。',a:['特定元方事業者は、関係請負人を含む労働者数が常時50人以上の現場では統括安全衛生責任者を選任する','労働者数にかかわらず、すべての現場で選任が必要である','選任基準は常時10人以上である','統括安全衛生責任者は下請の事業者が選任する'],ans:0,ex:'混在現場で常時<b>50人以上</b>(ずい道・圧気・一定の橋梁は30人以上)のとき、<b>元方事業者</b>が統括安全衛生責任者を選任します。'},
{c:'法規',q:'移動式クレーンの運転資格に関する記述のうち、適当なものはどれか。',a:['つり上げ荷重1t未満の移動式クレーンの運転は、特別教育を受けた者が行うことができる','つり上げ荷重5t以上の移動式クレーンの運転は、特別教育でよい','つり上げ荷重1t以上5t未満は、資格が不要である','移動式クレーンの運転には、荷重にかかわらず免許が必要である'],ans:0,ex:'<b>1t未満=特別教育、1t以上5t未満=小型移動式クレーン技能講習、5t以上=免許</b>。3段階で覚えましょう。'},
{c:'法規',q:'労働基準法上、1日の労働時間が8時間を超える場合に、少なくとも与えなければならない休憩時間として、正しいものはどれか。',a:['1時間','45分','30分','15分'],ans:0,ex:'休憩は<b>労働時間6時間超で45分、8時間超で1時間</b>以上を労働時間の途中に与えます。'},
{c:'法規',q:'建築基準法上の用語に関する記述のうち、適当なものはどれか。',a:['建築物に設ける電気・給排水・空調などの建築設備は、建築物に含まれる','建築設備は、建築物とはまったく別個のものとして扱われる','屋根と柱を有する工作物は、建築物に該当しない','門・塀は、いかなる場合も建築物に該当しない'],ans:0,ex:'建築基準法の「建築物」には<b>建築設備を含む</b>と定義されています。屋根+柱(又は壁)を有する工作物は建築物です。'},
{c:'法規',q:'シックハウス対策に関する記述のうち、適当なものはどれか。',a:['住宅の居室には、原則として換気回数0.5回/h以上の機械換気設備(24時間換気)の設置が必要である','シックハウス対策は、自然換気だけで足りる','ホルムアルデヒド発散建材の使用制限はない','必要な換気回数は0.1回/hである'],ans:0,ex:'建築基準法により居室には<b>0.5回/h以上の常時換気(24時間換気)</b>が原則必要。ホルムアルデヒド建材の使用制限もあります。'},
{c:'法規',q:'消防設備士に関する記述のうち、適当なものはどれか。',a:['甲種消防設備士は、消防用設備等の工事と整備を行うことができる','乙種消防設備士は、工事を行うことができる','消防設備士でなくても、屋内消火栓設備の工事ができる','甲種消防設備士は、整備のみを行うことができる'],ans:0,ex:'<b>甲種=工事+整備、乙種=整備のみ</b>。屋内消火栓・スプリンクラー等の工事は甲種消防設備士の独占業務です。'},
{c:'法規',q:'公共下水道に関する記述のうち、適当なものはどれか。',a:['分流式では、汚水と雨水を別々の管きょ系統で排除する','分流式では、汚水と雨水を同一の管きょで排除する','合流式では、汚水と雨水を別々の管きょで排除する','供用開始後も、排水設備の設置は任意である'],ans:0,ex:'<b>分流式=汚水・雨水別系統、合流式=同一管きょ</b>。供用開始後は遅滞なく排水設備を設置する義務があります。'},
{c:'法規',q:'産業廃棄物管理票(マニフェスト)に関する記述のうち、適当なものはどれか。',a:['排出事業者は、処理を委託する際にマニフェストを交付し、その写しを5年間保存する','マニフェストは、処理業者が排出事業者に交付する','マニフェストの保存期間は1年間である','マニフェストは口頭確認で代替できる'],ans:0,ex:'マニフェストは<b>排出事業者が交付</b>し、返送された写しを<b>5年間保存</b>。処理の流れを最後まで確認する責任は排出事業者にあります。'},
{c:'二次検定対策',q:'施工経験記述における「工事概要」の書き方として、適当なものはどれか。',a:['工事名・工事場所・設備工事概要・工期・自分の立場を具体的に記述する','工事名だけを書けばよい','経験していない工事を参考書の例文どおりに書いてよい','工期は記載しなくてよい'],ans:0,ex:'工事概要は<b>採点者が現場をイメージできる具体性</b>が必要。設備工事概要には建物規模と担当設備(機器容量・台数など)を書きます。未経験工事の記述は虚偽となり失格のリスクがあります。'},
{c:'二次検定対策',q:'施工経験記述の本文の書き方として、最も適当なものはどれか。',a:['「特に重要と考えた事項」とその「理由」、自分が「講じた措置・対策」を具体的に記述する','「安全に十分注意して施工した」のように簡潔にまとめる','一般論を書き、自分の行動は書かない','箇条書きは禁止されているのですべて一文で書く'],ans:0,ex:'記述の型は<b>①課題 → ②理由(現場条件)→ ③対策(自分が実施した具体的行動)</b>。抽象的な心構えや教科書的な一般論だけでは得点できません。'},
{c:'二次検定対策',q:'経験記述「工程管理」のテーマで評価されやすい記述内容として、適当なものはどれか。',a:['機器の早期発注や作業の並行化など、遅延防止のために自ら講じた具体的な措置','天候に恵まれて予定どおり進んだこと','他業種の工事が遅れたことへの不満','特に何もしなかったが間に合ったこと'],ans:0,ex:'工程管理は<b>遅延要因の予測+自分の対策</b>を書きます。例:機器の早期発注、施工図の先行作成、週間工程会議での調整、作業班の増強など。'},
{c:'二次検定対策',q:'経験記述「品質管理」のテーマで評価されやすい記述内容として、適当なものはどれか。',a:['水圧試験・勾配確認・受入検査など、品質確保のために実施した管理の具体的内容','高価な材料を使用したこと','品質管理は協力会社に一任したこと','検査を省略して工期を短縮したこと'],ans:0,ex:'品質管理は<b>試験・検査・確認行為</b>が書きやすい:水圧/満水試験、排水勾配の確認、溶接部の検査、養生、材料の受入検査など。数値を入れると説得力が増します。'},
{c:'二次検定対策',q:'経験記述「安全管理」のテーマで評価されやすい記述内容として、適当なものはどれか。',a:['墜落防止・酸欠防止・火気管理など、労働災害防止のために実施した具体的な措置','事故が起きなかったのは運が良かったこと','安全対策はすべて元請に任せたこと','「安全第一で頑張った」という心構え'],ans:0,ex:'安全管理は<b>危険の特定+具体策</b>:高所作業の作業床・フルハーネス、酸素濃度測定と換気、KY活動、火気養生、熱中症対策(WBGT・休憩)など。'},
{c:'二次検定対策',q:'作業A(3日)と作業B(5日)を同時に開始し、両方の完了後に作業C(4日)を行う。全体の所要日数(工期)は何日か。',a:['9日','7日','12日','8日'],ans:0,ex:'Cを開始できるのはAとBのうち<b>遅い方(B:5日)</b>の完了後。5+4=<b>9日</b>。合流点では最も遅い経路が工期を決めます(B→Cがクリティカルパス)。'},
{c:'二次検定対策',q:'ある作業の最早開始時刻が5日、所要日数が3日、最遅完了時刻が12日のとき、この作業のトータルフロート(TF)は何日か。',a:['4日','0日','3日','7日'],ans:0,ex:'TF=最遅完了時刻-(最早開始時刻+所要日数)=12-(5+3)=<b>4日</b>。TF=0の作業をつないだ経路がクリティカルパスです。'},
{c:'二次検定対策',q:'フリーフロート(FF)の説明として、適当なものはどれか。',a:['後続作業の最早開始時刻に影響を与えない範囲で使える余裕時間','工期全体を延ばしてもよい日数','クリティカルパス上の作業が持つ余裕時間','作業を短縮できる最大日数'],ans:0,ex:'FF=<b>後続に影響しない余裕</b>、TF=工期に影響しない余裕で、FF≦TF。クリティカルパス上はどちらも0です。'},
{c:'二次検定対策',q:'冷媒配管の施工に関する記述のうち、適当でないものはどれか。',a:['ろう付け中は、配管内に窒素ガスを流しながら行う','気密試験には窒素ガスを使用する','冷媒配管はできるだけ短く、曲がりを少なくする','ろう付け中は、配管内に酸素を流しながら行う'],ans:3,ex:'配管内への<b>酸素の使用は厳禁</b>(酸化スケール・冷凍機油との反応による爆発の危険)。ろう付け時は<b>窒素ブロー</b>、気密試験も窒素で行います。'},
{c:'二次検定対策',q:'渦巻ポンプの吸込管の施工に関する記述のうち、適当なものはどれか。',a:['空気だまりができないよう、ポンプに向かって上り勾配で配管する','ポンプに向かって下り勾配で配管する','吸込管はできるだけ細く長くする','水平部に空気だまりがあっても支障はない'],ans:0,ex:'吸込管は<b>ポンプに向かって上り勾配(1/100程度)</b>とし、空気だまりを防止します。空気を吸い込むと揚水不能・キャビテーションの原因になります。'},
{c:'二次検定対策',q:'送風機とダクトの接続に関する記述のうち、適当なものはどれか。',a:['たわみ継手(キャンバス継手)を設け、送風機の振動がダクトに伝わるのを防ぐ','送風機とダクトは剛に接合する','接続部の隙間はそのままでよい','たわみ継手は騒音を増大させるため使用しない'],ans:0,ex:'送風機まわりは<b>たわみ継手で振動を絶縁</b>します。機器の防振(防振ゴム・スプリング)とセットで覚えましょう。'},
{c:'二次検定対策',q:'多翼送風機の試運転に関する記述のうち、適当なものはどれか。',a:['吐出側ダンパーを全閉にして起動し、徐々に開いて規定風量に調整する','吐出側ダンパーを全開にして起動する','ダンパー開度は軸動力に影響しない','回転方向の確認は不要である'],ans:0,ex:'多翼送風機は<b>全閉時に軸動力が最小</b>となるため全閉起動が基本。起動前の回転方向確認、Vベルトの張り確認も試運転の必須項目です。'},
{c:'二次検定対策',q:'冷水管を吊りバンドで支持する場合の記述として、適当なものはどれか。',a:['保温の上から支持する場合は、結露防止のため合成樹脂製の支持受けなどを使用する','裸管に吊りバンドを直接掛ければ結露しない','支持部の保温は省略してよい','結露は支持方法とは無関係である'],ans:0,ex:'支持部で保温が潰れたり金属が管に直接触れると<b>熱橋となって結露</b>します。合成樹脂製支持受け(プレート)等で断熱を確保します。'},
{c:'二次検定対策',q:'配管埋設後の埋戻しに関する記述のうち、適当なものはどれか。',a:['良質土または砂を用いて、厚さ30cm程度ごとに締め固めながら埋め戻す','一度に全量を埋め戻し、転圧は行わない','がれき・石を多く含む土で埋め戻してよい','配管の直上に大きな礫を置いてよい'],ans:0,ex:'埋戻しは<b>良質土・砂を30cm程度ごとに転圧</b>。配管周囲は管を傷つけない材料(砂等)で保護します。沈下・管の損傷防止のポイントです。'},
{c:'二次検定対策',q:'冷凍機の試運転における起動順序として、適当なものはどれか。',a:['冷水ポンプ・冷却水ポンプ・冷却塔を先に運転し、水の循環を確認してから冷凍機を起動する','冷凍機を最初に起動する','冷却塔は運転しなくてよい','起動順序は性能に影響しない'],ans:0,ex:'冷凍機は<b>冷水・冷却水の循環確立が起動条件</b>(インターロック)。停止時は逆に冷凍機を先に停止し、ポンプ類を後に止めます。'},
{c:'原論・基礎',q:'圧力に関する記述のうち、適当なものはどれか。',a:['絶対圧力は、ゲージ圧力に大気圧を加えたものである','ゲージ圧力は、絶対圧力に大気圧を加えたものである','絶対圧力とゲージ圧力は常に等しい','大気圧は0Paである'],ans:0,ex:'<b>絶対圧=ゲージ圧+大気圧</b>。圧力計が示すのは大気圧を基準としたゲージ圧です。'},
{c:'原論・基礎',q:'標準大気圧のおよその値として、適当なものはどれか。',a:['101.3kPa','10.13kPa','1013kPa','1.013kPa'],ans:0,ex:'標準大気圧=<b>約101.3kPa</b>(=1013hPa=約0.1MPa)。単位換算とセットで覚えましょう。'},
{c:'原論・基礎',q:'比熱に関する記述のうち、適当なものはどれか。',a:['水の比熱は約4.2kJ/(kg・K)で、空気の比熱より大きい','空気の比熱は水の比熱より大きい','水と空気の比熱は等しい','比熱が大きい物質ほど温まりやすく冷めやすい'],ans:0,ex:'水の比熱は<b>約4.2kJ/(kg・K)</b>、空気は約1.0kJ/(kg・K)。比熱が大きい水は温まりにくく冷めにくいため、熱の輸送媒体に適しています。'},
{c:'原論・基礎',q:'湿り空気線図(h-x線図)に関する記述のうち、適当なものはどれか。',a:['乾球温度と相対湿度が分かれば、絶対湿度や露点温度などを読み取ることができる','湿り空気線図からは乾球温度しか読み取れない','空気の加熱・冷却の状態変化は表せない','湿り空気線図は水の性質を表す図である'],ans:0,ex:'湿り空気線図では<b>2つの状態値が分かれば他の状態値がすべて読み取れます</b>。加熱・冷却・加湿などの状態変化も線図上で追えます。'},
{c:'原論・基礎',q:'三相誘導電動機のスターデルタ始動に関する記述のうち、適当なものはどれか。',a:['始動電流を小さく抑えるために用いられる','始動トルクを大きくするために用いられる','回転方向を変えるために用いられる','消費電力を増やすために用いられる'],ans:0,ex:'スターデルタ始動は始動時のみスター結線とし、<b>始動電流を直入れ始動の約1/3に抑えます</b>(始動トルクも1/3に低下)。'},
{c:'原論・基礎',q:'電気設備の接地(アース)の主な目的として、適当なものはどれか。',a:['漏電時の感電や火災を防止する','消費電力を削減する','電動機の回転数を上げる','力率を改善する'],ans:0,ex:'接地は漏電時に電流を大地へ逃がし、<b>感電・火災を防止</b>します。漏電しゃ断器と組み合わせて保護効果を高めます。'},
{c:'原論・基礎',q:'コンクリートに関する記述のうち、適当でないものはどれか。',a:['鉄筋のかぶり厚さは、耐久性・耐火性の確保のために必要である','コンクリートはアルカリ性で、鉄筋の防錆に有効である','コンクリートは圧縮強度に比べて引張強度が小さい','水セメント比が大きいほど、圧縮強度は大きくなる'],ans:3,ex:'水セメント比(水÷セメント)が大きい=水が多いほど<b>強度は低下</b>します。かぶり厚さ・アルカリ性による防錆は正しい記述です。'},
{c:'原論・基礎',q:'鉄筋コンクリート梁の配管用貫通孔に関する記述のうち、適当なものはどれか。',a:['貫通孔の径は梁せいの1/3以下とし、梁の中央部付近に設ける','貫通孔は梁端部に設けるのがよい','貫通孔の径に制限はない','貫通孔どうしの間隔に制限はない'],ans:0,ex:'梁貫通孔は<b>径:梁せいの1/3以下、位置:せん断力の小さい中央部付近</b>、孔の中心間隔は径の3倍以上が原則です。'},
{c:'空調',q:'冷媒に関する記述のうち、適当なものはどれか。',a:['地球温暖化係数(GWP)のより小さい冷媒への転換が進められている','フロン系冷媒は大気中に放出してよい','冷媒はオゾン層破壊係数が大きいほど望ましい','R32などのHFC冷媒は温室効果がない'],ans:0,ex:'冷媒はCFC→HCFC→HFCと転換され、現在は<b>低GWP冷媒への転換</b>が進行中。フロン類の放出はフロン排出抑制法で禁止されています。'},
{c:'空調',q:'氷蓄熱方式に関する記述のうち、適当なものはどれか。',a:['夜間電力を利用して蓄熱し、熱源機器の容量を小さくできる','昼間のピーク時間帯に蓄熱を行う','水蓄熱に比べて蓄熱槽の容積が大きくなる','蓄熱により電力のピークカットはできない'],ans:0,ex:'蓄熱方式は<b>夜間に蓄熱して昼間の負荷をまかなう</b>ことで熱源容量の縮小と電力ピークカットが可能。氷蓄熱は潜熱を使うため<b>水蓄熱より槽が小さく</b>なります。'},
{c:'空調',q:'コージェネレーションシステムに関する記述のうち、適当なものはどれか。',a:['発電時の排熱を給湯や暖房に利用し、総合効率を高めるシステムである','電力のみを効率よく作るシステムである','排熱はすべて大気に放出する','冷房には一切利用できない'],ans:0,ex:'コージェネは<b>発電+排熱利用</b>で総合効率70〜80%を実現。排熱は給湯・暖房のほか、吸収冷凍機を介して冷房にも利用できます。'},
{c:'空調',q:'ビル用マルチパッケージ形空調機に関する記述のうち、適当なものはどれか。',a:['1台の屋外機に複数の室内機を冷媒配管で接続し、室内機ごとの個別制御が容易である','屋外機と室内機は水配管で接続される','室内機ごとの発停はできない','大規模な中央機械室が必要である'],ans:0,ex:'ビル用マルチは<b>冷媒配管で多数の室内機を接続</b>し、個別制御性に優れ機械室も不要。中小規模ビルで広く採用されています。'},
{c:'空調',q:'外気冷房に関する記述のうち、適当なものはどれか。',a:['中間期や冬期に、温度の低い外気を導入して冷房負荷を軽減する省エネルギー手法である','真夏の日中に外気を大量に導入する手法である','外気冷房は加湿を目的とする','外気冷房は室内負荷を増加させる'],ans:0,ex:'内部発熱の大きい建物では中間期・冬期でも冷房需要があり、<b>冷たい外気の導入</b>で熱源運転を減らせます。'},
{c:'空調',q:'CO2濃度による外気量制御に関する記述のうち、適当なものはどれか。',a:['室内のCO2濃度に応じて外気導入量を調整し、外気負荷を低減する省エネルギー手法である','CO2濃度が高いほど外気量を減らす制御である','在室人数と外気量は無関係である','常に最大外気量を導入する制御である'],ans:0,ex:'在室人員が少ないときに外気を絞ることで<b>外気負荷を削減</b>します(基準値1000ppm以下は維持)。'},
{c:'空調',q:'エアハンドリングユニットの構成機器の一般的な配置順序(空気の流れ順)として、適当なものはどれか。',a:['エアフィルタ → 冷温水コイル → 加湿器 → 送風機','送風機 → 加湿器 → 冷温水コイル → エアフィルタ','加湿器 → エアフィルタ → 送風機 → 冷温水コイル','冷温水コイル → エアフィルタ → 加湿器 → 送風機'],ans:0,ex:'空気は<b>フィルタでろ過→コイルで熱交換→加湿→送風機</b>の順に流れるのが標準構成です。'},
{c:'空調',q:'空調の自動制御に関する記述のうち、適当なものはどれか。',a:['電動二方弁による制御では、コイルへの水量が変化する変流量方式となる','電動三方弁による制御では、配管系全体の流量が大きく変化する','サーモスタットは湿度を検出する機器である','自動制御は手動制御より省エネルギーに不利である'],ans:0,ex:'<b>二方弁=変流量(ポンプ動力削減可)、三方弁=定流量(バイパスで流量一定)</b>。サーモスタットは温度検出器です。'},
{c:'空調',q:'室容積500m³の室に換気量1500m³/hの換気を行う場合の換気回数として、適当なものはどれか。',a:['3回/h','0.3回/h','5回/h','30回/h'],ans:0,ex:'換気回数=換気量÷室容積=1500÷500=<b>3回/h</b>。換気回数の定義式は計算問題の定番です。'},
{c:'空調',q:'空調設備の省エネルギー運用に関する記述のうち、適当なものはどれか。',a:['予冷・予熱時に外気取入れを停止することは、省エネルギーに有効である','予冷・予熱時こそ外気を最大限導入するのがよい','冷房設定温度を必要以上に低くすると省エネルギーになる','機器は常に定格全開で運転するのがよい'],ans:0,ex:'在室者のいない<b>予冷・予熱時間帯は外気カット</b>が定石。無駄な外気負荷をなくして立ち上がりを早めます。'},
{c:'給排水衛生',q:'簡易専用水道(受水槽の有効容量が10m³を超えるもの)の管理に関する記述のうち、適当なものはどれか。',a:['水槽の清掃を1年以内ごとに1回、定期に行う','清掃は5年に1回でよい','水質検査は一切不要である','受水槽の容量にかかわらず規制はない'],ans:0,ex:'簡易専用水道は<b>年1回の清掃と、地方公共団体等の登録検査機関による検査</b>が水道法で義務付けられています。'},
{c:'給排水衛生',q:'飲料用受水槽の構造に関する記述のうち、適当なものはどれか。',a:['保守点検用マンホールは、直径60cm以上とする','マンホールは直径30cmあればよい','水槽の天井・底・周壁は建物の躯体と兼用してよい','オーバーフロー管の管端は開放せず密閉する'],ans:0,ex:'マンホールは<b>直径60cm以上</b>で防水密閉型。天井・底・周壁は建築躯体と兼用せず、<b>六面点検</b>ができる構造とします。'},
{c:'給排水衛生',q:'中央式給湯設備の循環方式に関する記述のうち、適当なものはどれか。',a:['湯の温度低下を防ぐため返湯管を設け、循環ポンプは返湯管に設置する','循環ポンプは給湯往管に設置する','返湯管は不要である','循環量は多いほど省エネルギーである'],ans:0,ex:'循環ポンプは<b>返湯管(戻り側)</b>に設けるのが標準。配管内の湯を循環させ、給湯栓を開いてすぐ湯が出るようにします。'},
{c:'給排水衛生',q:'給湯設備の膨張タンクに関する記述のうち、適当なものはどれか。',a:['密閉式膨張タンクは、設置位置の制約が少ない','開放式膨張タンクは、系統の最低部に設ける','膨張タンクは湯の膨張を吸収する必要がない場合に設ける','密閉式膨張タンクは大気に開放されている'],ans:0,ex:'<b>開放式は系統の最高部より高い位置</b>が必要ですが、<b>密閉式は設置位置が自由</b>。加熱による水の膨張を吸収し配管を保護します。'},
{c:'給排水衛生',q:'大気圧式バキュームブレーカーの設置に関する記述のうち、適当なものはどれか。',a:['常時圧力のかからない、最終の止水機構の下流側(二次側)に設ける','常時圧力のかかる給水管の途中に設ける','排水管の末端に設ける','設置の向きは問わない'],ans:0,ex:'大気圧式バキュームブレーカーは<b>止水機構の二次側(常時水圧がかからない側)</b>に設置。洗浄弁式大便器の逆流防止に必須です。'},
{c:'給排水衛生',q:'排水槽・排水ポンプに関する記述のうち、適当なものはどれか。',a:['排水ポンプは原則2台設置し、自動交互運転とする','排水ポンプは1台あれば予備は不要である','汚物ポンプは固形物が通らない構造がよい','排水槽にポンプは設置しない'],ans:0,ex:'故障に備え<b>2台設置・自動交互運転(満水時は同時運転)</b>が標準。汚物用には固形物を通せるノンクロッグ形などを使います。'},
{c:'給排水衛生',q:'排水槽の構造に関する記述のうち、適当なものはどれか。',a:['底部には吸込みピットを設け、ピットに向かって1/15〜1/10の勾配をつける','底部は完全に水平とする','通気管は設けなくてよい','マンホールは不要である'],ans:0,ex:'排水槽底部は<b>吸込みピットへ向かう勾配1/15〜1/10</b>で汚物の滞留を防止。通気管・マンホール(60cm以上)も必要です。'},
{c:'給排水衛生',q:'グリース阻集器(グリーストラップ)に関する記述のうち、適当なものはどれか。',a:['厨房排水中の油脂分を阻集し、排水管の閉塞を防ぐ','雨水中の土砂を阻集する装置である','油脂は除去せずそのまま下水へ流す装置である','グリース阻集器の清掃は不要である'],ans:0,ex:'厨房排水の<b>油脂(グリース)を分離・阻集</b>して配管閉塞・下水道への負荷を防ぎます。阻集器自体がトラップ機能を持つため二重トラップにならないよう注意。'},
{c:'給排水衛生',q:'特殊継手排水システムに関する記述のうち、適当なものはどれか。',a:['排水立て管内の流速を減じて通気を確保するもので、高層集合住宅などで用いられる','通気立て管を必ず併設するシステムである','低層戸建住宅専用のシステムである','排水能力は通常の継手より小さい'],ans:0,ex:'特殊継手排水システムは<b>伸頂通気方式を改良</b>したもので、旋回流により管内圧力を緩和し、通気立て管なしで高層に対応します。'},
{c:'給排水衛生',q:'雨水排水に関する記述のうち、適当なものはどれか。',a:['雨水立て管は、汚水排水管や通気管と兼用してはならない','雨水立て管は通気管と兼用してよい','雨水立て管は汚水立て管と兼用してよい','雨水は必ず汚水系統に合流させる'],ans:0,ex:'雨水立て管は<b>単独系統</b>とし、汚水管・通気管との兼用は禁止。豪雨時の満流で通気が機能しなくなるためです。'},
{c:'給排水衛生',q:'連結送水管に関する記述のうち、適当なものはどれか。',a:['送水口は、消防ポンプ自動車から送水するために設けるものである','送水口は建物内の在館者が初期消火に使うものである','放水口は地階のみに設ける','連結送水管は給水設備の一種である'],ans:0,ex:'連結送水管は<b>消防隊が使用する消防活動上必要な施設</b>。送水口(双口形)から消防車が加圧送水し、各階の放水口で放水します。'},
{c:'給排水衛生',q:'一般家庭に供給される都市ガスの供給圧力区分として、適当なものはどれか。',a:['低圧(0.1MPa未満)','中圧','高圧','超高圧'],ans:0,ex:'一般需要家には<b>低圧(0.1MPa未満、実際は2〜2.5kPa程度)</b>で供給されます。中圧・高圧は工場や大規模施設・導管輸送用です。'},
{c:'機器・材料',q:'炉筒煙管ボイラーに関する記述のうち、適当なものはどれか。',a:['保有水量が多く、負荷変動に対して安定した運転ができる','保有水量が少なく、起動時間が極めて短い','高層ビルの真空給湯専用である','水管ボイラーの一種である'],ans:0,ex:'炉筒煙管ボイラーは<b>保有水量が多く負荷変動に強い</b>反面、起動に時間がかかります。ビルの暖房・給湯用に広く使われてきました。'},
{c:'機器・材料',q:'FRP製飲料用水槽に関する記述のうち、適当なものはどれか。',a:['軽量で耐食性に優れるが、紫外線による劣化や機械的強度に注意が必要である','鋼板製より重い','耐食性が低く錆びやすい','光を完全に透過しないため藻類は発生しない'],ans:0,ex:'FRP製は<b>軽量・耐食性良</b>。ただし紫外線劣化・衝撃に注意し、藻類発生防止のため遮光性のあるパネルを使います。'},
{c:'機器・材料',q:'スパイラルダクトに関する記述のうち、適当なものはどれか。',a:['甲はぜが補強の役割を果たすため強度が高く、一般に継目の溶接が不要である','強度が低いため長い支持間隔がとれない','接続には溶接接合しか使えない','角ダクトより漏気が多い'],ans:0,ex:'スパイラルダクトは帯状鋼板を螺旋状に巻いたもので、<b>はぜが補強となり高強度</b>。接続は差込み接合(継手+ビス+シール)が一般的です。'},
{c:'機器・材料',q:'吹出口に関する記述のうち、適当なものはどれか。',a:['アネモスタット型は誘引効果が大きく、天井吹出しによる拡散に適している','アネモスタット型は到達距離が大きく大空間の壁付けに適する','ノズル型は誘引効果が最も大きい','線状(ライン型)吹出口はペリメータ部には使用できない'],ans:0,ex:'<b>アネモ型=誘引拡散に優れ天井用</b>、<b>ノズル型=到達距離が大きく大空間用</b>。ライン型は窓際(ペリメータ)にもよく使われます。'},
{c:'機器・材料',q:'ダクト系の消音に関する記述のうち、適当なものはどれか。',a:['内貼りダクトや消音エルボは、送風機などの騒音を低減するために用いられる','消音装置は騒音を増幅する装置である','ダクトの騒音対策は不可能である','消音エルボは風量を増やすために設ける'],ans:0,ex:'グラスウールなどを内貼りした<b>消音ダクト・消音エルボ・消音ボックス</b>で送風機騒音や通過音を減衰させます。'},
{c:'機器・材料',q:'配管の溶接接合に関する記述のうち、適当なものはどれか。',a:['ねじ接合に比べて漏れが少なく、強度・耐久性に優れる','ねじ接合より漏れやすい','溶接接合は取り外しが容易である','管内の流体抵抗が大きくなる'],ans:0,ex:'溶接接合は<b>気密性・強度に優れ</b>、大口径・高圧配管の標準。反面、取り外しは切断が必要です。開先の管理・溶接部の検査が品質のポイント。'},
{c:'機器・材料',q:'水道用硬質塩化ビニルライニング鋼管に関する記述のうち、適当なものはどれか。',a:['鋼管の内面に硬質塩化ビニルをライニングして耐食性を高めた管で、接続には管端防食継手を用いる','塩化ビニル管の外面に鋼をコーティングした管である','ライニングにより耐食性は低下する','切断面の防食処理は不要である'],ans:0,ex:'ライニング鋼管は<b>鋼の強度+塩ビの耐食性</b>を併せ持つ給水管の定番。ねじ接合部の腐食を防ぐため<b>管端防食(コア入り)継手</b>を使います。'},
{c:'機器・材料',q:'インバータによる送風機・ポンプの制御に関する記述のうち、適当なものはどれか。',a:['回転数を変えて風量・水量を調整でき、部分負荷時の消費電力を大幅に低減できる','ダンパーや弁による制御より省エネルギー効果が小さい','回転数制御では風量は変えられない','インバータは電動機の回転方向を検出する装置である'],ans:0,ex:'軸動力は回転数の3乗に比例するため、<b>回転数を下げる制御は絞り制御より大幅な省エネ</b>になります。'},
{c:'施工管理',q:'ボイラー(小型ボイラーを除く)を設置する場合の届出として、適当なものはどれか。',a:['所轄労働基準監督署長に設置届を提出する','市町村長に提出する','都道府県知事に提出する','届出は不要である'],ans:0,ex:'ボイラー・第一種圧力容器などの設置届は<b>所轄労働基準監督署長</b>へ。クレーン設置届なども同様です。'},
{c:'施工管理',q:'特定元方事業者が講ずべき措置として、適当でないものはどれか。',a:['協議組織を設置し、関係請負人を参加させる','作業間の連絡・調整を行う','毎作業日に作業場所の巡視を行う','関係請負人の労働者の賃金を直接管理する'],ans:3,ex:'特定元方事業者の措置は<b>協議組織・連絡調整・毎作業日の巡視・教育指導援助</b>など安全管理面。下請労働者の賃金管理は含まれません。'},
{c:'施工管理',q:'作業主任者の選任が必要な作業として、適当なものはどれか。',a:['酸素欠乏危険場所における作業','事務所内での図面作成作業','資材の手運搬作業','高さ1mでの配管作業'],ans:0,ex:'酸欠危険作業には<b>酸素欠乏危険作業主任者(技能講習修了者)</b>の選任が必要。ほかに石綿、ボイラー取扱、地山の掘削などにも作業主任者が必要です。'},
{c:'施工管理',q:'安全衛生教育に関する記述のうち、適当なものはどれか。',a:['労働者を雇い入れたときのほか、作業内容を変更したときにも安全衛生教育を行う','教育は雇入れ時の1回だけでよい','経験者には一切教育は不要である','安全衛生教育は労働者の自由参加とする'],ans:0,ex:'雇入れ時と<b>作業内容変更時</b>の教育は事業者の義務。危険有害業務には特別教育も必要です。'},
{c:'施工管理',q:'リスクアセスメントにおけるリスク低減措置の優先順位として、最も優先されるものはどれか。',a:['危険な作業の廃止・変更など、リスクの除去・低減','保護具の使用','マニュアルの整備などの管理的対策','安全教育の実施'],ans:0,ex:'優先順位は<b>①除去・低減(本質安全化)→②工学的対策→③管理的対策→④保護具</b>。保護具は最後の手段です。'},
{c:'施工管理',q:'曲線式工程表(Sカーブ)に関する記述のうち、適当なものはどれか。',a:['出来高の累計を曲線で表し、予定と実績の比較により進捗を管理する','各作業の順序関係を矢線で表す','労務の平準化を計算する図である','品質のばらつきを管理する図である'],ans:0,ex:'出来高累計は一般に<b>S字カーブ</b>を描きます。上方・下方許容限界曲線で管理するものはバナナ曲線と呼ばれます。'},
{c:'施工管理',q:'タクト工程表に関する記述のうち、適当なものはどれか。',a:['同一作業を階ごとに繰り返す高層建物の工事管理に適している','単発の特殊工事にのみ用いられる','作業の繰返しがない工事に最適である','気象条件の記録に用いる図である'],ans:0,ex:'タクト工程表は<b>基準階で繰り返す作業</b>をリズミカルに流す管理手法。作業班の連続投入で効率が上がります。'},
{c:'施工管理',q:'施工要領書に関する記述のうち、適当なものはどれか。',a:['工種別の施工方法や品質管理基準を定め、作業員に周知して施工品質を確保する','施工要領書は監督員に見せてはならない','施工要領書は工事完了後に作成する','作業員には周知しなくてよい'],ans:0,ex:'施工要領書は<b>着工前に作成して監督員の確認(承諾)を受け、作業員に周知</b>します。品質の均一化・手戻り防止が目的です。'},
{c:'施工管理',q:'試運転調整における風量測定・調整に関する記述のうち、適当なものはどれか。',a:['各吹出口の風量を測定し、設計風量になるようダンパー等でバランス調整を行う','風量は測定せず送風機の銘板値で確認すればよい','風量調整は竣工後に入居者が行う','ダクト系の風量は調整できない'],ans:0,ex:'試運転調整では<b>実測に基づく風量・水量のバランス調整(TAB)</b>を行い、測定記録を試験成績書として提出します。'},
{c:'施工管理',q:'工事完成時に発注者へ提出する図書として、適当でないものはどれか。',a:['完成図(竣工図)','機器類の取扱説明書','試験成績書・試運転記録','作業員の個人別給与明細'],ans:3,ex:'完成時提出図書は<b>完成図・取扱説明書・試験成績書・機器製作図・保証書</b>など。給与明細は提出図書ではありません。'},
{c:'施工管理',q:'移動式クレーンを用いた機器の揚重作業に関する記述のうち、適当なものはどれか。',a:['アウトリガーを最大限に張り出し、定格荷重を超える荷重をかけない','定格荷重は多少超えてもよい','アウトリガーは張り出さなくてよい','強風時でも作業は中止しない'],ans:0,ex:'<b>アウトリガー最大張出し・定格荷重厳守・強風時(10分間平均10m/s以上)は作業中止</b>が原則。地盤の養生(敷き鉄板)も重要です。'},
{c:'施工管理',q:'建設現場の熱中症対策に関する記述のうち、適当なものはどれか。',a:['WBGT値(暑さ指数)を把握し、休憩・水分と塩分の補給を計画的に行う','水分補給は作業終了後にまとめて行えばよい','WBGT値は騒音の指標である','真夏でも休憩は不要である'],ans:0,ex:'<b>WBGT(暑さ指数)</b>に応じた作業管理(休憩頻度・作業時間短縮)、こまめな水分・塩分補給、暑熱順化が対策の基本です。'},
{c:'法規',q:'建設業法上の主任技術者の職務として、適当でないものはどれか。',a:['施工計画の作成','工程管理','品質管理などの技術上の管理','請負代金の請求・受領'],ans:3,ex:'主任技術者の職務は<b>施工計画の作成、工程管理、品質管理その他の技術上の管理と指導監督</b>。金銭管理は職務ではありません。'},
{c:'法規',q:'建設業の許可の有効期間として、正しいものはどれか。',a:['5年','3年','10年','無期限'],ans:0,ex:'建設業許可の有効期間は<b>5年</b>で、引き続き営業する場合は期間満了前に更新申請が必要です。'},
{c:'法規',q:'建築基準法上、下水道法に定める処理区域内における便所に関する記述のうち、適当なものはどれか。',a:['水洗便所とし、汚水を公共下水道に接続しなければならない','くみ取り便所としなければならない','便所の汚水は雨水管に接続してよい','処理区域内でも接続は任意である'],ans:0,ex:'処理区域内の便所は<b>水洗便所とし公共下水道へ放流</b>する義務があります(建築基準法31条)。'},
{c:'法規',q:'給水管が防火区画を貫通する場合の措置として、適当なものはどれか。',a:['貫通部分の隙間をモルタルその他の不燃材料で埋める','隙間は布でふさげばよい','貫通部の処理は不要である','可燃性の発泡材で埋める'],ans:0,ex:'防火区画の貫通部は<b>モルタル等の不燃材料で充填</b>し、火炎・煙の伝播を防ぎます。樹脂管には防火措置付き貫通部材を使用します。'},
{c:'法規',q:'消防用設備等の工事の着工届に関する記述のうち、適当なものはどれか。',a:['甲種消防設備士は、工事に着手しようとする日の10日前までに消防長又は消防署長に届け出る','着工届は工事完了後に提出する','届出先は都道府県知事である','着工届は乙種消防設備士が行う'],ans:0,ex:'着工届は<b>甲種消防設備士が着工10日前まで</b>に消防長・消防署長へ。完了後は設置届を出し検査を受けます。'},
{c:'法規',q:'消防法上の危険物に関する記述のうち、適当なものはどれか。',a:['指定数量以上の危険物は、貯蔵所以外の場所で貯蔵してはならない','指定数量以上でも自由に貯蔵できる','灯油は危険物に該当しない','危険物の貯蔵に許可は不要である'],ans:0,ex:'指定数量以上の危険物の貯蔵・取扱いは<b>許可を受けた貯蔵所・取扱所</b>で行う必要があります。灯油は第4類(引火性液体)の危険物です。'},
{c:'法規',q:'建築物衛生法(ビル管理法)に関する記述のうち、適当なものはどれか。',a:['特定建築物では、飲料水貯水槽の清掃を1年以内ごとに1回、定期に行う','貯水槽の清掃は10年に1回でよい','特定建築物に空気環境の測定義務はない','延べ面積に関係なくすべての建物が特定建築物である'],ans:0,ex:'特定建築物(興行場・店舗・事務所等で延べ3000m²以上など)では<b>貯水槽清掃年1回</b>、空気環境測定2か月以内ごとなどが義務です。'},
{c:'法規',q:'浄化槽法に関する記述のうち、適当なものはどれか。',a:['浄化槽管理者は、毎年1回、指定検査機関の行う定期水質検査を受けなければならない','水質検査は設置時の1回だけでよい','保守点検と清掃は不要である','浄化槽は誰でも自由に設置工事ができる'],ans:0,ex:'浄化槽は<b>使用開始後の水質検査(7条)+毎年1回の定期検査(11条)</b>、および定期的な保守点検・清掃が義務。工事は浄化槽設備士が実地監督します。'},
{c:'法規',q:'フロン排出抑制法に関する記述のうち、適当なものはどれか。',a:['業務用エアコンなど第一種特定製品の管理者は、3か月に1回以上の簡易点検を行う','フロン類は大気中に放出してよい','家庭用ルームエアコンも第一種特定製品である','点検の義務は一切ない'],ans:0,ex:'業務用冷凍空調機器(第一種特定製品)の管理者には<b>3か月ごとの簡易点検</b>(一定規模以上は定期点検も)とフロンのみだりな放出禁止が課されます。'},
{c:'法規',q:'騒音規制法上、特定建設作業の敷地境界線における騒音の規制基準として、正しいものはどれか。',a:['85デシベルを超えないこと','100デシベルを超えないこと','60デシベルを超えないこと','規制基準はない'],ans:0,ex:'特定建設作業の騒音は敷地境界で<b>85dB以下</b>(振動規制法の振動は75dB以下)。作業時間帯・日数の規制もあります。'},
{c:'原論・基礎',q:'音に関する記述のうち、適当なものはどれか。',a:['空気中の音速は約340m/sで、気温が高いほど速くなる','音速は約3400m/sである','気温が低いほど音速は速くなる','音速は周波数によって大きく変わる'],ans:0,ex:'空気中の音速は<b>約340m/s(15℃)</b>で、気温が高いほど速くなります(約0.6m/s/℃)。'},
{c:'原論・基礎',q:'配管の腐食に関する記述のうち、適当なものはどれか。',a:['イオン化傾向の異なる金属を接触させると、異種金属接触腐食が生じることがある','同じ金属どうしを接続すると異種金属接触腐食が生じる','ステンレス鋼はいかなる環境でも腐食しない','腐食は配管内の水質と無関係である'],ans:0,ex:'鋼管と銅管の直接接続などでは<b>イオン化傾向の大きい金属(卑金属)側が腐食</b>します。絶縁継手による絶縁が対策です。'},
{c:'原論・基礎',q:'熱放射に関する記述のうち、適当なものはどれか。',a:['物体からの放射熱量は、表面の絶対温度の4乗に比例する','放射熱量は表面温度に反比例する','放射熱量は絶対温度の2乗に比例する','放射は物体の温度と無関係である'],ans:0,ex:'<b>ステファン・ボルツマンの法則</b>:放射エネルギーは絶対温度の4乗に比例。温度が高い物体ほど放射が急激に増えます。'},
{c:'原論・基礎',q:'低圧電路の絶縁抵抗の測定に用いる計器として、適当なものはどれか。',a:['絶縁抵抗計(メガー)','電力計','検電器','照度計'],ans:0,ex:'絶縁抵抗の測定は<b>絶縁抵抗計(メガー)</b>で行います。検電器は充電の有無の確認用です。'},
{c:'空調',q:'顕熱比(SHF)の説明として、適当なものはどれか。',a:['全熱負荷に対する顕熱負荷の割合である','潜熱負荷に対する顕熱負荷の割合である','外気負荷に対する室内負荷の割合である','冷房負荷に対する暖房負荷の割合である'],ans:0,ex:'SHF=顕熱負荷÷全熱(顕熱+潜熱)負荷。<b>コイルの冷却除湿の状態変化</b>を決める重要な指標です。'},
{c:'空調',q:'コールドドラフトに関する記述のうち、適当なものはどれか。',a:['冬期に窓面などで冷やされた空気が下降して足元に流れる現象で、窓下に放熱器を設けることが対策となる','夏期の冷房吹出し気流のことである','天井面からの放射熱のことである','コールドドラフトに対策は存在しない'],ans:0,ex:'冷えたガラス面に沿って下降する冷気流が<b>コールドドラフト</b>。窓下の放熱器・ペリメータ暖房で打ち消すのが定石です。'},
{c:'空調',q:'クリーンルームの室圧管理に関する記述のうち、適当なものはどれか。',a:['周囲からの汚染空気の侵入を防ぐため、室内を正圧に保つ','室内を負圧に保つのが原則である','室圧の管理は不要である','クリーンルームは換気してはならない'],ans:0,ex:'クリーンルームは<b>正圧</b>で汚染侵入を防止します(有害物を扱うバイオハザード室などは逆に負圧)。'},
{c:'空調',q:'置換換気方式に関する記述のうち、適当なものはどれか。',a:['低速の給気を床付近から供給し、温度成層を利用して汚染物質を天井付近から排出する','天井から高速で吹き出して室内を撹拌する方式である','床下から排気する方式である','置換換気は住宅の便所換気専用である'],ans:0,ex:'置換換気は<b>撹拌させず押し出す</b>換気。発熱源の上昇気流で汚染物を上部へ集め、居住域の空気質を高めます。'},
{c:'空調',q:'放射冷房に関する記述のうち、適当なものはどれか。',a:['冷水温度が低すぎると放射面で結露が生じるため、露点温度以上の冷水温度で運用する','放射面の結露は問題にならない','放射冷房は気流感が強い','放射冷房では除湿が不要である'],ans:0,ex:'放射冷房は気流感のない快適な冷房ですが、<b>放射面の表面温度が露点以下になると結露</b>します。除湿(潜熱処理)との併用が必要です。'},
{c:'空調',q:'ナイトパージに関する記述のうち、適当なものはどれか。',a:['夜間の冷涼な外気を導入して建物躯体を冷やし、翌日の冷房負荷を軽減する手法である','夜間に暖房を全開にする手法である','夜間に窓を閉め切って熱をためる手法である','冬期専用の省エネルギー手法である'],ans:0,ex:'ナイトパージは<b>夜間外気冷房</b>とも呼ばれ、躯体蓄熱を利用して冷房立ち上がり負荷を削減します。'},
{c:'空調',q:'デシカント空調に関する記述のうち、適当なものはどれか。',a:['除湿剤(デシカント)で空気中の水分を吸着除去し、潜熱を処理する方式である','冷媒の圧縮により除湿する方式のことである','加湿専用の空調方式である','デシカント空調では再生用の熱は不要である'],ans:0,ex:'デシカント空調は<b>吸着除湿で潜熱を分離処理</b>し、顕熱は別に処理する方式。除湿剤の再生に排熱・温水が利用できます。'},
{c:'空調',q:'ダブルダクト方式に関する記述のうち、適当でないものはどれか。',a:['冷風と温風の2系統のダクトで送り、混合ボックスで混合して吹き出す','個別制御性に優れる','混合による熱エネルギーの損失が生じる','省エネルギー性に最も優れた方式である'],ans:3,ex:'ダブルダクトは個別制御性が高い反面、<b>冷風と温風の混合ロスが大きく省エネ性に劣り</b>、ダクトスペースも大きくなるため現在はほとんど採用されません。'},
{c:'給排水衛生',q:'水道法の水質基準に関する記述のうち、適当なものはどれか。',a:['大腸菌は、検出されないことと定められている','大腸菌は少量なら検出されてもよい','水質基準に細菌に関する項目はない','濁度・色度に基準はない'],ans:0,ex:'水質基準では<b>大腸菌は「検出されないこと」</b>。一般細菌は100個/mL以下、濁度2度以下、色度5度以下などの基準があります。'},
{c:'給排水衛生',q:'ポンプ直送方式の制御に関する記述のうち、適当なものはどれか。',a:['推定末端圧力一定制御は、末端で必要な圧力を確保しつつポンプ動力を低減できる','吐出圧力は常に最大に保つのが省エネである','ポンプ直送方式に制御は不要である','高置水槽の水位で制御する'],ans:0,ex:'<b>推定末端圧力一定制御</b>は流量に応じて吐出圧を変える省エネ制御。インバータとの組合せで搬送動力を削減します。'},
{c:'給排水衛生',q:'さや管ヘッダー工法に関する記述のうち、適当なものはどれか。',a:['ヘッダーから各器具へ個別に配管するため、同時使用時の圧力・流量変動が小さく、更新も容易である','分岐継手を多用する先分岐工法の一種である','さや管の中の樹脂管は交換できない','鋼管を使用する工法である'],ans:0,ex:'さや管ヘッダー工法は<b>ヘッダーで並列分配</b>する方式。樹脂管(架橋ポリエチレン管等)をさや管から引き抜いて更新できます。'},
{c:'給排水衛生',q:'通気弁に関する記述のうち、適当なものはどれか。',a:['管内が負圧のときに空気を吸い込み、正圧時には閉じて臭気を漏らさない弁である','空気の排出のみを行う弁である','常時開放されている弁である','排水を通すための弁である'],ans:0,ex:'通気弁は<b>吸気専用</b>。伸頂通気管の屋外開口が難しい場合などに使いますが、正圧の緩和はできない点に注意が必要です。'},
{c:'給排水衛生',q:'排水管の掃除口に関する記述のうち、適当なものはどれか。',a:['管径100mm以下の排水横管では、15m以内ごとに掃除口を設ける','掃除口は建物内に1か所あればよい','掃除口は排水の流れと直角方向に開く向きでよい','掃除口は隠ぺいして仕上げてよい'],ans:0,ex:'掃除口は<b>管径100以下で15m以内、100超で30m以内</b>ごとのほか、起点・曲がり・合流部などに設け、点検可能な位置とします。'},
{c:'給排水衛生',q:'給湯設備の逃し弁・逃し管に関する記述のうち、適当なものはどれか。',a:['加熱による圧力上昇を逃がす安全装置で、貯湯タンクなどに設ける','湯を循環させるための装置である','排水を速やかに流すための装置である','設置は任意でありなくてもよい'],ans:0,ex:'密閉式の加熱装置には<b>逃し弁(または逃し管)</b>が必須。異常昇圧を逃がして装置の破損を防ぐ安全装置です。'},
{c:'給排水衛生',q:'阻集器に関する記述のうち、適当なものはどれか。',a:['オイル阻集器は、駐車場や給油場などの排水に含まれる油類を阻集するために設ける','オイル阻集器は厨房排水用である','ヘア阻集器は油脂を阻集する','阻集器は下水道に有害物を流すための装置である'],ans:0,ex:'<b>オイル=駐車場・ガソリンスタンド、グリース=厨房、ヘア=理髪店・浴場、プラスタ=歯科・外科</b>。用途と阻集器の対応は定番問題です。'},
{c:'給排水衛生',q:'不活性ガス消火設備に関する記述のうち、適当なものはどれか。',a:['電気室などに用いられ、放出時は人命の危険があるため退避・警報などの措置が必要である','水を大量に放水する設備である','放出ガスは人体に全く無害である','厨房のフライヤー専用の設備である'],ans:0,ex:'不活性ガス(CO2等)は<b>窒息消火</b>のため電気火災に有効ですが、人がいる状態での放出は致命的。退避警報・閉止弁などの安全対策が必須です。'},
{c:'給排水衛生',q:'浄化槽の処理対象人員の算定に関する記述のうち、適当なものはどれか。',a:['建物の用途や延べ面積などに基づいて算定する','浄化槽の価格から算定する','実際の居住者数のみで算定し建物用途は考慮しない','算定基準は存在しない'],ans:0,ex:'処理対象人員はJIS(建築物の用途別による屎尿浄化槽の処理対象人員算定基準)により<b>用途・延べ面積等から算定</b>します。'},
{c:'給排水衛生',q:'飲料用受水槽まわりの配管に関する記述のうち、適当でないものはどれか。',a:['オーバーフロー管には排水口空間を設ける','通気管の開口部には防虫網を設ける','水抜き管は間接排水とする','水抜き管はオーバーフロー管に直接接続する'],ans:3,ex:'水抜き管をオーバーフロー管に接続すると<b>逆流・汚染のおそれ</b>があるため、それぞれ単独で排水口空間を設けた間接排水とします。'},
{c:'機器・材料',q:'遠心送風機の羽根形状に関する記述のうち、適当なものはどれか。',a:['後向き羽根送風機(ターボファン)は、多翼送風機より効率が高く高い静圧に対応できる','多翼送風機は後向き羽根より高静圧・高効率である','後向き羽根送風機は住宅のパイプファン専用である','羽根の形状は性能に影響しない'],ans:0,ex:'<b>ターボファン(後向き)=高効率・高静圧</b>、シロッコファン(前向き多翼)=小型で低速ダクト向き。特性の対比を覚えましょう。'},
{c:'機器・材料',q:'ポンプの揚程に関する記述のうち、適当なものはどれか。',a:['全揚程は、実揚程に配管の摩擦損失などを加えたものである','実揚程は全揚程より常に大きい','全揚程は吸込揚程のみで決まる','摩擦損失は揚程に含めない'],ans:0,ex:'<b>全揚程=実揚程(高低差)+管路の摩擦損失水頭など</b>。ポンプ選定は全揚程と流量で行います。'},
{c:'機器・材料',q:'密閉式冷却塔に関する記述のうち、適当なものはどれか。',a:['冷却水を管内に通し散布水で間接冷却するため、冷却水の水質汚染が少ない','開放式より小型で安価である','冷却水が直接外気に接触する','散布水は不要である'],ans:0,ex:'密閉式は<b>冷却水が外気に触れないため水質管理が容易</b>。反面、開放式より大型で高価になります。'},
{c:'機器・材料',q:'ボール弁に関する記述のうち、適当なものはどれか。',a:['ハンドルの90度回転で全開・全閉ができ、操作が容易で流体抵抗が小さい','全開までハンドルを何回転も回す必要がある','流量調整用として最も適している','ボール弁は逆流防止機能を持つ'],ans:0,ex:'ボール弁は<b>90度回転(クォーターターン)で開閉</b>でき、全開時の抵抗も小さい。開閉用として広く使われます。'},
{c:'機器・材料',q:'ストレーナに関する記述のうち、適当なものはどれか。',a:['配管中のごみなどを除去し、ポンプ・弁類・機器を保護するために設ける','流量を増加させるために設ける','水質を消毒するために設ける','ストレーナの清掃は不要である'],ans:0,ex:'Y形・U形ストレーナは<b>異物から機器を保護</b>します。スクリーンの定期清掃ができるよう設置向き・スペースに配慮します。'},
{c:'機器・材料',q:'防振材に関する記述のうち、適当なものはどれか。',a:['金属バネ(スプリング)は、防振ゴムよりも低い振動数の防振に適している','防振ゴムはスプリングより低振動数向きである','防振材は振動を増幅する材料である','防振材の選定に機器の回転数は関係ない'],ans:0,ex:'<b>スプリング=低振動数(大きなたわみ)対応、防振ゴム=比較的高い振動数向き</b>。機器の回転数(強制振動数)に応じて選定します。'},
{c:'機器・材料',q:'配管用フレキシブルジョイントに関する記述のうち、適当なものはどれか。',a:['地震時の変位や機器の振動による配管への影響を吸収するために設ける','流量を調整するために設ける','配管を完全に固定するために設ける','水撃作用を増大させる装置である'],ans:0,ex:'フレキシブルジョイントは<b>変位吸収・振動絶縁</b>が目的。建物のエキスパンションジョイント部や機器まわりに設けます。'},
{c:'機器・材料',q:'銅管の肉厚区分に関する記述のうち、適当なものはどれか。',a:['銅管にはK・L・Mタイプがあり、MタイプはKタイプより肉厚が薄い','MタイプはKタイプより肉厚が厚い','銅管の肉厚はすべて同一である','肉厚区分は鋼管の規格である'],ans:0,ex:'銅管の肉厚は<b>K>L>M</b>の順。給水・給湯には主にLタイプ・Mタイプが使われます。'},
{c:'施工管理',q:'仮設計画に関する記述のうち、適当なものはどれか。',a:['仮設計画は、契約書等に特別の定めがある場合を除き、請負者がその責任において定める','仮設計画はすべて発注者が定める','仮設は品質・安全と無関係である','仮設計画は着工後に検討すればよい'],ans:0,ex:'仮設(任意仮設)は<b>請負者の責任と裁量</b>で計画します。ただし安全関係法令の遵守は当然に必要です。'},
{c:'施工管理',q:'施工計画書に関する記述のうち、適当なものはどれか。',a:['総合施工計画書を作成し、必要に応じて工種別施工計画書を作成する','工種別施工計画書のみ作成すればよい','施工計画書は下請業者が作成する義務がある','施工計画書は監督員に提出しない'],ans:0,ex:'まず工事全体の<b>総合施工計画書</b>、次いで主要工種の<b>工種別施工計画書(施工要領書)</b>を作成し、監督員の確認を受けます。'},
{c:'施工管理',q:'道路に関する許可・届出に関する記述のうち、適当なものはどれか。',a:['道路占用許可は道路管理者に、道路使用許可は所轄警察署長に申請する','どちらも警察署長に申請する','どちらも道路管理者に申請する','占用・使用とも許可は不要である'],ans:0,ex:'<b>占用(継続的に物を置く)=道路管理者、使用(工事等で一時使用)=警察署長</b>。両方必要な場合もあります。混同を狙う定番問題です。'},
{c:'施工管理',q:'建築物の解体・改修工事における石綿(アスベスト)対策に関する記述のうち、適当なものはどれか。',a:['工事前に石綿含有建材の使用の有無について事前調査を行う','石綿の調査は工事完了後に行う','古い建物でも調査は不要である','石綿含有材はそのまま破砕して廃棄してよい'],ans:0,ex:'解体・改修工事では<b>石綿の事前調査(有資格者による)と結果の報告・掲示</b>が義務化されています。含有時は届出・飛散防止措置が必要です。'},
{c:'施工管理',q:'保護帽(ヘルメット)の使用に関する記述のうち、適当なものはどれか。',a:['飛来・落下物用や墜落時保護用など、用途に応じた検定合格品をあごひもを締めて着用する','あごひもは締めなくてもよい','損傷したヘルメットも使用できる','夏期は着用しなくてもよい'],ans:0,ex:'保護帽は<b>用途区分(飛来落下物用・墜落時保護用)の検定合格品</b>を正しく着用。一度大きな衝撃を受けたものは交換します。'},
{c:'施工管理',q:'溶接など火気を使用する作業の安全対策に関する記述のうち、適当なものはどれか。',a:['消火器を準備し、火花の養生を行い、作業終了後は残火の有無を確認する','火気作業に消火器は不要である','火花養生は不要である','作業終了後の確認は翌日でよい'],ans:0,ex:'火気作業は<b>消火器準備・不燃シートによる養生・作業後の残火確認</b>がセット。溶接火花による火災は典型的な事故です。'},
{c:'施工管理',q:'冷温水配管の水圧試験に関する記述のうち、適当なものはどれか。',a:['試験圧力は、最高使用圧力の1.5倍程度とするのが一般的である','試験圧力は最高使用圧力の10倍とする','水圧試験は保温施工後に行う','試験圧力は低いほどよい'],ans:0,ex:'水圧試験は<b>最高使用圧力の1.5倍(最小0.75MPa等、設計図書による)</b>で、保温・隠ぺいの前に実施します。'},
{c:'施工管理',q:'既存建物の改修工事における断水を伴う作業に関する記述のうち、適当なものはどれか。',a:['建物利用者へ事前に周知し、断水時間が短くなるよう作業手順を計画する','断水は予告なく行ってよい','断水時間はできるだけ長く設定する','利用者への影響は考慮しなくてよい'],ans:0,ex:'改修工事では<b>居ながら施工への配慮</b>(事前周知・仮設給水・時間短縮)が重要。近年の試験で改修関連の出題が増えています。'},
{c:'施工管理',q:'配管の切断に関する記述のうち、適当なものはどれか。',a:['管軸に対して直角に切断し、切断後は面取り・ばり取りを行う','管軸に対して斜めに切断するのがよい','ばりは取らずに接合してよい','パイプカッターで切断した銅管は面取り不要である'],ans:0,ex:'切断は<b>管軸に直角</b>が基本。ばり・返りは流水抵抗や腐食、ゴム輪の損傷の原因となるため必ず除去します。'},
{c:'施工管理',q:'鋼管のねじ接合に関する記述のうち、適当なものはどれか。',a:['ねじ加工後にねじ部を清掃し、シール材を塗布して接合する','シール材は使用しない','ねじのはみ出し部(余ねじ部)の防食処理は不要である','ねじ込み後に少し戻して調整してよい'],ans:0,ex:'ねじ接合は<b>シール材塗布+適正トルクでねじ込み</b>。戻し調整は漏れの原因。余ねじ部は防食処理を行います。'},
{c:'法規',q:'建設業法上の下請代金の支払に関する記述のうち、適当なものはどれか。',a:['元請負人は、出来形部分に対する支払等を受けたときは、1か月以内で、かつ、できる限り短い期間内に下請代金を支払わなければならない','支払時期に定めはない','下請代金は工事完成の1年後に支払えばよい','支払は元請の任意である'],ans:0,ex:'発注者から支払を受けた元請は<b>1か月以内のできる限り短い期間内</b>に下請へ支払う義務があります(建設業法24条の3)。'},
{c:'法規',q:'公共工事における施工体制台帳に関する記述のうち、適当なものはどれか。',a:['公共工事では、下請契約を締結した場合、その金額にかかわらず施工体制台帳を作成する','公共工事でも一定金額未満なら作成不要である','施工体制台帳は下請負人が作成する','施工体制台帳の作成義務はない'],ans:0,ex:'公共工事(入契法)では<b>下請金額にかかわらず</b>施工体制台帳・施工体系図の作成が義務です(民間工事は4500万円以上)。'},
{c:'法規',q:'労働安全衛生法上の安全衛生責任者に関する記述のうち、適当なものはどれか。',a:['統括安全衛生責任者が選任された現場では、関係請負人(下請)が安全衛生責任者を選任する','安全衛生責任者は元請が選任する','安全衛生責任者の選任義務はない','安全衛生責任者は発注者が選任する'],ans:0,ex:'<b>元請=統括安全衛生責任者、下請=安全衛生責任者</b>を選任し、連絡調整を行う体制をつくります。'},
{c:'法規',q:'労働基準法上の賃金の支払に関する記述のうち、適当なものはどれか。',a:['賃金は、通貨で、直接労働者に、その全額を、毎月1回以上、一定の期日を定めて支払わなければならない','賃金は年1回まとめて支払えばよい','賃金は現物支給が原則である','賃金は代理人に支払うのが原則である'],ans:0,ex:'賃金支払の5原則:<b>通貨払・直接払・全額払・毎月1回以上・一定期日払</b>。'},
{c:'法規',q:'建築基準法上、居室の天井の高さとして、正しいものはどれか。',a:['2.1m以上','1.8m以上','2.4m以上','3.0m以上'],ans:0,ex:'居室の天井高は<b>2.1m以上</b>(1室で高さが異なる場合は平均)。数値問題の定番です。'},
{c:'法規',q:'建築基準法上、火を使用する室に関する記述のうち、適当なものはどれか。',a:['調理室など火を使用する室には、原則として換気設備を設けなければならない','火気使用室に換気設備は不要である','換気設備の代わりに消火器を置けばよい','電気コンロのみの台所には理由を問わず換気設備の設置義務がある'],ans:0,ex:'火気使用室には<b>換気設備の設置義務</b>(建築基準法28条)。燃焼空気の供給と燃焼ガスの排出が目的です。'},
{c:'法規',q:'水道法上の「給水装置」の定義として、適当なものはどれか。',a:['配水管から分岐して設けられた給水管と、これに直結する給水用具をいう','受水槽以降の配管設備をいう','浄水場の設備をいう','建物内のすべての配管をいう'],ans:0,ex:'給水装置=<b>配水管からの分岐部〜直結給水用具(蛇口等)</b>。受水槽以降は給水装置ではなく建物側の給水設備です。'},
{c:'法規',q:'下水道法に関する記述のうち、適当なものはどれか。',a:['一定の有害物質などを含む下水を排出する者は、除害施設の設置などの措置が必要である','有害な下水もそのまま公共下水道へ放流できる','除害施設は下水道管理者が設置する','水質規制は工場排水には適用されない'],ans:0,ex:'公共下水道への排水には水質基準があり、基準を超える下水を出す事業場は<b>除害施設の設置等</b>が義務付けられます。'},
{c:'法規',q:'消防用設備等の定期点検に関する記述のうち、適当なものはどれか。',a:['機器点検は6か月ごと、総合点検は1年ごとに行う','機器点検は5年ごとでよい','点検は設置時の1回だけでよい','総合点検は10年ごとに行う'],ans:0,ex:'<b>機器点検=6か月ごと、総合点検=1年ごと</b>。点検結果の報告は特定防火対象物1年ごと、その他3年ごとです。'},
{c:'法規',q:'廃棄物処理法上の特別管理産業廃棄物に該当するものはどれか。',a:['廃石綿等(飛散性アスベスト廃棄物)','木くず','コンクリート破片','金属くず'],ans:0,ex:'<b>廃石綿等・廃PCB・強酸強アルカリ・感染性廃棄物</b>などは特別管理産業廃棄物として、より厳しい処理基準が適用されます。'},
{c:'原論・基礎',q:'光化学スモッグの発生要因となる物質として、適当なものはどれか。',a:['窒素酸化物','二酸化炭素','一酸化炭素','水蒸気'],ans:0,ex:'【R8前期の出題論点】光化学スモッグは<b>窒素酸化物や炭化水素が紫外線で反応</b>して生じる光化学オキシダントが原因です。'},
{c:'原論・基礎',q:'水平な円管を流れる流体について、動圧が最も大きくなる密度と流速の組合せはどれか。',a:['密度1.1kg/m³・流速1.4m/s','密度1.2kg/m³・流速1.3m/s','密度1.3kg/m³・流速1.2m/s','密度1.4kg/m³・流速1.1m/s'],ans:0,ex:'【R8前期の出題論点】動圧=<b>½ρv²</b>。流速は2乗で効くため流速が最大の組合せが最大になります(1.1×1.4²=2.16 > 1.2×1.3²=2.03 > …)。'},
{c:'原論・基礎',q:'次のうち、室内環境の指標に関係のないものはどれか。',a:['化学的酸素要求量(COD)','予想平均申告(PMV)','不快指数','ホルムアルデヒドの量'],ans:0,ex:'【R8前期の出題論点】CODは<b>水質汚濁の指標</b>。PMV(温熱快適性)・不快指数・ホルムアルデヒドは室内環境の指標です。'},
{c:'原論・基礎',q:'電気設備工事に関する記述のうち、適当でないものはどれか。',a:['ヒューズは、溶断したものでも繰り返し使用できる','キュービクルは、受変電機器等を金属製の箱に収めたものである','ケーブルラックは、はしご形やトレー形等のケーブル支持材である','レースウェイは、照明器具の取付けと配線等に使用される'],ans:0,ex:'【R8前期の出題論点】ヒューズは<b>溶断したら交換</b>が必要な一回限りの保護部品です。他の3つは正しい説明です。'},
{c:'原論・基礎',q:'鉄筋コンクリートに関する記述のうち、適当でないものはどれか。',a:['コンクリートは、打設後できるだけ早く乾燥させるのがよい','異形棒鋼は、丸鋼よりコンクリートに対する付着性がよい','硬化中のコンクリートには、振動や外力を加えないようにする','打設後は、所定の強度が出るまで十分に湿潤状態を保つ'],ans:0,ex:'【R8前期の出題論点】コンクリートは水和反応で硬化するため<b>湿潤養生</b>が必要。早期乾燥はひび割れ・強度不足の原因です。'},
{c:'空調',q:'定風量単一ダクト方式のユニット形空気調和機の制御に必要な自動制御機器として、関係のないものはどれか。',a:['フロートスイッチ','電動三方弁','温度調節器','湿度調節器'],ans:0,ex:'【R8前期の出題論点】フロートスイッチは<b>水槽の水位検出用</b>で空調機の制御には無関係。温湿度調節器や電動弁はコイル制御に使います。'},
{c:'空調',q:'温水暖房の膨張タンクに関する記述のうち、適当でないものはどれか。',a:['開放式膨張タンクに接続するボイラーの逃がし管には、保守用の仕切弁を設ける','密閉式膨張タンクを用いる場合は、安全弁を設ける','開放式膨張タンクは、配管系のエア抜きとしても利用できる','密閉式膨張タンクは、開放式に比べ設置場所の制限が少ない'],ans:0,ex:'【R8前期の出題論点】逃がし管は安全装置のため<b>途中に弁を設けてはならない</b>(誤って閉じると危険)。定番のひっかけです。'},
{c:'空調',q:'パッケージ形空気調和機に関する記述のうち、適当でないものはどれか。',a:['ガスエンジンヒートポンプ式は、エンジンで発電した電力により圧縮機用電動機を駆動する','ガスエンジンヒートポンプ式は、暖房時にエンジンの排熱を有効利用できる','マルチパッケージ形は、1台の屋外機に複数台の屋内機を接続できる','電動式の圧縮機の容量制御には、一般にインバーター方式が用いられる'],ans:0,ex:'【R8前期の出題論点】GHPは<b>ガスエンジンで圧縮機を直接駆動</b>します。発電して電動機を回すのではありません。'},
{c:'空調',q:'開放式燃焼器具(ガスコンロ)の廃ガスを換気扇で排気する場合の必要有効換気量として、建築基準法上、正しいものはどれか(排気フードなし、K:理論廃ガス量、Q:燃料消費量)。',a:['40KQ','30KQ','20KQ','2KQ'],ans:0,ex:'【R8前期の出題論点】<b>フードなし=40KQ、排気フードI型=30KQ、II型=20KQ、煙突接続=2KQ</b>。数値セットで暗記しましょう。'},
{c:'空調',q:'温度差を利用する自然換気方式に関する記述のうち、適当なものはどれか。',a:['給気口は低い位置に、排気口は高い位置に設ける','給気口は高い位置に設ける','給気口と排気口の高さの差は換気量に関係しない','室内外の温度差が小さいほど換気量は多くなる'],ans:0,ex:'【R8前期の出題論点】暖かい空気は上昇するため<b>給気は下・排気は上</b>。温度差と開口の高低差が大きいほど換気量が増えます。'},
{c:'空調',q:'冷房時の熱負荷に関する記述のうち、適当でないものはどれか。',a:['構造体の空気層は、熱通過率に影響を与えない','外壁からの熱負荷は、太陽日射の影響も考慮する','OA機器による熱負荷は、顕熱である','窓ガラス面からの熱負荷は、ブラインドの有無を考慮する'],ans:0,ex:'【R8前期の出題論点】壁体内の<b>空気層は断熱層として熱通過率を小さく</b>します。「影響を与えない」は誤りです。'},
{c:'給排水衛生',q:'下水道管きょの接合方法に関する記述のうち、適当でないものはどれか。',a:['水面接合は、管の中心を一致させて接合する方法である','管頂接合は、管の内面頂部の高さを合わせて接合する方法である','管底接合は、管の内面底部の高さを合わせて接合する方法である','管頂接合は、下流ほど掘削深さが深くなりやすい'],ans:0,ex:'【R8前期の出題論点】水面接合は<b>計画水位を一致させる</b>方法(水理学的に最も良い)。管中心を合わせるのは管中心接合です。'},
{c:'給排水衛生',q:'給水設備に関する記述のうち、適当でないものはどれか。',a:['ホースを接続して使用する水栓の逆流防止には、逆止弁を設ければよい','受水タンクへの給水には、一般に定水位調整弁が用いられる','水道直結増圧方式は、受水タンクを設ける必要がない','受水タンクは、保守点検・清掃を考慮し2槽分割等とする'],ans:0,ex:'【R8前期の出題論点】ホース接続水栓は逆サイホンのおそれがあるため<b>バキュームブレーカー</b>が必要。逆止弁だけでは不十分とされます。'},
{c:'給排水衛生',q:'給湯設備に関する記述のうち、適当でないものはどれか。',a:['ヒートポンプ給湯機は、給湯機の排気ガスの潜熱を給湯の予熱として利用するものである','中央給湯方式の配管方式には、上向き供給方式と下向き供給方式がある','給湯配管の直管部には、伸縮を吸収する伸縮継手等を設ける','給湯用循環ポンプは、一般に貯湯タンクへの返湯管に設ける'],ans:0,ex:'【R8前期の出題論点】ヒートポンプ給湯機(エコキュート)は<b>大気の熱</b>をくみ上げます。排気ガスの潜熱回収は潜熱回収型ガス給湯器(エコジョーズ)です。'},
{c:'給排水衛生',q:'排水設備に関する記述のうち、適当でないものはどれか。',a:['オイル阻集器は、汚水中の動植物系の油脂類を除去するものである','阻集器にはトラップ機能を持つものが多く、器具側にもトラップを設けると二重トラップとなるおそれがある','トラップますは、臭気が逆流しない構造とする','Uトラップは、排水配管の途中に設けるトラップである'],ans:0,ex:'【R8前期の出題論点】オイル阻集器は<b>ガソリン・油(鉱物油)</b>用。動植物系の油脂はグリース阻集器です。'},
{c:'給排水衛生',q:'ドラムトラップに関する記述のうち、適当なものはどれか。',a:['非サイホン式トラップの一種で、封水が破られにくい','サイホン式トラップの一種である','封水の安定性が最も低いトラップである','排水立て管の頂部に設けるトラップである'],ans:0,ex:'【R8前期の出題論点】ドラムトラップは封水部が大きい<b>非サイホン式</b>で、自己サイホンによる破封が起こりにくいトラップです。'},
{c:'給排水衛生',q:'屋内消火栓設備に関する記述のうち、適当でないものはどれか。',a:['屋内消火栓箱の位置表示灯は、赤色でなくてもよい','非常電源は、蓄電池設備でもよい','開閉弁の位置は、自動式のものでない場合、床面からの高さ1.5m以下とする','加圧送水装置は、直接操作によってのみ停止できるものとする'],ans:0,ex:'【R8前期の出題論点】位置表示灯は<b>赤色</b>と定められています。開閉弁1.5m以下・直接操作停止も頻出の数値・要件です。'},
{c:'給排水衛生',q:'ガス設備に関する記述のうち、適当でないものはどれか。',a:['液化天然ガス(LNG)は、液化石油ガス(LPG)より単位容積当たりの発熱量が大きい','需要家敷地内の敷地境界線からガス栓までの導管を内管という','LPGのガス容器は、常に温度を40℃以下に保つ','LNGは、メタンを主成分とした天然ガスを冷却・液化したものである'],ans:0,ex:'【R8前期の出題論点】単位容積あたりの発熱量は<b>LPG(プロパン)の方が大きい</b>(約2倍以上)。LNG=メタン主成分、容器40℃以下も頻出です。'},
{c:'給排水衛生',q:'浄化槽に関する記述のうち、適当でないものはどれか。',a:['浄化槽は、工場廃水や雨水を処理するための施設である','浄化槽の躯体には、FRP製や鉄筋コンクリート製がある','一次処理とは、主として沈降性の浮遊物質を除去することである','脱窒ろ床接触ばっ気方式では、BODと窒素を除去できる'],ans:0,ex:'【R8前期の出題論点】浄化槽はし尿と雑排水を処理する施設で、<b>工場廃水や雨水は処理対象外</b>です。'},
{c:'機器・材料',q:'パッケージ形空気調和機の機器仕様として設計図書に記載する項目のうち、適当でないものはどれか。',a:['冷温水出入口温度','形式','冷房能力・暖房能力','電源(電気方式)'],ans:0,ex:'【R8前期の出題論点】パッケージ形空調機は<b>冷媒方式</b>のため冷温水の出入口温度という仕様項目はありません(それはエアハン・チラーの項目)。'},
{c:'機器・材料',q:'ダクト及びダクト附属品に関する記述のうち、適当でないものはどれか。',a:['たわみ継手は、ダクトと機器の位置合わせのために使用する','コーナーボルト工法には、共板フランジ工法とスライドオンフランジ工法がある','防火ダンパーのケーシング及び羽根は、厚さ1.5mm以上の鋼板製とする','防火ダンパーには、温度ヒューズ型や煙感知器連動型等がある'],ans:0,ex:'【R8前期の出題論点】たわみ継手の目的は<b>振動の絶縁</b>。位置合わせのために使うものではありません。'},
{c:'施工管理',q:'施工計画等に関する記述のうち、適当でないものはどれか。',a:['標準仕様書と特記仕様書の内容に相違がある場合は、標準仕様書を優先する','設計図書等は、監督員の承諾を受けた場合を除き、施工以外の目的で第三者に使用させない','工事写真は、後日の目視検査が容易でない箇所等について撮影する','仮設計画は、設計図書に定めがない場合、受注者の責任において定める'],ans:0,ex:'【R8前期の出題論点】設計図書の優先順位は一般に<b>質問回答書>特記仕様書>設計図面>標準仕様書</b>。特記が標準に優先します。'},
{c:'施工管理',q:'ポンプ・送風機等の据付けに関する記述のうち、適当でないものはどれか。',a:['排水用水中モーターポンプは、排水槽への排水流入部に近い場所に据え付ける','あと施工の屋内コンクリート基礎は、つなぎ鉄筋等で床スラブと一体化する','送風機とモーターのプーリーの心出しは、プーリーの外側に定規や水糸等を当てて調整する','ポンプとモーターの軸心の確認は、カップリングの外周に定規等を当てて行う'],ans:0,ex:'【R8前期の出題論点】水中ポンプは<b>流入部から離して</b>設置します。流入部近くでは空気を巻き込み、空転・振動の原因になります。'},
{c:'施工管理',q:'配管及び配管附属品の施工に関する記述のうち、適当でないものはどれか。',a:['給水横走り管から下方へ供給する分岐管は、配管の上部から取り出す','受水タンクの吐水側配管に設ける緊急遮断弁は、地震時の水の確保に有効である','敷地排水管の合流箇所や曲がり箇所には、排水ますを設ける','給水横走り管から上方へ供給する分岐管は、配管の上部から取り出す'],ans:0,ex:'【R8前期の出題論点】<b>下方へ供給する分岐は管の下部から、上方への分岐は上部から</b>取り出します(空気だまり・滞留防止)。'},
{c:'施工管理',q:'塗装に関する記述のうち、適当でないものはどれか。',a:['塗装場所の気温が5℃以下でも、塗装を行ってよい','配管用炭素鋼鋼管(黒)の下塗りには、一般にさび止めペイントが使用される','塗装場所の相対湿度が85%以上の場合、原則として塗装を行わない','溶剤塗装を行う場所では、換気に留意する'],ans:0,ex:'【R8前期の出題論点】<b>気温5℃以下・湿度85%以上では原則塗装しない</b>。乾燥不良・結露による付着不良を防ぐためです。'},
{c:'施工管理',q:'渦巻ポンプの試運転の一般的な実施順序として、適当なものはどれか。',a:['満水状態にする → 吐出し側弁を全閉にする → 瞬時運転で回転方向を確認 → 弁を徐々に開いて規定水量に調整 → キャビテーション等がないことを確認','吐出し側弁を全開にして起動 → 満水にする → 回転方向確認','回転方向確認 → 満水にする → 吐出し側弁全開で連続運転','満水状態にする → 吐出し側弁を全開にする → 瞬時運転 → 弁を絞って調整'],ans:0,ex:'【R8前期の出題論点】<b>エア抜き満水→全閉→瞬時運転(回転方向)→徐々に開けて水量調整→異常確認</b>の順。締切起動が原則です。'},
{c:'施工管理',q:'風量測定・調整に関する記述のうち、適当でないものはどれか。',a:['ダクト系の風量調整は、風量調整ダンパーを全閉にしてから行う','ダクト内の風量測定は、一般に多点風速測定法で行う','シーリングディフューザーの測定には、一般にフード付きの風量計を用いる','風量測定には、熱線風速計やピトー管等を用いる'],ans:0,ex:'【R8前期の出題論点】風量調整はダンパー<b>全開の状態から徐々に絞って</b>バランスをとります。全閉からでは調整できません。'},
{c:'施工管理',q:'労働安全衛生法上、作業主任者を選任すべき作業に該当しないものはどれか。',a:['掘削面の高さが1mの地山の掘削作業','ボイラー(小型ボイラーを除く)の取扱いの作業','土止め支保工の切りばり又は腹起こしの取付け・取外しの作業','石綿が0.5%含まれる保温材の除去作業'],ans:0,ex:'【R8前期の出題論点】地山の掘削で作業主任者が必要なのは<b>掘削面の高さ2m以上</b>。1mでは不要です。石綿は0.1%超で対象。'},
{c:'施工管理',q:'工程表に関する記述のうち、適当でないものはどれか。',a:['バーチャート工程表は、ネットワーク工程表に比べて各作業の順序関係が明確である','工程表の作成では、土日祝日の作業制限や試運転調整の期間等を考慮する','ネットワーク工程表は、工事途中での計画変更に対処しやすい','ガントチャート工程表は、各作業の達成度(進行度)を表すのに適している'],ans:0,ex:'【R8前期の出題論点】作業間の順序関係が明確なのは<b>ネットワーク工程表</b>。バーチャートは順序関係が不明確なのが弱点です。'},
{c:'機器・材料',q:'送風機の据付けに関する記述のうち、適当なものはどれか。',a:['呼び番号3の遠心送風機を天吊りする場合、形鋼を溶接枠組みした架台上に据え付け、架台はスラブ鉄筋に緊結したアンカーボルトで固定する','呼び番号3の遠心送風機は、吊りボルトのみで天吊りしてよい','アンカーボルトは、据付け後に頂部からねじ山が出ないようにする','送風機のコンクリート基礎の高さは50mm程度とする'],ans:0,ex:'【R8前期の出題論点】呼び番号2以上の天吊りは<b>形鋼製の溶接架台</b>が必要。アンカーボルトはねじ山を3山程度出し、基礎高さは150mm程度が標準です。'},
{c:'施工管理',q:'ダクト及びダクト附属品の施工に関する記述のうち、適当でないものはどれか。',a:['共板フランジ工法ダクトの接続は、フランジ押さえ金具のみで行い、ボルト・ナットは使用しない','長方形ダクトのアスペクト比は、原則として4以下とする','長方形ダクトの板厚は、ダクトの長辺の寸法により決定する','隠ぺい部に防火ダンパーを設置する場合は、450mm×450mm以上の点検口を設ける'],ans:0,ex:'【R8前期の出題論点】共板フランジ工法は<b>四隅のボルト・ナット+フランジ押さえ金具(クリップ)</b>で接続します。金具のみでは不可です。'},
{c:'給排水衛生',q:'配管の施工に関する記述のうち、適当でないものはどれか。',a:['排水用硬質塩化ビニルライニング鋼管は、ねじ接合とする','ポリエチレン管の接合には、メカニカル接合や電気融着(EF)接合がある','雨水ますには、深さ150mm以上の泥だめを設ける','鋼管のねじ加工には、切削ねじ加工と転造ねじ加工がある'],ans:0,ex:'【R8前期の出題論点】排水用ライニング鋼管は肉薄でねじ加工できないため、<b>MDジョイントなどのメカニカル継手</b>で接合します。'},
{c:'法規',q:'労働契約の締結に際し、労働基準法上、使用者が労働者に必ず明示しなければならない労働条件に該当しないものはどれか。',a:['福利厚生施設の利用に関する事項','賃金に関する事項','労働時間に関する事項','退職に関する事項'],ans:0,ex:'【R8前期の出題論点】絶対的明示事項は<b>労働契約の期間・就業場所・業務・労働時間・賃金・退職</b>など。福利厚生は相対的明示事項(定めがある場合のみ)です。'},
{c:'法規',q:'建築基準法に関する記述のうち、誤っているものはどれか。',a:['建築確認の申請が不要な建築物には、建築基準法は適用されない','確認申請が必要な建築物の工事は、確認済証の交付を受けた後でなければ着工できない','工事の施工者は、設計図書を工事現場に備えておかなければならない','大規模の模様替えをする場合、確認申請が必要となる建築物がある'],ans:0,ex:'【R8前期の出題論点】確認申請の要否と法の適用は別問題。<b>建築基準法はすべての建築物に適用</b>されます。'},
{c:'法規',q:'建築基準法上、中央管理方式の空気調和設備の居室における性能基準として、定められていないものはどれか。',a:['絶対湿度','一酸化炭素の含有率','浮遊粉じんの量','気流'],ans:0,ex:'【R8前期の出題論点】基準は<b>相対湿度(40〜70%)</b>で定められており、絶対湿度の基準はありません。CO・CO2・浮遊粉じん・温度・気流の5+2項目です。'},
{c:'法規',q:'建設業法上、請負契約書に記載しなければならない事項に該当しないものはどれか。',a:['下請契約を行う場合の下請負人の名称','工事内容','請負代金の額','天災その他不可抗力による工期の変更・損害の負担に関する定め'],ans:0,ex:'【R8前期の出題論点】契約書の法定記載事項に<b>下請負人の名称は含まれません</b>。工事内容・代金・工期・不可抗力の定めなどが法定事項です。'},
{c:'法規',q:'建設業法上、主任技術者に関する記述のうち、誤っているものはどれか。',a:['一級建築士免許の交付を受けた者は、管工事の主任技術者の要件に該当する','主任技術者は、施工計画の作成、工程管理、品質管理その他の技術上の管理等を誠実に行わなければならない','施工に従事する者は、主任技術者がその職務として行う指導に従わなければならない','2級管工事施工管理技術検定の第二次検定に合格した者は、管工事の主任技術者の要件に該当する'],ans:0,ex:'【R8前期の出題論点】一級建築士は建築士法の資格であり、<b>管工事の主任技術者要件には該当しません</b>(1級管工事施工管理技士等が該当)。'},
{c:'法規',q:'騒音規制法に関する記述のうち、誤っているものはどれか。',a:['特定建設作業とは、特定建設業の許可を受けた業者が行う作業をいう','指定地域内の特定建設作業の実施の届出事項には、騒音の防止の方法が含まれる','指定地域内では、特定工場等の騒音と特定建設作業に伴う騒音が規制される','特定工場等を設置している者は、規制基準を遵守しなければならない'],ans:0,ex:'【R8前期の出題論点】特定建設作業は<b>くい打機の使用など著しい騒音を発生する政令で定める作業</b>のこと。建設業許可の種類とは無関係です。'},
{c:'法規',q:'浄化槽法に関する記述のうち、誤っているものはどれか。',a:['浄化槽工事を行うときは、1級又は2級管工事施工管理技士が実地に監督しなければならない','浄化槽工事業を営もうとする者は、都道府県知事の登録を受けなければならない','浄化槽工事業者は、現場ごとに見やすい場所に標識を掲げなければならない','新設した浄化槽は、使用開始後3か月を経過した日から5か月間の間に、指定検査機関の水質検査を受けなければならない'],ans:0,ex:'【R8前期の出題論点】浄化槽工事の実地監督は<b>浄化槽設備士</b>の独占業務。管工事施工管理技士ではありません。7条検査の時期(3か月経過後5か月間)も頻出。'},
{c:'法規',q:'廃棄物の処理及び清掃に関する法律に関する記述のうち、誤っているものはどれか。',a:['産業廃棄物管理票(マニフェスト)は、産業廃棄物の種類ごとにせず、一括して交付できる','建設工事の現場事務所から排出される生ごみ・新聞・雑誌等は、一般廃棄物である','事業活動に伴って生じた金属くずは、産業廃棄物である','マニフェストの交付者は、最終処分終了の記載がある写しの送付を受けたときは、5年間保存する'],ans:0,ex:'【R8前期の出題論点】マニフェストは<b>種類ごと・運搬先ごとに交付</b>が原則。一括交付はできません。現場事務所ごみ=一般廃棄物も定番のひっかけです。'},
{c:'原論・基礎',q:'室内の空気齢に関する記述のうち、適当なものはどれか。',a:['空気齢が小さいほど、その地点の空気は新鮮である','空気齢が大きいほど空気は新鮮である','空気齢とは空気の温度のことである','空気齢は換気効率と関係がない'],ans:0,ex:'【過去10年頻出】空気齢=給気口から室内のある点まで空気が到達する平均時間。<b>小さいほど新鮮</b>で、換気効率の指標になります。'},
{c:'原論・基礎',q:'電気工事士の資格がなくても従事できる作業として、適当なものはどれか。',a:['露出型コンセントの取換え(軽微な工事)','電線管に電線を収める作業','電線相互を接続する作業','接地極を埋設する作業'],ans:0,ex:'露出型コンセント・点滅器の取換え等の<b>軽微な工事は資格不要</b>。配線・入線・接地工事は電気工事士の独占業務です。'},
{c:'原論・基礎',q:'電気設備の略号と機器の組合せのうち、適当でないものはどれか。',a:['ELCB — 配線用遮断器','MCCB — 配線用遮断器','MC — 電磁接触器','F — ヒューズ'],ans:0,ex:'【過去10年頻出】<b>ELCB=漏電遮断器</b>(Earth Leakage Circuit Breaker)。配線用遮断器はMCCBです。'},
{c:'原論・基礎',q:'合成樹脂製可とう電線管(PF管)に関する記述のうち、適当でないものはどれか。',a:['熱に強く、高温部の配線に最も適している','曲げやすく施工性が良い','腐食しにくい','非磁性であり電磁的影響を受けにくい'],ans:0,ex:'PF管は可とう性・耐食性・非磁性が長所ですが、<b>樹脂製のため熱には弱い</b>。コンクリート埋設は可能です。'},
{c:'原論・基礎',q:'鉄筋の継手に関する記述のうち、適当なものはどれか。',a:['応力の小さい位置に設け、同一断面に集中しないよう相互にずらす','応力の最も大きい位置に設ける','すべて同一断面にそろえて設ける','継手の位置は構造強度に影響しない'],ans:0,ex:'鉄筋の継手は<b>応力の小さい部分+千鳥配置</b>が原則です。'},
{c:'原論・基礎',q:'鉄筋コンクリートのかぶり厚さに関する記述のうち、適当なものはどれか。',a:['かぶり厚さの最小値は、柱・外壁・基礎など部位によって異なる','かぶり厚さはすべての部位で同一と定められている','かぶり厚さが大きいほど鉄筋は腐食しやすい','かぶり厚さは意匠のために設けるものである'],ans:0,ex:'【過去10年頻出】かぶり厚さの最小値は<b>部位ごとに異なります</b>(基礎6cm、耐力壁・柱・梁3cm以上等)。「部位によらず同一」は定番の誤り選択肢。'},
{c:'原論・基礎',q:'コンクリートのスランプに関する記述のうち、適当なものはどれか。',a:['スランプの値が大きいほど、流動性が大きい(軟らかい)','スランプの値が小さいほど流動性が大きい','スランプは圧縮強度を直接表す指標である','スランプ試験は硬化後のコンクリートで行う'],ans:0,ex:'スランプは<b>フレッシュコンクリートの軟らかさ</b>の指標。値が大きい=軟らかい=流動性大です。'},
{c:'原論・基礎',q:'次のうち、熱中症に関係のない用語はどれか。',a:['キャビテーション','暑さ指数(WBGT)','暑熱順化','身体作業強度'],ans:0,ex:'キャビテーションは<b>ポンプ内部の空洞現象</b>で熱中症とは無関係。WBGT・暑熱順化・作業強度は熱中症対策の用語です。'},
{c:'空調',q:'空調計画における省エネルギー手法として、適当でないものはどれか。',a:['冷却減湿・再熱方式による湿度制御を採用する','予冷・予熱時に外気の取入れを停止する','全熱交換器を採用する','成績係数(COP)の高い熱源機器を採用する'],ans:0,ex:'【過去10年頻出】冷却減湿・再熱は<b>冷やした空気を再加熱するためエネルギーロスが大きく</b>、省エネ手法ではありません。ほぼ毎回出る定番です。'},
{c:'空調',q:'温水暖房と蒸気暖房の放熱・立上り特性に関する記述のうち、適当でないものはどれか。',a:['温水暖房は、蒸気暖房に比べて放熱面積が小さくてすむ','蒸気暖房は、温水暖房に比べてウォーミングアップ時間が短い','温水暖房は、温度調節が容易である','蒸気暖房は、蒸気の潜熱を利用する'],ans:0,ex:'温水は蒸気より温度が低いため<b>放熱面積は大きく</b>必要です。立上りの速さは蒸気の長所。'},
{c:'空調',q:'吸収冷温水機に関する記述のうち、適当でないものはどれか。',a:['圧縮式冷凍機に比べて、立ち上がり時間が短い','機内は大気圧以下であり、破裂のおそれがない','遠心冷凍機に比べて消費電力が少ない','運転に高圧ガス保安法上の資格を必要としない'],ans:0,ex:'【過去10年頻出】吸収式は<b>立ち上がりが遅い</b>のが弱点。大気圧以下・電力少・資格不要・振動小が長所で、この対比が繰り返し出題されています。'},
{c:'空調',q:'エアフィルタのろ材に求められる性質として、適当でないものはどれか。',a:['吸湿性が高いこと','難燃性であること','空気抵抗(圧力損失)が小さいこと','粉じんの保持容量が大きいこと'],ans:0,ex:'ろ材は<b>吸湿性が低い</b>ことが必要です(吸湿すると目詰まり・性能低下)。難燃性・低圧損・大保持容量が求められます。'},
{c:'空調',q:'空気清浄装置と主な用途の組合せのうち、適当でないものはどれか。',a:['電気集じん器 — 厨房の排気処理','HEPAフィルタ — クリーンルーム','活性炭フィルタ — 臭気・ガスの除去','自動巻取形フィルタ — 一般空調の外気処理'],ans:0,ex:'【過去10年頻出】油分の多い厨房排気に電気集じん器は<b>火災の危険</b>があり不適。厨房排気にはグリスフィルタを使います。'},
{c:'空調',q:'換気計画に関する記述のうち、適当でないものはどれか。',a:['汚染度の高い室は、周囲の室より正圧に保つ','汚染源が局所的な場合は、局所換気が有効である','第二種機械換気は、外部からの汚染空気の侵入を抑制できる','外気導入量の設定では、外気そのもののCO2濃度も考慮する'],ans:0,ex:'【過去10年頻出】汚染室は<b>負圧</b>にして汚染空気を外へ漏らさないのが原則。正圧にすると廊下や隣室へ汚染が広がります。'},
{c:'空調',q:'換気設備の系統計画に関する記述のうち、適当なものはどれか。',a:['便所の排気は、居室の換気系統とは別の単独系統とする','便所の排気は居室の換気系統にまとめてよい','臭気を含む排気の系統は、他の系統と兼用するのがよい','排気系統の分け方は施工費だけで決める'],ans:0,ex:'【過去10年頻出】臭気・湿気を含む<b>便所・浴室の排気は単独系統</b>とし、汚染源の異なる排気を混合しないのが原則です。'},
{c:'空調',q:'室名と換気の主な目的の組合せのうち、適当でないものはどれか。',a:['電気室 — 湿気の排除','浴室 — 水蒸気(湿気)の排除','ボイラー室 — 燃焼用空気の供給','自動車車庫 — 有害ガスの排除'],ans:0,ex:'【過去10年頻出】電気室の換気目的は<b>機器発熱(熱)の排除</b>。ボイラー室=酸素供給、車庫=排気ガスとの組合せで毎回のように出題されます。'},
{c:'空調',q:'排気ダクト系における排風機の設置位置として、適当なものはどれか。',a:['ダクト系の末端(排気口の近く)に設け、ダクト内を負圧に保つ','ダクト系の最上流(吸込み口直後)に設ける','どこに設けても性能・安全性は同じである','室内に設けて室内を正圧にする'],ans:0,ex:'排風機を末端に置くと<b>ダクト内全体が負圧</b>になり、万一漏れても汚染空気が室内へ漏出しません。'},
{c:'給排水衛生',q:'上水道の施設を水の流れの順に並べたものとして、適当なものはどれか。',a:['取水施設 → 導水施設 → 浄水施設 → 送水施設 → 配水施設','取水施設 → 送水施設 → 浄水施設 → 導水施設 → 配水施設','浄水施設 → 取水施設 → 導水施設 → 配水施設 → 送水施設','取水施設 → 配水施設 → 浄水施設 → 送水施設 → 導水施設'],ans:0,ex:'【過去10年頻出】<b>取水→導水(原水を浄水場へ)→浄水→送水(浄水を配水池へ)→配水(需要者へ)</b>。「導水」と「送水」の定義の入替えが定番のひっかけです。'},
{c:'給排水衛生',q:'公共下水道の汚水管きょの計画流速として、適当なものはどれか。',a:['0.6〜3.0m/s','0.1〜0.3m/s','5.0〜10.0m/s','流速の規定はない'],ans:0,ex:'【過去10年頻出】汚水管きょは<b>0.6〜3.0m/s</b>。遅すぎると汚物が沈殿し、速すぎると管を損傷します。'},
{c:'給排水衛生',q:'敷地排水管の直管部における排水ますの設置間隔として、適当なものはどれか。',a:['排水管の内径の120倍以内ごとに設ける','内径の200倍以内でよい','内径の500倍以内でよい','直管部に排水ますは不要である'],ans:0,ex:'【過去10年頻出】直管部のますは<b>管内径の120倍以内</b>ごと。清掃器具が届く距離の確保が目的です。'},
{c:'給排水衛生',q:'下水道の取付管に関する記述のうち、適当なものはどれか。',a:['最小管径は150mmを標準とし、勾配は1/100以上とする','最小管径は65mmでよい','勾配は水平でよい','本管の真下(底部)に接続する'],ans:0,ex:'取付管は<b>最小150mm・勾配1/100以上</b>で、本管の中心線から上方に取り付けます。'},
{c:'給排水衛生',q:'水道の給水装置の耐圧性能試験の静水圧と保持時間として、正しいものはどれか。',a:['1.75MPaを1分間保持する','0.75MPaを30分間保持する','1.75MPaを30分間保持する','0.1MPaを1分間保持する'],ans:0,ex:'給水装置の耐圧性能基準は<b>1.75MPa・1分間</b>。排水系の満水試験30分と混同しないように。'},
{c:'給排水衛生',q:'60℃の湯60Lと10℃の水40Lを混合した場合の湯温として、適当なものはどれか。',a:['約40℃','約35℃','約45℃','約50℃'],ans:0,ex:'混合温度=(60×60+10×40)÷(60+40)=4000÷100=<b>40℃</b>。熱量の合計÷全量で求めます。'},
{c:'給排水衛生',q:'配管材料の線膨張係数に関する記述のうち、適当なものはどれか。',a:['架橋ポリエチレン管などの樹脂管は、金属管より線膨張係数が大きい','樹脂管は金属管より線膨張係数が小さい','銅管と樹脂管の線膨張係数はほぼ等しい','線膨張係数は配管の支持方法に影響しない'],ans:0,ex:'【過去10年頻出】樹脂管の線膨張係数は<b>金属管の約10倍</b>。給湯配管では伸縮を見込んだ支持・逃げが必要です。'},
{c:'給排水衛生',q:'潜熱回収型ガス給湯器に関する記述のうち、適当なものはどれか。',a:['排気中の水蒸気の潜熱を回収するため酸性の凝縮水が生じ、中和装置を通して排水する','凝縮水は発生しない','凝縮水はそのまま雨水管に接続してよい','潜熱回収により熱効率は低下する'],ans:0,ex:'潜熱回収型(エコジョーズ)は熱効率約95%。<b>酸性ドレンが発生するため中和器</b>を通して排水します。'},
{c:'給排水衛生',q:'衛生器具のトラップの最小口径の組合せのうち、適当でないものはどれか。',a:['掃除用流し — 50mm','大便器 — 75mm','汚物流し — 75mm','小型小便器 — 40mm'],ans:0,ex:'掃除用流しのトラップ最小口径は<b>65mm</b>です。大便器75・汚物流し75・小型小便器40は正しい数値。'},
{c:'給排水衛生',q:'通気管の最小管径として、適当なものはどれか。',a:['30mm','25mm','20mm','15mm'],ans:0,ex:'通気管の最小管径は<b>30mm</b>(かつ接続する排水管径の1/2以上)です。'},
{c:'給排水衛生',q:'屋内消火栓設備の加圧送水装置として、消防法上定められていない方式はどれか。',a:['水道直結方式','高架水槽方式','圧力水槽方式','ポンプ方式'],ans:0,ex:'【過去10年頻出】加圧送水装置は<b>高架水槽・圧力水槽・ポンプの3方式</b>のみ。水道直結方式は存在しません。'},
{c:'給排水衛生',q:'屋内消火栓ポンプの仕様(全揚程・吐出量)の決定に関係しないものはどれか。',a:['水源の容量','実揚程','消防用ホースの摩擦損失水頭','消火栓の同時開口数'],ans:0,ex:'【過去10年頻出】水源容量は<b>放水を継続できる時間</b>を決めるもので、ポンプの揚程・吐出量の計算には関係しません。繰り返し出題される定番です。'},
{c:'給排水衛生',q:'ガスのマイコンメーターに関する記述のうち、適当なものはどれか。',a:['異常な流量・圧力低下・大きな地震を検知すると、ガスを自動的に遮断する','ガス使用量を記録するだけの機器である','遮断はガス会社の遠隔操作によってのみ行われる','業務用の建物にのみ設置される'],ans:0,ex:'【過去10年頻出】マイコンメーターは<b>流量異常・圧力低下(約0.2kPa)・感震で自動遮断</b>する保安機器。ガス設備問題の常連です。'},
{c:'給排水衛生',q:'液化石油ガス(LPG)の臭いに関する記述のうち、適当なものはどれか。',a:['本来ほとんど無臭のため、漏えい時に気付けるように付臭剤が添加されている','LPG自体に強い臭いがある','臭いは炭化水素そのものの臭いである','付臭剤の添加は法令で禁止されている'],ans:0,ex:'LPG・都市ガスとも本来ほぼ無臭で、<b>保安のため付臭剤が添加</b>されています。'},
{c:'給排水衛生',q:'浄化槽の処理対象人員の算定において、延べ面積を用いない建築用途はどれか。',a:['公衆便所(総便器数から算定する)','事務所','集会場','共同住宅'],ans:0,ex:'【過去10年頻出】多くの用途は延べ面積から算定しますが、<b>公衆便所=総便器数、保育所・学校=定員</b>から算定します。'},
{c:'給排水衛生',q:'FRP製浄化槽の施工に関する記述のうち、適当でないものはどれか。',a:['漏水検査の水張りが終わったら、水を抜いてから埋め戻す','満水にして24時間以上漏水しないことを確認する','本体のかさ上げは300mm程度までとする','底版のコンクリートは一体に打設する'],ans:0,ex:'【過去10年頻出】埋戻しは<b>水張りしたまま</b>行います(空の状態では土圧で変形・浮上する)。満水24時間・かさ上げ300mm以内も頻出数値です。'},
{c:'機器・材料',q:'ファンコイルユニットに関する記述のうち、適当でないものはどれか。',a:['熱媒として冷媒(フロン)を直接使用する','熱媒として冷温水を使用する','送風機・コイル・エアフィルタ等で構成される','床置形を窓際に設置すると、コールドドラフト防止に有効である'],ans:0,ex:'FCUの熱媒は<b>冷温水</b>です。冷媒を直接使うのはパッケージ形空調機。'},
{c:'機器・材料',q:'加湿器の方式に関する記述のうち、適当でないものはどれか。',a:['気化式は、蒸気を直接空気中に噴霧する方式である','パン形は、水槽の水を電気ヒーター等で加熱し蒸発させる方式である','超音波式は、水を微細な霧にして放出する方式である','スプレー形は、水を噴霧する方式である'],ans:0,ex:'気化式は<b>ぬれた加湿材に空気を通して気化</b>させる方式。蒸気を吹き込むのは蒸気式です。'},
{c:'機器・材料',q:'硬質ポリ塩化ビニル管のVP管とVU管に関する記述のうち、適当なものはどれか。',a:['VP管はVU管より肉厚が厚く、設計圧力が高い','VU管の方が肉厚が厚い','両者の肉厚・圧力仕様は同一である','VU管は給水用の高圧管である'],ans:0,ex:'<b>VP=厚肉(圧力配管用)、VU=薄肉(排水等)</b>。「VUの方が設計圧力が高い」は定番の誤り選択肢です。'},
{c:'機器・材料',q:'耐火二層管に関する記述のうち、適当なものはどれか。',a:['硬質ポリ塩化ビニル管を繊維モルタル等で被覆したもので、防火区画貫通部の排水管などに用いられる','鋼管を二重にしたものである','可燃性のため防火区画には使用できない','断熱専用で排水には使用できない'],ans:0,ex:'耐火二層管=<b>塩ビ管+繊維モルタル被覆</b>。耐火性・遮音性があり、集合住宅の排水管等に多用されます。'},
{c:'機器・材料',q:'風量調整用ダンパーの羽根形式に関する記述のうち、適当なものはどれか。',a:['対向翼ダンパーは、平行翼ダンパーより風量調整に適している','平行翼ダンパーの方が中間開度の制御性が良い','両者の風量調整特性は同じである','対向翼ダンパーは全開・全閉専用である'],ans:0,ex:'<b>対向翼=中間開度の直線的な制御性が良く風量調整向き</b>、平行翼=開閉用。'},
{c:'機器・材料',q:'浮遊物を含む排水槽の排水ポンプの自動運転用の水位検知に適するものはどれか。',a:['フロートスイッチ','電極棒','バイメタル','ブルドン管'],ans:0,ex:'【過去10年頻出】汚水槽では浮遊物が付着するため<b>電極棒は不適、フロートスイッチを使用</b>します。電極棒は飲料水槽など清水用です。'},
{c:'機器・材料',q:'吸収冷温水機の機器仕様として設計図書に記載する項目のうち、適当でないものはどれか。',a:['圧縮機の電動機容量','冷却水量','冷房能力・暖房能力','燃料消費量'],ans:0,ex:'【過去10年頻出】吸収式に<b>圧縮機はありません</b>。機器仕様の記載項目問題での定番ひっかけです。'},
{c:'機器・材料',q:'測定対象と測定機器の組合せのうち、適当でないものはどれか。',a:['騒音 — 検知管','ダクト内風速 — 熱線風速計','温湿度 — アスマン通風乾湿計','浮遊粉じん — デジタル粉じん計'],ans:0,ex:'【過去10年頻出】騒音は<b>騒音計</b>。検知管はCO等のガス濃度測定器です。ダクト内圧力=マノメーターもセットで覚えましょう。'},
{c:'施工管理',q:'公共工事の設計図書間に相違がある場合、一般に最も優先されるものはどれか。',a:['現場説明書に対する質問回答書','設計図面','標準仕様書','受注者の見積書'],ans:0,ex:'【過去10年頻出】優先順位は<b>質問回答書>現場説明書>特記仕様書>設計図面>標準仕様書</b>。見積書はそもそも設計図書ではありません。'},
{c:'施工管理',q:'公共工事標準請負契約約款上、設計図書に含まれないものはどれか。',a:['実施工程表','設計図面','仕様書','現場説明書に対する質問回答書'],ans:0,ex:'設計図書=<b>図面・仕様書・現場説明書・質問回答書</b>。工程表は受注者が作成する施工管理資料で、設計図書には含まれません。'},
{c:'施工管理',q:'品質検査に関する記述のうち、適当なものはどれか。',a:['破壊を伴う検査は、抜取検査とする','破壊検査は全数検査とする','抜取検査ではロットの合否判定はできない','検査に要する費用は考慮しなくてよい'],ans:0,ex:'破壊検査(コンクリート強度試験等)を全数行うと製品が残らないため<b>必ず抜取検査</b>です。'},
{c:'施工管理',q:'建設業の労働災害に関する記述のうち、適当なものはどれか。',a:['死亡災害を型別にみると、墜落・転落によるものが最も多い','飛来・落下による死亡が最も多い','感電による死亡が最も多い','重大災害とは一時に10人以上が死傷した災害をいう'],ans:0,ex:'【過去10年頻出】建設業の死亡災害は<b>墜落・転落が最多</b>。建設業は全産業の死亡者の約3割を占め、重大災害=一時に<b>3人以上</b>の死傷です。'},
{c:'施工管理',q:'通勤災害に関する記述のうち、適当なものはどれか。',a:['複数の就業場所間の移動中に被った災害も、通勤災害の対象となる','住居と会社の往復のみが対象である','現場間の移動中の事故は保護されない','通勤災害には保険給付がない'],ans:0,ex:'通勤災害には住居⇔就業場所のほか、<b>就業場所から他の就業場所への移動</b>も含まれます。'},
{c:'施工管理',q:'渦巻ポンプの吐出し側配管における機器の取付け順序(ポンプ側から)として、適当なものはどれか。',a:['防振継手 → 逆止め弁 → 仕切弁','防振継手 → 仕切弁 → 逆止め弁','仕切弁 → 逆止め弁 → 防振継手','逆止め弁 → 防振継手 → 仕切弁'],ans:0,ex:'【過去10年頻出】ポンプ側から<b>防振継手→逆止め弁→仕切弁</b>。仕切弁を最も外側にすると、弁を閉じて逆止め弁の点検・交換ができます。'},
{c:'施工管理',q:'ポンプのコンクリート基礎に関する記述のうち、適当なものはどれか。',a:['基礎の高さは300mm程度とし、基礎表面に排水目皿・排水溝を設ける','基礎の高さは50mm程度でよい','基礎表面の排水溝は不要である','基礎は床スラブと縁を切って独立させるだけでよい'],ans:0,ex:'ポンプ基礎は<b>高さ300mm程度</b>とし、グランドパッキンからの漏水を受ける<b>排水溝と目皿</b>を設けて間接排水します。'},
{c:'施工管理',q:'飲料用受水タンクの据付けに関する記述のうち、適当なものはどれか。',a:['タンクの上部には、飲料水以外の用途の配管を通さない','タンクの真上に排水管を通してよい','タンク上部と天井との距離は60cmでよい','タンクは土間に直置きしてよい'],ans:0,ex:'汚染防止のため<b>タンク上部への他用途配管は禁止</b>。上部100cm・周囲下部60cmの点検スペース、基礎(架台)上への設置が原則です。'},
{c:'施工管理',q:'冷却塔の補給水口の高さに関する記述のうち、適当なものはどれか。',a:['高置タンクの低水位から3m以上の落差が確保できる高さとする','落差は30cmあればよい','補給水口の高さに規定・目安はない','高置タンクより高い位置に設ける'],ans:0,ex:'【過去10年頻出】ボールタップを確実に作動させるため、<b>高置タンク低水位から3m以上の落差</b>を確保します。'},
{c:'施工管理',q:'排水立て管の管径に関する記述のうち、適当なものはどれか。',a:['最下部の最も大きい排水負荷を受け持つ部分の管径と同一の管径を、どの階でも用いる','下層階ほど管径を大きくする','上層階ほど管径を大きくする','各階で管径を自由に変えてよい'],ans:0,ex:'【過去10年頻出】排水立て管は<b>最上部から最下部まで同一管径</b>(縮小禁止)。「下層階で拡大する」が定番の誤り選択肢です。'},
{c:'施工管理',q:'銅管・ステンレス鋼管を鋼製金物で支持する場合の措置として、適当なものはどれか。',a:['合成樹脂を被覆した支持金具を用いるなど絶縁支持とし、異種金属接触腐食を防止する','鋼製金物で直接締め付けてよい','銅管は腐食しないため配慮は不要である','支持間隔を広げれば直接支持してよい'],ans:0,ex:'銅・ステンレスと鋼が直接接触すると<b>電食(異種金属接触腐食)</b>が生じます。絶縁テープ・樹脂被覆バンドで絶縁支持します。'},
{c:'施工管理',q:'配管の溶接接合の姿勢に関する記述のうち、適当なものはどれか。',a:['可能な限り下向きの姿勢で溶接する','上向き溶接が最も品質が安定する','溶接姿勢は品質に影響しない','立向き溶接を標準とする'],ans:0,ex:'<b>下向き溶接が最も品質が安定</b>し欠陥が少ない姿勢です。回転可能な管は回しながら下向きで施工します。'},
{c:'施工管理',q:'給水設備の試運転調整における残留塩素の測定箇所として、適当なものはどれか。',a:['配管系統の最も末端の給水栓','受水タンクの流入口','ポンプの吐出し口','水道メーターの直後'],ans:0,ex:'残留塩素は塩素が最も減衰する<b>最末端の給水栓</b>で測定し、基準値以上あることを確認します。'},
{c:'施工管理',q:'ボイラーの据付けに関する記述のうち、適当なものはどれか。',a:['ボイラーの側面と壁との距離は、原則として450mm以上確保する','壁に密着させて据え付けてよい','側面の離隔は100mmでよい','離隔距離は美観のために設ける'],ans:0,ex:'ボイラー側面は<b>450mm以上</b>の離隔(被覆等の条件で緩和あり)。点検・整備スペースの確保が目的です。'},
{c:'法規',q:'建設業の許可(国土交通大臣許可・都道府県知事許可)に関する記述のうち、適当なものはどれか。',a:['知事許可の建設業者でも、他の都道府県の区域の工事を施工することができる','知事許可では当該都道府県内の工事しか施工できない','大臣許可と知事許可は請負金額の上限によって区分される','営業所が1か所のみの場合は大臣許可となる'],ans:0,ex:'【過去10年頻出】大臣/知事の区分は<b>営業所が2以上の都道府県にあるかどうか</b>だけで決まり、<b>施工できる工事の場所には制限がありません</b>。最頻出のひっかけです。'},
{c:'法規',q:'建設業法上、工事現場に掲げる標識の記載事項に含まれないものはどれか。',a:['現場代理人の氏名','商号又は名称','主任技術者の氏名','一般建設業又は特定建設業の別'],ans:0,ex:'【過去10年頻出】標識には商号・代表者氏名・許可番号・許可の別・主任(監理)技術者氏名などを記載。<b>現場代理人の氏名は含まれません</b>。'},
{c:'法規',q:'建設業法上の見積りに関する記述のうち、適当なものはどれか。',a:['建設業者は、請負契約が成立するまでの間に(締結前に)見積書を交付する','見積書は契約成立後に交付すればよい','見積書の交付に関する規定はない','見積期間に関する定めはない'],ans:0,ex:'見積書は<b>契約締結前に交付</b>します。「成立後に交付」が定番の誤り。注文者は適正な見積期間を確保する義務があります。'},
{c:'法規',q:'建設業法上、監理技術者を置かなければならない工事として、適当なものはどれか。',a:['発注者から直接請け負った工事を、総額4500万円以上(建築一式は7000万円以上)の下請契約により施工する場合','下請契約の金額にかかわらずすべての工事','請負金額500万円以上のすべての工事','監理技術者の設置は任意である'],ans:0,ex:'元請が<b>下請総額4500万円(建築一式7000万円)以上</b>で施工する場合は、主任技術者に代えて<b>監理技術者</b>の設置が必要です。'},
{c:'法規',q:'消防法上の危険物の指定数量として、誤っているものはどれか。',a:['ガソリン — 400L','灯油 — 1000L','軽油 — 1000L','重油 — 2000L'],ans:0,ex:'ガソリンの指定数量は<b>200L</b>。灯油・軽油=1000L、重油=2000Lは正しい数値です。'},
{c:'法規',q:'消防用設備等のうち、非常電源の附置が必要でないものはどれか。',a:['連結散水設備','屋内消火栓設備','スプリンクラー設備','不活性ガス消火設備'],ans:0,ex:'【過去10年頻出】連結散水設備は<b>消防ポンプ自動車から送水を受ける設備</b>のため非常電源が不要。繰り返し出題される定番です。'},
{c:'法規',q:'建設リサイクル法上、分別解体等の実施義務の対象となる建設工事の規模として、正しいものはどれか。',a:['建築物の解体工事:床面積の合計80m²以上','建築物の解体工事:床面積の合計40m²以上','建築物の新築工事:床面積の合計100m²以上','修繕・模様替:請負代金500万円以上'],ans:0,ex:'対象規模:<b>解体80m²・新築増築500m²・修繕模様替1億円・土木工作物等500万円</b>以上。数値セットで覚えましょう。'},
{c:'法規',q:'労働基準法上の年次有給休暇に関する記述のうち、正しいものはどれか。',a:['雇入れから6か月継続勤務し、全労働日の8割以上出勤した労働者には、10労働日の有給休暇を与える','1年間勤務すれば5日与えればよい','年次有給休暇の規定はない','3か月勤務で20日を与える'],ans:0,ex:'<b>6か月継続勤務+8割以上出勤→10日付与</b>。以後、勤続年数に応じて最大20日まで加算されます。'},
{c:'法規',q:'労働基準法上、業務上の負傷により休業する労働者への休業補償として、正しいものはどれか。',a:['平均賃金の100分の60','平均賃金の100分の30','平均賃金の全額','休業補償の規定はない'],ans:0,ex:'【過去10年頻出】休業補償=<b>平均賃金の60%</b>。「全額」「30%」が定番の誤り選択肢です。'},
{c:'法規',q:'法律とその法律に定められている測定項目・水質項目の組合せのうち、適当でないものはどれか。',a:['大気汚染防止法 — COD(化学的酸素要求量)','浄化槽法 — BOD','水質汚濁防止法 — pH','建築物衛生法 — 浮遊粉じんの量'],ans:0,ex:'【過去10年頻出】CODは<b>水質汚濁防止法</b>の項目(水質指標)。大気汚染防止法はばい煙・SOx・NOx等です。法律×項目の組合せ問題はほぼ毎年出ます。'},
{c:'法規',q:'建築基準法上の建築物に設ける配管設備の基準に関する記述のうち、誤っているものはどれか。',a:['排水槽の通気管は、他の通気立て管に接続する','配管設備は、エレベーターの昇降路内に設けない','飲料水の配管とその他の配管は、直接連結させない','排水管は、二重トラップとならないように設ける'],ans:0,ex:'【過去10年頻出】排水槽の通気管は<b>単独で直接外気に開放</b>します。他の通気管への接続は禁止。昇降路内配管禁止も頻出です。'},

{c:'規則',q:'無人航空機の飛行中に人に重傷を負わせる事故が発生した場合、操縦者がまず行うべきこととして、最も適切なものはどれか。',a:['直ちに飛行を中止し、負傷者の救護など危険を防止するための措置をとる','機体の回収を最優先する','翌日以降に警察へ相談する'],ans:0,ex:'事故発生時は<b>まず飛行中止と負傷者の救護・危険防止措置</b>。その上で国土交通大臣への報告義務があります。救護義務違反は罰則の対象です。'},
{c:'規則',q:'アルコールと無人航空機の飛行に関する記述のうち、正しいものはどれか。',a:['アルコールや薬物の影響により正常な飛行ができないおそれがある間は、飛行させてはならない','少量の飲酒であれば飛行させてよい','飲酒後2時間経過すれば必ず飛行できる'],ans:0,ex:'航空法は<b>アルコール又は薬物の影響下での飛行を禁止</b>。「少量なら可」「一定時間経過で必ず可」という基準はなく、影響がある間は不可です。'},

{c:'規則',q:'第三者の土地の上空における無人航空機の飛行に関する記述のうち、最も適切なものはどれか。',a:['土地の所有権は法令の制限内でその上下に及ぶため、低空での無断飛行は所有権の侵害となるおそれがある','航空法の許可があれば、民法上の問題は一切生じない','土地上空はすべて公共空間であり、自由に飛行できる'],ans:0,ex:'民法207条により土地所有権はその<b>上下に及び</b>ます。航空法の許可・承認と、土地所有者との調整(民事)は別問題です。'},
{c:'システム',q:'マルチコプターが機首方向(ヨー)を変える仕組みとして、正しいものはどれか。',a:['ロータの回転数を変え、反トルクの釣合いを崩すことで機体を回転させる','すべてのロータの回転数を同時に上げる','ロータの回転方向をすべて同一にしている'],ans:0,ex:'隣り合うロータは<b>互いに逆回転</b>して反トルクを打ち消しており、CW側とCCW側の回転数差をつくることでヨー回転します。全ロータ同時増速は上昇です。'},
{c:'システム',q:'固定翼機の失速に関する記述のうち、正しいものはどれか。',a:['迎え角が大きくなりすぎると、翼面の気流が剥離して揚力を急激に失う','速度が速いほど失速しやすい','失速は着陸時には発生しない'],ans:0,ex:'失速は<b>迎え角が臨界迎え角を超えた</b>ときに発生。速度が遅い低速飛行時や急な引き起こし時に起こりやすく、着陸時も要注意です。'},
{c:'システム',q:'リチウムポリマーバッテリーの取扱いに関する記述のうち、正しいものはどれか。',a:['膨らみや変形が見られるバッテリーは使用しない','膨らんでいても残量があれば使用してよい','長期保管は満充電の状態で行うのがよい'],ans:0,ex:'膨張・変形したリポバッテリーは内部劣化のサインで<b>使用禁止</b>。長期保管は満充電でも空でもなく<b>50〜60%程度</b>が適切です。過充電・過放電・高温も厳禁。'},
